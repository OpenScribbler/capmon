---
# Normative Definitions
#
# Authority
#   ACIF (Agent Content Interchange Format) owns the capability dispositions,
#   derivation predicates, and canonical vocabularies for every key in this file:
#   https://github.com/OpenScribbler/agent-content-interchange-format (v0.1, 2026-07-11).
#   This file is capmon's conforming reference copy. Authority direction: capmon
#   conforms to ACIF's copy, never the reverse. When an ACIF spec section and this
#   file disagree, the ACIF spec governs and this file has a bug.
#
# Confidence Enum
#   confirmed  — Verified directly against provider documentation, first-party test, or
#                authoritative source code. The mapping author can cite a specific primary source.
#   inferred   — Extrapolated from related behavior, secondary sources, partial evidence, or
#                behavioral observation. No primary citation available, but reasoning is
#                documented in the mechanism field.
#   unknown    — Default when a capmon sweep cannot establish either of the above. Indicates
#                the mapping has not been actively verified and should be treated as a research
#                lead, not ground truth.
#
#   Two contributors applying the same evidence to the same provider capability must reach the
#   same confidence tier. Capmon sweeps may downgrade confidence to unknown when a sweep cannot
#   verify current provider behavior.
#
# Key Lifecycle Policy
#   Add:        A new key may be introduced when 2+ providers demonstrate the same semantic
#               concept (graduation threshold: same semantic meaning, not just same name).
#   Rename:     The old name remains as an alias for at least one capmon cycle, recorded in an
#               aliases field on the new key entry.
#   Deprecate:  A key may be deprecated when the underlying concept no longer reflects current
#               provider reality. Deprecated keys are marked deprecated: true with a replacement
#               pointer for at least one capmon cycle before removal.
#   Split:      The original name is retained as an alias to the most common interpretation,
#               with deprecation applied to the alias after one cycle.
#   Remove:     Only after the alias/deprecation period. Recorded in a changelog comment here.
#
#   Post-publication: Every key below is published in ACIF v0.1, so changes to key
#   semantics, dispositions, or vocabularies are governed by ACIF's change process.
#   The lifecycle rules above apply only to capmon-internal concerns (aliases,
#   provider_extensions graduation candidates) and to proposing new keys upstream.
#
# Staleness and Maintenance
#   Canonical mappings are a point-in-time snapshot. Capmon runs scheduled sweeps that
#   re-verify provider documentation and detect changes. When a sweep cannot verify a
#   mapping, confidence is downgraded to unknown and the entry is flagged for human review.

# Canonical key vocabulary for capmon capability tracking.
#
# This file is the machine-readable source of truth used by:
#   - capmon validate-format-doc (checks canonical_mappings keys)
#   - capmon derive (validates keys when generating seeder specs)
#
# Schema:
#   content_types.<type>.<key>:
#     description: Human-readable description of the capability
#     type: string | bool | object
#     spec_ref: Owning ACIF spec section for this key's capability disposition
#               (DERIVABLE or OUT-OF-SCOPE-AT-L1), plus the owning vocabulary
#               appendix where the key carries a canonical enum. Section numbers
#               refer to specs/<spec-dir>/spec.md in the ACIF repository.

content_types:
  skills:
    display_name:
      description: >
        Human-readable display name for the skill. If omitted, the directory name is used.
        Shown in skill listings and menus.
      type: string
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1)

    description:
      description: >
        What the skill does. Used by the AI to decide when to auto-invoke it.
        Also shown in skill listings and help text.
      type: string
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1)

    license:
      description: >
        SPDX license identifier for the skill content.
        Typically "MIT", "Apache-2.0", etc.
      type: string
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1)

    compatibility:
      description: >
        Provider compatibility constraints — which AI tool versions or providers
        this skill is compatible with.
      type: object
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1)

    metadata_map:
      description: >
        Arbitrary key-value metadata attached to the skill. Provider-specific
        semantics; often used for tooling or automation metadata.
      type: object
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1)

    auto_invocable:
      description: >
        Whether the provider supports automatic model-driven skill invocation —
        the model selects and activates a skill without explicit user syntax.
        Implementations vary: description-field semantic matching, explicit keyword
        arrays, and boolean flags are all equivalent mechanisms for the same concept.
        Note: a description field paired with an opt-out disable_model_invocation flag
        is functionally equivalent to an explicit auto_invocable boolean — both express
        that the skill participates in automatic activation unless suppressed.
      type: bool
      spec_ref: ACIF-SKILL §10.1 (DERIVABLE); activation enum ACIF-SKILL §6.2, Appendix A

    disable_model_invocation:
      description: >
        When true, the AI cannot auto-invoke this skill; only the user can
        invoke it explicitly. Default: false.
      type: bool
      spec_ref: ACIF-SKILL §10.1 (DERIVABLE); activation enum ACIF-SKILL §6.2, Appendix A

    user_invocable:
      description: >
        When false, the skill is hidden from user-facing menus (e.g., the /
        command menu). The AI can still invoke it. Default: true.
      type: bool
      spec_ref: ACIF-SKILL §10.1 (DERIVABLE)

    version:
      description: >
        Semantic version string for the skill. Used for update detection
        and compatibility checks.
      type: string
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1; common envelope ACIF-CORE §5.1)

    project_scope:
      description: >
        Whether the skill can be installed at project scope (applies to current
        project only, typically committed to version control).
      type: bool
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1; install_scope_capabilities, ACIF-REGISTRY)

    global_scope:
      description: >
        Whether the skill can be installed at global/personal scope (applies
        across all projects for the current user).
      type: bool
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1; install_scope_capabilities, ACIF-REGISTRY)

    shared_scope:
      description: >
        Whether the skill can be installed at shared/enterprise scope (applies
        to all users in an organization or shared environment).
      type: bool
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1; install_scope_capabilities, ACIF-REGISTRY)

    canonical_filename:
      description: >
        The required or conventional filename for this skill type. For example,
        "SKILL.md" for Claude Code skills.
      type: string
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1; discovery ACIF-SKILL §9)

    custom_filename:
      description: >
        Whether the provider supports custom filenames (beyond the canonical
        filename convention).
      type: bool
      spec_ref: ACIF-SKILL §10.2 (OUT-OF-SCOPE-AT-L1; discovery ACIF-SKILL §9)

    skill_bundled_resources:
      description: >
        Whether the skill directory may contain arbitrary co-located files (scripts,
        templates, configs, checklists) beyond SKILL.md that the agent can access when
        the skill is invoked. Enables multi-file skill bundles without converting
        supporting files into separate skills or rules.
      type: bool
      spec_ref: ACIF-SKILL §10.1 (DERIVABLE; multi-file classification ACIF-CORE §7.2)

  rules:
    activation_mode:
      description: >
        How rules decide when to load into context. Providers implement varying modes:
        always-on, conditional/glob-based, model-decision, and manual activation.
        Tracks which modes the provider supports and how they are configured.
      type: object
      spec_ref: ACIF-RULE §9.1 (DERIVABLE); activation-mode vocabulary ACIF-RULE Appendix A, §10

    file_imports:
      description: >
        Whether rules can reference or include content from other files. Mechanisms vary:
        @-import syntax, @file.md directives, @path/to/file references.
      type: bool
      spec_ref: ACIF-RULE §9.2 (OUT-OF-SCOPE-AT-L1; strongest requires candidate — see ACIF ROADMAP, body-content reference grammar)

    cross_provider_recognition:
      description: >
        Which rule file formats from other providers this provider recognizes.
        Contents: recognized_formats (list of filenames like AGENTS.md, .cursorrules,
        .windsurfrules). Minimum qualification: supported when the provider reads at least
        one rule-file format defined by a different provider.
      type: object
      spec_ref: ACIF-RULE §9.2 (OUT-OF-SCOPE-AT-L1; provider_capability_coverage, ACIF-REGISTRY §8.4)

    auto_memory:
      description: >
        Whether the provider auto-generates persistent rules from conversation context.
        Distinct from user-authored rules — these are AI-created and stored separately.
      type: bool
      spec_ref: ACIF-RULE §9.2 (OUT-OF-SCOPE-AT-L1; provider_capability_coverage, ACIF-REGISTRY §8.4)

    hierarchical_loading:
      description: >
        Whether rules load from multiple directory levels with defined precedence.
        Enables project-root rules plus subdirectory-scoped overrides.
      type: bool
      spec_ref: ACIF-RULE §9.2 (OUT-OF-SCOPE-AT-L1; provider_capability_coverage, ACIF-REGISTRY §8.4)

  hooks:
    handler_types:
      description: >
        What kinds of executors hooks support beyond shell commands. May include HTTP
        endpoints, LLM prompt evaluation, multi-turn agent handlers, or TypeScript
        extensions.
      type: object
      spec_ref: ACIF-HOOK §10.1 (DERIVABLE); handler-type enum ACIF-HOOK Appendix B, §8.2

    matcher_patterns:
      description: >
        Whether hooks can filter which tools or events they respond to using name
        matching, regex patterns, or structured criteria.
      type: bool
      spec_ref: ACIF-HOOK §10.1 (DERIVABLE)

    decision_control:
      description: >
        Which decision actions hooks can take on the triggering action. Contents:
        {block: bool, allow: bool, modify: bool}. Mechanisms include exit code
        contracts, JSON decision fields, or cancel flags. Boundary: decision_control
        governs whether a tool invocation proceeds; see permission_control for whether
        a tool is available at all.
      type: object
      spec_ref: ACIF-HOOK §10.2 (OUT-OF-SCOPE-AT-L1; script-body-opaque)

    input_modification:
      description: >
        Whether hooks can modify tool input arguments before the tool executes.
        Safety-critical capability — silent degradation creates false security.
        Minimum qualification: supported when the provider provides any mechanism to
        modify tool input arguments before execution (e.g., hookSpecificOutput.updatedInput,
        plugin-mutable args, or equivalent).
      type: bool
      spec_ref: ACIF-HOOK §10.2 (OUT-OF-SCOPE-AT-L1; script-body-opaque)

    async_execution:
      description: >
        Whether hooks can run asynchronously without blocking the agent's execution
        loop. Fire-and-forget semantics.
      type: bool
      spec_ref: ACIF-HOOK §10.1 (DERIVABLE)

    hook_scopes:
      description: >
        Where hooks can be configured and the precedence model when multiple scopes
        define hooks for the same event. Common scopes: global/user, project, workspace,
        managed/enterprise.
      type: object
      spec_ref: ACIF-HOOK §10.2 (OUT-OF-SCOPE-AT-L1; install-location-determined)

    json_io_protocol:
      description: >
        Whether hooks communicate with the host via structured JSON on stdin/stdout
        rather than plain text or exit codes alone.
      type: bool
      spec_ref: ACIF-HOOK §10.2 (OUT-OF-SCOPE-AT-L1; script-body-opaque)

    context_injection:
      description: >
        Whether hooks can inject messages, system prompts, or conversation context
        into the agent's active session.
      type: bool
      spec_ref: ACIF-HOOK §10.2 (OUT-OF-SCOPE-AT-L1; script-body-opaque)

    permission_control:
      description: >
        Whether hooks can make or influence permission decisions determining whether
        a tool is available for invocation. Minimum qualification: supported when the
        provider allows hooks to return permission decisions of any kind (grant, deny,
        or ask). Boundary: permission_control governs whether a tool is available;
        see decision_control for invocation-flow control.
      type: bool
      spec_ref: ACIF-HOOK §10.2 (OUT-OF-SCOPE-AT-L1; script-body-opaque)

  mcp:
    transport_types:
      description: >
        Which MCP transport protocols the provider supports. Common transports: stdio
        (local process), SSE (Server-Sent Events), HTTP/streamable-HTTP (stateless or
        streaming).
      type: object
      spec_ref: ACIF-MCP §9.1 (DERIVABLE); transport enum ACIF-MCP §6.2, §7

    oauth_support:
      description: >
        Whether the provider supports OAuth 2.0 authentication for remote MCP servers,
        including token storage and automatic refresh.
      type: bool
      spec_ref: ACIF-MCP §9.1 (DERIVABLE)

    env_var_expansion:
      description: >
        Whether MCP server configuration supports environment variable expansion.
        Reduces the need for hardcoded secrets in config files.
      type: bool
      spec_ref: ACIF-MCP §9.1 (DERIVABLE; pinned closed field set)

    tool_filtering:
      description: >
        Which per-server tool filtering mechanisms the provider supports. Contents:
        {allowlist: bool, blocklist: bool, disable_flag: bool}. Controls which server
        tools are exposed to the agent. Boundary: tool_filtering governs tool visibility
        (what appears in the agent's available tool set); see auto_approve for execution
        gating of visible tools.
      type: object
      spec_ref: ACIF-MCP §9.1 (DERIVABLE)

    auto_approve:
      description: >
        Whether specific MCP tools or entire servers can be configured for automatic
        approval without per-invocation user confirmation. Boundary: auto_approve governs
        execution gating (user prompt suppression) for tools that are already visible;
        see tool_filtering for tool visibility control.
      type: bool
      spec_ref: ACIF-MCP §9.1 (DERIVABLE)

    marketplace:
      description: >
        Whether the provider offers an in-IDE MCP server discovery and installation
        experience.
      type: bool
      spec_ref: ACIF-MCP §9.2 (OUT-OF-SCOPE-AT-L1)

    resource_referencing:
      description: >
        Whether MCP resources (not just tools) can be accessed, typically via @-mention
        syntax or similar referencing mechanisms.
      type: bool
      spec_ref: ACIF-MCP §9.2 (OUT-OF-SCOPE-AT-L1)

    enterprise_management:
      description: >
        Whether the provider supports organization-level MCP configuration management,
        including managed server lists, allowlists, and enterprise registries.
      type: bool
      spec_ref: ACIF-MCP §9.2 (OUT-OF-SCOPE-AT-L1)

  agents:
    definition_format:
      description: >
        What format agent definitions use. Varies widely: Markdown with YAML frontmatter,
        JSON config files, TOML sections, or AGENTS.md plain markdown.
      type: string
      spec_ref: ACIF-AGENT §9.2 (OUT-OF-SCOPE-AT-L1)

    tool_restrictions:
      description: >
        Whether agents can be restricted to specific tools via allowlists, denylists,
        tool categories, or per-tool configuration maps.
      type: bool
      spec_ref: ACIF-AGENT §9.1 (DERIVABLE); tool vocabulary ACIF-CORE Appendix A

    invocation_patterns:
      description: >
        How agents are triggered. Mechanisms include natural language detection,
        @-mention syntax, slash commands, CLI flags, or automatic delegation.
      type: object
      spec_ref: ACIF-AGENT §9.2 (OUT-OF-SCOPE-AT-L1)

    agent_scopes:
      description: >
        Where agent definitions can live and the priority ordering when definitions
        exist at multiple levels. Common scopes: project, user/personal,
        managed/enterprise, CLI-defined.
      type: object
      spec_ref: ACIF-AGENT §9.2 (OUT-OF-SCOPE-AT-L1; install_scope_capabilities, ACIF-REGISTRY)

    model_selection:
      description: >
        Whether per-agent model overrides are supported, allowing different agents
        to use different AI models.
      type: bool
      spec_ref: ACIF-AGENT §9.1 (DERIVABLE)

    per_agent_mcp:
      description: >
        Whether agents can have their own MCP server configuration, scoping which
        external tools each agent can access.
      type: bool
      spec_ref: ACIF-AGENT §9.1 (DERIVABLE)

    subagent_spawning:
      description: >
        Whether agents can spawn, delegate to, or resume other agents. Enables
        multi-agent coordination patterns.
      type: bool
      spec_ref: ACIF-AGENT §9.1 (DERIVABLE; canonical spawn tool name, ACIF-CORE Appendix A)

  commands:
    argument_substitution:
      description: >
        How user-provided arguments are injected into command templates. Mechanisms
        vary: $ARGUMENTS, {{args}}, positional $1/$2/${@:N}, and other interpolation
        syntaxes.
      type: object
      spec_ref: ACIF-COMMAND §9.1 (OUT-OF-SCOPE-AT-L1; placeholder vocabulary ACIF-COMMAND Appendix A, §7)

    builtin_commands:
      description: >
        Whether the provider ships default/built-in commands alongside user-defined
        custom commands.
      type: bool
      spec_ref: ACIF-COMMAND §9.2 (OUT-OF-SCOPE-AT-L1; provider_capability_coverage row)
