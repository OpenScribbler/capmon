  rules:
    status: supported
    sources:
      - uri: "https://zed.dev/docs/ai/instructions"
        type: documentation
        fetch_method: gh_raw
        fetched_at: "2026-07-14T01:49:10Z"
        content_hash: "sha256:2c984f0ae1887abde3391cd611f725edb7588a59ab1468a9b3db1a5f4333a315"
      - uri: "https://raw.githubusercontent.com/zed-industries/zed/main/.rules"
        type: example
        fetch_method: gh_raw
        fetched_at: "2026-07-14T01:49:10Z"
        content_hash: "sha256:079f88838e5b214428c6ebd5e4e68d038df538c2abfc12de8f7bb9b93fa440f5"
    canonical_mappings:
      activation_mode:
        supported: false
        mechanism: "Zed instruction files load unconditionally (personal AGENTS.md every project; project-root file when present); no conditional activation syntax documented"
        confidence: inferred
      file_imports:
        supported: false
        mechanism: "no import directive documented for Zed's .rules file"
        confidence: inferred
      cross_provider_recognition:
        supported: true
        mechanism: "Zed discovers rule files from multiple providers at project root using a priority-ordered list: .rules, .cursorrules, .windsurfrules, .clinerules, .github/copilot-instructions.md, AGENT.md, AGENTS.md, CLAUDE.md, GEMINI.md — the first matching file wins"
        confidence: confirmed
      auto_memory:
        supported: false
        mechanism: "Zed does not document a command that persists agent memory into the rules file"
        confidence: inferred
      hierarchical_loading:
        supported: false
        mechanism: "Zed loads instruction files from two fixed locations (personal ~/.config/zed/AGENTS.md plus one project-root file, project overriding personal); no directory-level traversal or subdirectory overrides documented"
        confidence: inferred
    provider_extensions:
      - id: cross_provider_rule_files
        name: Cross-provider rule file recognition
        summary: "At project root, Zed recognizes a priority-ordered list of rule filenames from multiple providers: .rules (preferred), .cursorrules, .windsurfrules, .clinerules, .github/copilot-instructions.md, AGENT.md, AGENTS.md, CLAUDE.md, GEMINI.md. The first matching file is used."
        source_ref: "https://zed.dev/docs/ai/instructions"
        graduation_candidate: true
        conversion: preserved
    loading_model: "Instructions are plain Markdown with no frontmatter. Zed loads a personal instruction file (~/.config/zed/AGENTS.md; %APPDATA%\\Zed\\AGENTS.md on Windows) for every project, plus one project-root instruction file chosen by a priority-ordered list (.rules preferred, then .cursorrules, .windsurfrules, .clinerules, .github/copilot-instructions.md, AGENT.md, AGENTS.md, CLAUDE.md, GEMINI.md). The first matching project file is provided to the agent as project context and overrides personal instructions on conflict."
    notes: "Zed renamed Rules to Instructions (2026-07, zed.dev/docs/ai/instructions): the Rules Library editor and default-rules (paper clip) UI were removed — reusable on-demand rules became Skills, always-on rules became AGENTS.md instructions. The rules_library and default_rules provider extensions were retired accordingly (see git history). Project files remain single-file at project root — no directory hierarchy, no frontmatter; the new personal AGENTS.md adds a user scope but no directory-level traversal."

  mcp:
    status: supported
    sources:
      - uri: "https://zed.dev/docs/ai/mcp"
        type: documentation
        fetch_method: gh_raw
        fetched_at: "2026-07-14T01:49:10Z"
        content_hash: "sha256:d529b69080eeb2d289d729f3846965db66394a6af4d319f659a652e95e792aff"
      - uri: "https://raw.githubusercontent.com/zed-industries/zed/main/crates/context_server/src/context_server.rs"
        type: source_code
        fetch_method: gh_raw
        fetched_at: "2026-07-14T01:49:10Z"
        content_hash: "sha256:ed3818ee4ec499f77cbbb01909d8fb819424e38a4c818e23730d0d1003607e4c"
    canonical_mappings:
      transport_types:
        supported: true
        mechanism: "Zed supports both stdio (local command + args + env) and HTTP/HTTPS (remote URL + headers) transports. Stdio servers use the command/args/env shape; remote servers use url + optional headers. Both use the same MCP protocol initialization."
        confidence: confirmed
      oauth_support:
        supported: true
        mechanism: "When a remote MCP server is configured with a url but no Authorization header, Zed prompts the user to authenticate using the standard MCP OAuth flow; since upstream commit 12e1e244 (2026-07-03) the flow is also initiated when the server answers post-initialize requests with 401 Unauthorized carrying a WWW-Authenticate challenge (ContextServer::auth_challenge)"
        confidence: confirmed
      env_var_expansion:
        supported: false
        mechanism: "no automatic environment variable expansion documented in Zed MCP env blocks"
        confidence: inferred
      tool_filtering:
        supported: true
        mechanism: "Per-profile per-server tool enable/disable maps are supported via context_servers.<name>.tools in agent profile config; enable_all_context_servers: false allows disabling all servers except those explicitly listed in the profile"
        confidence: confirmed
      auto_approve:
        supported: true
        mechanism: "agent.tool_permissions.default: \"allow\" auto-approves all tool actions without prompting (v0.224.0+); individual tools can be targeted with mcp:<server>:<tool_name> key format. Default is \"confirm\"; \"deny\" blocks all tool actions."
        confidence: confirmed
      marketplace:
        supported: true
        mechanism: "Zed exposes an in-app MCP server gallery ('As Extensions' heading): zed: extensions action, or Settings > AI > MCP Servers > Add Server > Install from Extensions, where servers can be browsed and installed"
        confidence: confirmed
      resource_referencing:
        supported: false
        mechanism: "explicitly out of scope — the 'Supported Features' heading states Zed currently supports MCP's Tools and Prompts features only (Discovery, Sampling, Elicitation listed as welcome contributions); no resource referencing"
        confidence: confirmed
      enterprise_management:
        supported: false
        mechanism: "Zed does not document org-level MCP management"
        confidence: inferred
    provider_extensions:
      - id: context_servers_key
        name: context_servers settings block
        summary: MCP servers are registered under the top-level context_servers object in Zed's settings.json, keyed by server name.
        source_ref: "https://zed.dev/docs/ai/mcp"
        graduation_candidate: true
        conversion: translated
        provider_field: context_servers
      - id: stdio_command_config
        name: Stdio command + args + env + timeout server config
        summary: "Each stdio server entry defines a command with executable path, argument array, env map, and optional timeout that Zed launches as a stdio subprocess. The ModelContextServerBinary struct carries executable, args, env, and timeout fields."
        source_ref: "https://raw.githubusercontent.com/zed-industries/zed/main/crates/context_server/src/context_server.rs"
        graduation_candidate: true
        conversion: translated
        provider_field: command
      - id: http_server_config
        name: HTTP/HTTPS remote server config
        summary: "Remote MCP servers are configured with a url field (http:// or https://) and an optional headers map. Zed's context_server.rs ContextServer::http() constructor validates the URL scheme and rejects non-http(s) schemes with an error."
        source_ref: "https://raw.githubusercontent.com/zed-industries/zed/main/crates/context_server/src/context_server.rs"
        graduation_candidate: true
        conversion: translated
        provider_field: url
      - id: oauth_flow
        name: MCP OAuth authentication prompt
        summary: "When a remote server's url is set but no Authorization header is provided, Zed automatically prompts the user to authenticate using the standard MCP OAuth flow. No extra configuration is required to trigger the prompt. The flow is also initiated when a server answers post-initialize requests with 401 Unauthorized carrying a WWW-Authenticate challenge (ContextServer::auth_challenge, upstream #60236)."
        source_ref: "https://zed.dev/docs/ai/mcp"
        graduation_candidate: false
        conversion: not-portable
      - id: server_gallery
        name: In-app MCP server gallery
        summary: "Zed ships a UI for browsing and installing MCP servers (as extensions) without hand-editing settings.json. Accessible via 'zed: extensions' or Settings > AI > MCP Servers > Add Server > Install from Extensions; the same page adds custom local/remote servers."
        source_ref: "https://zed.dev/docs/ai/mcp"
        graduation_candidate: false
        conversion: not-portable
      - id: per_profile_tool_filtering
        name: Per-profile per-server tool filtering
        summary: "Agent profiles can set enable_all_context_servers: false and supply a per-server tools map (context_servers.<name>.tools with boolean values per tool name) to enable only specific MCP tools within that profile."
        source_ref: "https://zed.dev/docs/ai/mcp"
        graduation_candidate: false
        conversion: not-portable
        provider_field: "agent.profiles"
      - id: tool_permissions
        name: Tool permissions (confirm / allow / deny)
        summary: "agent.tool_permissions.default controls approval behavior for all tool actions: \"confirm\" (default) prompts before running, \"allow\" auto-approves, \"deny\" blocks. Individual MCP tools are targeted with the key format mcp:<server>:<tool_name>. Available since v0.224.0."
        source_ref: "https://zed.dev/docs/ai/mcp"
        graduation_candidate: false
        conversion: not-portable
        provider_field: "agent.tool_permissions"
      - id: dynamic_tool_list
        name: Dynamic tool list reload (notifications/tools/list_changed)
        summary: "Zed handles the MCP notifications/tools/list_changed notification: when a server adds, removes, or modifies tools at runtime, Zed automatically reloads the tool list without requiring a server restart."
        source_ref: "https://zed.dev/docs/ai/mcp"
        graduation_candidate: false
        conversion: not-portable
      - id: external_agent_forwarding
        name: MCP server forwarding to external agents
        summary: "MCP servers configured in Zed are forwarded to external agents via the Agent Client Protocol. External agents can also access MCP servers from their own native config files. The 'Agent Path Support' table distinguishes three paths: Zed Agent (uses Zed-configured servers directly), External Agents (forwarded over ACP), Terminal Threads (native CLIs/TUIs read their own MCP config)."
        source_ref: "https://zed.dev/docs/ai/mcp"
        graduation_candidate: false
        conversion: not-portable
    loading_model: "MCP servers are defined in Zed's settings.json (user settings at ~/.config/zed/settings.json on Linux/macOS) under the context_servers key. Stdio servers supply command, args, env, and optional timeout; Zed spawns them as subprocesses. Remote servers supply a url and optional headers; Zed connects over HTTP/HTTPS and triggers an OAuth flow if no Authorization header is present. Servers are attached to the agent panel's available tools when enabled. Profile-level tool filtering and global tool_permissions gates control which tools require approval."
    notes: "Both stdio and HTTP/HTTPS transports are documented and confirmed in source. OAuth prompting is automatic for remote servers without an Authorization header. Per-profile tool filtering and global tool_permissions (v0.224.0+) provide fine-grained approval control. Settings merge follows Zed's standard project/user override model."

  skills:
    status: supported
    sources:
      - uri: "https://zed.dev/docs/ai/skills"
        type: documentation
        fetch_method: gh_raw
        fetched_at: "2026-07-14T01:49:10Z"
        content_hash: "sha256:bbbc98f66c3f213976f6fc7e7e16b2122e748793d2ad217a9175c951f2eacaab"
    canonical_mappings:
      display_name:
        supported: true
        provider_field: "name"
        mechanism: "yaml frontmatter key: name (required). Lowercase letters, numbers, and hyphens only; 1-64 characters; no leading/trailing or consecutive hyphens. Should match the skill's folder name and doubles as the skill identifier; skills with invalid names fail to load."
        confidence: confirmed
      description:
        supported: true
        provider_field: "description"
        mechanism: "yaml frontmatter key: description (required). States what the skill does and when to use it; the agent uses it to decide when to auto-invoke. Keep under 1024 bytes — longer descriptions still load but surface a warning."
        confidence: confirmed
      disable_model_invocation:
        supported: true
        provider_field: "disable-model-invocation"
        mechanism: "yaml frontmatter key: disable-model-invocation (optional bool, default false). When true the skill is hidden from the agent's autonomous catalog but stays invocable by the user via slash command or @-mention — useful for deploy/release procedures you do not want the agent triggering."
        confidence: confirmed
      auto_invocable:
        supported: true
        mechanism: "By default the agent picks up skills autonomously: it sees a catalog of every installed skill (name + description) in its system prompt and calls the skill tool when a task matches a skill's description. Semantic description matching, opt-out via disable-model-invocation — functionally the canonical auto_invocable capability."
        confidence: confirmed
      user_invocable:
        supported: true
        mechanism: "All installed skills are user-invocable: type / in the message editor and select a skill by name, or @skill to pick one from the completion menu. Both inject the skill's instructions as context (shown as a clickable crease button). disable-model-invocation: true removes only the model's autonomous invocation, leaving the skill user-invocable."
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: "Project-local skills live in <worktree>/.agents/skills/<name>/SKILL.md and apply only to the current project. They load only from trusted worktrees — skills from a freshly cloned or untrusted project are excluded from the catalog and slash commands until trust is granted."
        paths:
          - "<worktree>/.agents/skills/<name>/SKILL.md"
        confidence: confirmed
      global_scope:
        supported: true
        mechanism: "Global skills live in ~/.agents/skills/<name>/SKILL.md and apply to every project. The agent can read global skill resources even though they are outside the current project."
        paths:
          - "~/.agents/skills/<name>/SKILL.md"
        confidence: confirmed
      shared_scope:
        supported: false
        mechanism: "Zed loads skills from exactly two locations (global ~/.agents/skills/ and project-local <worktree>/.agents/skills/); no organization/enterprise scope is documented, and 'No remote registry' — Zed does not discover or load skills from remote locations at runtime."
        confidence: confirmed
      canonical_filename:
        supported: true
        mechanism: "SKILL.md is the required fixed filename inside each skill folder (starts with YAML frontmatter, followed by Markdown instructions)."
        confidence: confirmed
      custom_filename:
        supported: false
        mechanism: "The skill file name is fixed as SKILL.md; only the containing folder name varies (and serves as the skill identifier). No custom filename is supported."
        confidence: confirmed
      skill_bundled_resources:
        supported: true
        mechanism: "A skill folder may co-locate scripts/ (scripts the agent can run), references/ (additional documentation), and assets/ (templates and static files) alongside SKILL.md. The agent loads them on demand via the read_file and list_directory tools; the SKILL.md body links to them (progressive disclosure)."
        confidence: confirmed
      license:
        supported: false
        mechanism: "Not currently a frontmatter field. The docs list only name, description, and disable-model-invocation, and state further Agent Skills spec fields are planned 'in the near future'."
        confidence: confirmed
      compatibility:
        supported: false
        mechanism: "Not currently a frontmatter field (only name, description, disable-model-invocation are recognized today; further Agent Skills spec fields are planned)."
        confidence: confirmed
      metadata_map:
        supported: false
        mechanism: "Not currently a frontmatter field (only name, description, disable-model-invocation are recognized today; further Agent Skills spec fields are planned)."
        confidence: confirmed
      version:
        supported: false
        mechanism: "Not currently a frontmatter field (only name, description, disable-model-invocation are recognized today; further Agent Skills spec fields are planned)."
        confidence: confirmed
    provider_extensions:
      - id: skills_sh_registry
        name: skills.sh community registry
        summary: "Skills can be installed from skills.sh, a community registry of open-source skills (e.g. find-skills, frontend-design, pdf). Install by copying the skill's folder into ~/.agents/skills/ (global) or the project's .agents/skills/ (project-local). The built-in find-skills skill discovers and installs skills from the open ecosystem."
        source_ref: "https://zed.dev/docs/ai/skills#from-the-skills.sh-registry"
        conversion: not-portable
        graduation_candidate: false
      - id: share_link
        name: zed://skill share links
        summary: "The Skills settings page can copy a self-contained zed://skill?data=... link that embeds the full SKILL.md contents (base64url-encoded). A recipient opening the link gets a pre-filled 'Create Skill' page; nothing is written to disk until they explicitly save, so a shared link can never silently install instructions."
        source_ref: "https://zed.dev/docs/ai/skills#sharing-skills"
        conversion: not-portable
        graduation_candidate: false
      - id: skill_creator_ui
        name: Built-in skill creator and URL import
        summary: "Zed ships a built-in create-skill skill (invoke via /create-skill) that walks you through authoring, plus a Skills Manager (cmd-alt-l|ctrl-alt-l) and an 'agent: create skill from url' command that imports a skill from a supported GitHub Markdown URL. The creator saves to the scope of the selected settings tab (User = global, Project = project-local)."
        source_ref: "https://zed.dev/docs/ai/skills#adding-skills"
        conversion: not-portable
        graduation_candidate: false
      - id: manual_invocation
        name: Slash-command and @-mention invocation
        summary: "Beyond autonomous invocation, a skill can be loaded manually: type / and select it by name, or type @skill and pick it from the completion menu. Both inject the skill's instructions as context; the loaded skill appears as a crease button in the thread that opens the skill file when clicked."
        source_ref: "https://zed.dev/docs/ai/skills#manual-invocation"
        conversion: not-portable
        graduation_candidate: false
      - id: project_trust
        name: Project-local trust gating
        summary: "Project-local skills load only from trusted worktrees. Skills from a freshly cloned or untrusted project are excluded from the catalog and slash commands until you grant trust — preventing a malicious project from injecting instructions into the agent's system prompt before you have reviewed what it ships."
        source_ref: "https://zed.dev/docs/ai/skills#project-local-skills-and-trust"
        conversion: not-portable
        graduation_candidate: false
      - id: override_precedence
        name: Project-over-global name override
        summary: "If a global and a project-local skill share the same name, the project-local skill takes precedence — letting a project customize or replace a global skill for its own context."
        source_ref: "https://zed.dev/docs/ai/skills#override-behavior"
        conversion: not-portable
        graduation_candidate: false
      - id: agent_edit_protection
        name: Agent edit protection for skill files
        summary: "The agent cannot edit SKILL.md files or their bundled resources without explicit user authorization, even in a trusted project. This prevents a compromised conversation from modifying the skills that govern future conversations."
        source_ref: "https://zed.dev/docs/ai/skills#editing-skill-files"
        conversion: not-portable
        graduation_candidate: false
      - id: permission_prompt
        name: Per-skill tool-permission prompt
        summary: "When the agent invokes a user-created or installed skill, Zed prompts allow/deny using the same permission flow as other tools; skills built into Zed do not prompt. Per-skill defaults can be set in Tool Permissions to avoid repeated prompts for trusted skills."
        source_ref: "https://zed.dev/docs/ai/skills#using-skills"
        conversion: not-portable
        graduation_candidate: false
      - id: live_reload
        name: Live reload of skill files
        summary: "Adding, removing, or editing a SKILL.md takes effect immediately without restarting the session. Changing a skill's name or description invalidates the model's prompt cache for the current session."
        source_ref: "https://zed.dev/docs/ai/skills#limitations"
        conversion: not-portable
        graduation_candidate: false
      - id: flat_layout
        name: Flat skills layout (no nesting)
        summary: "Each skill must be a direct child of the skills root. Nested folders like ~/.agents/skills/group/my-skill/ are not discovered — a stricter layout than providers that walk nested skill directories."
        source_ref: "https://zed.dev/docs/ai/skills#where-skills-live"
        conversion: not-portable
        graduation_candidate: false
      - id: catalog_budget
        name: 50KB catalog budget
        summary: "The total size of all skill names and descriptions is capped at 50KB. Skills that do not fit are dropped from the catalog with a UI warning, so descriptions must stay concise (individual descriptions are also soft-capped at 1024 bytes)."
        source_ref: "https://zed.dev/docs/ai/skills#limitations"
        conversion: not-portable
        graduation_candidate: false
      - id: agent_path_boundaries
        name: Zed Agent path boundary
        summary: "Zed Skills apply to the Zed Agent only. External Agents (over the Agent Client Protocol) and Terminal Threads (native CLIs/TUIs) may have their own native skills, prompts, or instruction systems, configured in the external agent or CLI rather than here."
        source_ref: "https://zed.dev/docs/ai/skills#agent-path-boundaries"
        conversion: not-portable
        graduation_candidate: false
    loading_model: "Progressive disclosure: the agent sees only each skill's name and description (subject to the 50KB catalog budget) until it activates a skill, then loads the full SKILL.md body and any bundled resources on demand via read_file/list_directory. Skills load from ~/.agents/skills/<name>/SKILL.md (global, every project) and <worktree>/.agents/skills/<name>/SKILL.md (project-local, trusted worktrees only); a project-local skill overrides a global skill of the same name. Each skill is a direct child of the skills root — nested folders are not discovered. By default the agent auto-invokes skills whose description matches the task; disable-model-invocation: true limits a skill to explicit user invocation. Adding/removing/editing a SKILL.md takes effect live."
    notes: "Zed onboarded Skills in the 2026-07 docs restructure (bead capmon-zbm) that replaced the Rules Library: reusable, on-demand Library rules became Skills, always-on rules became AGENTS.md instructions. Zed implements a subset of the Agent Skills open standard — frontmatter is currently limited to name, description, and disable-model-invocation, with further spec fields (license, compatibility, metadata, version, etc.) planned 'in the near future'. Distinctive Zed concepts: self-contained zed://skill share links, a built-in create-skill skill plus GitHub-URL import, project-local trust gating, agent edit protection on skill files, and a strictly flat skills layout. No enterprise scope and no runtime remote registry (skills.sh installs are a one-time copy/import)."

