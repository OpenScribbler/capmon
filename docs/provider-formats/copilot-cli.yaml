    canonical_mappings:
      handler_types:
        supported: true
        mechanism: "three handler types: command hooks (bash/powershell scripts), HTTP hooks (POST requests), and prompt hooks (auto-submitted text, sessionStart only) — documented under 'Hook configuration format'"
        confidence: confirmed
      matcher_patterns:
        supported: true
        mechanism: "optional 'matcher' regex per hook entry, compiled as ^(?:PATTERN)$ full-match against toolName (preToolUse/postToolUse/permissionRequest), notification_type, preCompact trigger, or subagent agentName — documented under 'Matcher filtering' / 'Tool names for hook matching'"
        confidence: confirmed
      decision_control:
        supported: true
        mechanism: "preToolUse returns permissionDecision allow/deny/ask (+ modifiedArgs); agentStop/subagentStop return decision block/allow to force another agent turn; permissionRequest returns behavior allow/deny ahead of the permission service — documented under the per-event 'decision control' headings"
        confidence: confirmed
      input_modification:
        supported: true
        mechanism: "preToolUse output field modifiedArgs substitutes tool arguments before execution — documented under 'preToolUse decision control'"
        confidence: confirmed
      async_execution:
        supported: false
        mechanism: "Copilot CLI hooks run synchronously; no async execution documented (only the notification event itself fires asynchronously)"
        confidence: inferred
      hook_scopes:
        supported: true
        mechanism: "hooks load and combine from four scopes in order: policy-level files, user-level (~/.copilot), project (.github/hooks/*.json plus settings.json inline blocks), and plugin-contributed — documented under 'Hooks locations'"
        confidence: confirmed
      json_io_protocol:
        supported: true
        mechanism: "hooks receive event-specific JSON payloads on stdin (inline schema per event under 'Hook event input payloads') and return JSON decision/output objects on stdout (preToolUse, postToolUse, agentStop, permissionRequest)"
        confidence: confirmed
      context_injection:
        supported: true
        mechanism: "postToolUse and sessionStart output field additionalContext injects text into the agent session — documented under 'postToolUse output' and the sessionStart row of 'Hook events'"
        confidence: confirmed
      permission_control:
        supported: true
        mechanism: "permissionRequest hook fires before the permission service (rule checks, session approvals, auto-allow/deny, user prompting) and its behavior allow/deny decision preempts it — documented under 'permissionRequest decision control' (CLI only; cloud agent pre-approves tools)"
        confidence: confirmed
    provider_extensions:
      - id: hook_event_types
        name: Thirteen Hook Event Types
        summary: "Thirteen named events (sessionStart, sessionEnd, userPromptSubmitted, preToolUse, postToolUse, postToolUseFailure, agentStop, subagentStart, subagentStop, errorOccurred, preCompact, notification, permissionRequest) receive event-specific JSON payloads via stdin; a subset also processes JSON output."
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/reference/hooks-reference.md"
        graduation_candidate: true
        conversion: translated

      - id: hook_config_format
        name: JSON Hook Configuration File
        summary: "Hooks use a {version, hooks:{EVENT_NAME:[...]}} schema loaded from policy directories, user level, .github/hooks/*.json, settings.json inline blocks, and plugins; each entry has type (command|http|prompt) plus type-specific fields (bash/powershell/cwd/timeoutSec for command, url/headers for http, prompt text for prompt) and an optional matcher regex."
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/reference/hooks-reference.md"
        graduation_candidate: false
        conversion: translated

      - id: pre_tool_use_deny
        name: Pre-Tool-Use Decision Gate
        summary: 'preToolUse controls tool execution by returning {permissionDecision:"allow"|"deny"|"ask", permissionDecisionReason:"...", modifiedArgs:{...}}; under cloud agent "ask" is treated as "deny".'
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/reference/hooks-reference.md"
        graduation_candidate: true
        conversion: translated
        provider_field: permissionDecision
    loading_model: >
      Hooks load at session start from four sources in order — policy-level files,
      user-level (~/.copilot), project (`.github/hooks/*.json` plus inline blocks in
      `.github/copilot/settings.json`), and plugin-contributed — and are combined:
      when the same event appears in multiple sources, all entries run in declaration
      order. The cloud agent loads only `.github/hooks/*.json` from the cloned repo.
      Hook scripts receive event-specific JSON on stdin and write JSON to stdout;
      preToolUse, postToolUse, agentStop/subagentStop, and permissionRequest outputs
      are acted upon. Scripts must exit 0 for success. Default timeout is 30 seconds
      per hook, overridable via `timeoutSec`.
    notes: >
      The 2026 hooks-reference.md restructure (successor to hooks-configuration.md,
      drift issue #7) documents a substantially richer system than the original six
      shell-only events: 13 events across CLI and cloud agent, three handler types
      (command/HTTP/prompt), matcher regex filtering, argument modification, context
      injection, and a permissionRequest gate ahead of the permission service —
      structurally close to Claude Code hooks. The canonical event names
      (before_tool_execute, after_tool_execute, etc.) still have no direct 1:1
      mapping to Copilot's camelCase names. PowerShell is a first-class script
      target alongside Bash, making hooks functional on Windows without WSL. The
      use-hooks.md source (hooks-1) redirects to reusable content shared with the
      cloud agent; hooks-reference.md (hooks-0) is the authoritative schema source.

