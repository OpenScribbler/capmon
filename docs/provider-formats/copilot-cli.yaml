      - id: cli_management_commands
        name: CLI Skill Management Commands
        summary: "The /skills slash-command suite (list, info, add, reload, remove) provides runtime skill management without restart; /skills remove works only for directly-added skills, not plugin-bundled skills. The same list/add/remove operations are also available non-interactively from the terminal via the `copilot skill` subcommand (e.g. `copilot skill list`, `copilot skill add <FILE|URL|DIRECTORY>`)."
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/how-tos/copilot-cli/customize-copilot/add-skills.md"
        graduation_candidate: false
        conversion: not-portable
    loading_model: >
      Copilot loads skills "when relevant" to the current task — the loading trigger is
      model-driven relevance, not explicit user invocation (though explicit /skill-name
      invocation is also supported). Skills are directories; the full directory (instructions,
      scripts, resources) is the unit of loading. No lazy-loading or on-demand file loading
      semantics are described in the source material. Skill locations are scanned from project
      paths (.github/skills/, .claude/skills/, .agents/skills/) and personal paths
      (~/.copilot/skills/, ~/.agents/skills/) at session start; additional locations can be
      registered via `/skills add` and loaded into a running session via `/skills reload`.
    notes: >
      Copilot CLI implements the Agent Skills open standard (now hosted at
      github.com/agentskills/agentskills; the source link changed from agentskills.io in the
      2026-07 docs update). Skills are folders of instructions, scripts, and resources — not
      single markdown files. The standard uses a fixed SKILL.md entrypoint but the skill
      directory can contain additional supporting files. Organization-level and enterprise-level
      skills (shared_scope) are no longer marked "coming soon" — the removal landed in commit
      425f5b15, and the CLI command reference now documents an org/enterprise "Remote" skill
      scope projected via the AHP relay and fetched on demand. This is flipped to supported: true
      (inferred) but flagged: the cited skills how-to/concept sources (about-agent-skills.md,
      add-skills.md) do not yet document the remote scope; the evidence is in
      cli-command-reference.md. Skills can be sourced from public collections such as
      anthropics/skills and github/awesome-copilot, and also managed via `gh skill` in the
      GitHub CLI. The CLI-specific management surface (list, info, add, reload, remove, toggle)
      is unique among providers and provides runtime skill management without session restart;
      the same list/add/remove operations are now also exposed non-interactively via the
      `copilot skill` terminal subcommand (commit d22329f2). The personal scope paths confirmed
      in the updated source are ~/.copilot/skills/ and ~/.agents/skills/ — ~/.claude/skills/ is
      listed only as a project-scope path (.claude/skills/) and is not confirmed for personal
      scope in the current source.

