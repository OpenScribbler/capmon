        summary: An always-on .github/copilot-instructions.md at the repo root applies to every request made in that repository's context.
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/how-tos/copilot-cli/customize-copilot/add-custom-instructions.md"
        graduation_candidate: true
