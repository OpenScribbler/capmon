        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/concepts/context/mcp.md"
        graduation_candidate: false
        conversion: not-portable
    loading_model: >
      MCP servers are loaded from `~/.copilot/mcp-config.json` (personal) and from
      `.vscode/mcp.json` in the workspace. Plugins can also contribute MCP configurations
      via `.mcp.json` in the plugin root or `.github/mcp.json`. MCP servers from multiple
      sources are merged with last-writer-wins semantics on server name conflicts (plugins
      override personal config; `--additional-mcp-config` flag overrides plugins). The
      built-in GitHub MCP server is always present and cannot be overridden by user config
      (but can be disabled with `--disable-builtin-mcps`). New servers added via `/mcp add`
      are available immediately in the running session. The mcp.md concepts source confirms
      Copilot CLI supports both local and remote MCP servers.
    notes: >
      Copilot CLI has broad MCP support: local (stdio) and remote (HTTP/SSE) server types
      confirmed in the updated concepts/context/mcp.md source, per-server tool filtering,
      a built-in GitHub MCP server, interactive management via /mcp slash commands, and
      terminal management via `copilot mcp` subcommands (add/list/get/remove). The 2026-06
      add-mcp-servers.md rewrite (commit 444e74af) documents STDIO/HTTP/SSE transport choices
      explicitly (HTTP = Streamable HTTP, SSE = legacy, deprecated but supported), the
      `copilot mcp add` CLI with --transport/--env/--header/--tools/--timeout flags, and the
      experimental `/mcp search` registry browser/installer (flipped marketplace to supported).
      Two capability flips this pass: (1) marketplace — `/mcp search` provides in-CLI registry
      browse+install (experimental); (2) enterprise_management — org/enterprise registry URL +
      allowlist policies now apply to the CLI (commit a93dc7a). CAUTION on (2):
      about-copilot-cli.md's "Known MCP server policy limitations" still lists the org
      MCP-Registry-URL and MCP-enablement policies as unsupported, contradicting
      add-mcp-servers.md — surfaced for the maintainer. The stdio type is accepted as an alias
      for local for compatibility with VS Code and Claude Code MCP configurations. The GitHub
      MCP Registry (github.com/mcp) is documented as a discovery resource and is in public
      preview.

