    loading_model: "Pi uses progressive disclosure for skill loading. At startup, the scanner traverses all configured skill locations (global ~/.pi/agent/skills/ and ~/.agents/skills/, project .pi/skills/ and .agents/skills/ in cwd and ancestor directories up to git repo root or filesystem root, settings-array paths, CLI --skill paths, and package.json/skills/ entries) and extracts only names and descriptions. These are injected into the system prompt as XML per the agentskills.io specification. When the agent determines a task matches a skill, it uses the read tool to load the full SKILL.md on-demand. Skills with disable-model-invocation: true are excluded from the system prompt entirely and can only be loaded via explicit /skill:name commands. The scanner skips node_modules, honors symlinks (with cycle-safe realpath deduplication), and respects .gitignore/.ignore/.fdignore files. Name collisions warn and retain the first skill found. Project-scoped locations (.pi/skills/ and .agents/skills/) load only after the project is trusted (project trust gating, commit 89a9220)."
    notes: "Pi implements the agentskills.io open standard. The TypeScript SkillFrontmatter interface defines only name, description, and disable-model-invocation — license, compatibility, and metadata are documented in the spec table and passed through at parse time (unknown frontmatter fields are ignored per docs). Skills with missing description are silently dropped; all other validation issues produce warnings but still load. As of commit 5d31e70 Pi no longer validates that a skill's name matches its parent directory (the Agent Skills standard requires it; Pi intentionally relaxes this so shared skill directories can be reused across harnesses). Pi supports the richest skill location model of any known provider: five distinct source types (global dir, project dir, .agents/ cross-provider dir, package.json/monorepo, settings array, CLI flags). The .agents/skills/ discovery for project scope now covers ancestor directories up to the git repo root, enabling monorepo-level sharing."

