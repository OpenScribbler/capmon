        conversion: not-portable
    loading_model: "At startup pi scans all configured prompt template locations and collects *.md files non-recursively. Each file's name (without .md) becomes the command name. The description is read from frontmatter if present, otherwise from the first non-empty content line. The argument-hint field, if present in frontmatter, is shown before the description in autocomplete. All templates are registered as slash commands and appear in / autocomplete. When the user invokes /name [args], the template body is expanded with argument substitution and sent as the user's message to the agent. Project-scoped templates (.pi/prompts/*.md) load only after the project is trusted (project trust gating, commit 89a9220)."
    notes: "Pi calls these 'prompt templates' not 'commands'. The format is simpler than most providers' command systems: plain Markdown with optional frontmatter, no scripting or tool access. The argument substitution syntax ($1, $@, ${@:N}, and now ${1:-default} for optional args with fallback values, added commit d81ac20) is richer than typical slash command implementations and makes templates genuinely parameterizable. A new argument-hint frontmatter field (documented in this version) lets template authors advertise expected argument shapes in autocomplete without affecting template behavior. Discovery sources mirror the skills pattern exactly (global, project, packages, settings, CLI), making the mental model consistent across content types."

  agents:
    status: unsupported
    sources: []
    canonical_mappings: {}
    provider_extensions: []
    notes: "Pi's author explicitly rejects native sub-agent support — pi exposes no on-disk file format for user-defined agents with their own system prompts, tool restrictions, or scopes. Community extensions (pi-subagents, oh-my-pi) exist but per capmon's provider-eligibility rule do not count toward native support. Whether community extensions should graduate to a separate provider entry is an open question."

  mcp:
    status: unsupported
    sources: []
    canonical_mappings: {}
    provider_extensions: []
    notes: "Pi's author explicitly rejects native MCP support — pi has no on-disk MCP configuration surface, no transport configuration, and no built-in MCP client. Community extensions (pi-mcp-adapter) exist but per capmon's provider-eligibility rule do not count toward native support."
