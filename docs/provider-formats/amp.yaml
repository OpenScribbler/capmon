  hooks:
    # ── 2026-07 re-curation onto Amp's TypeScript Plugin API (bead capmon-hen) ──
    # Amp's declarative hooks model (amp.hooks array; tool:pre-execute / tool:post-execute
    # events; send-user-message / redact-tool-input actions) is GONE — the "#hooks" anchor
    # no longer exists on /manual?internal. It was replaced by a TypeScript Plugin API:
    # plugins are .ts files that export a default fn receiving a PluginAPI, and subscribe to
    # lifecycle events via amp.on(). The Plugin API self-describes as experimental (the
    # Plugins guide, the plugin-api page, and the "limited experimental release" note on
    # global plugins), so every re-mapped canonical claim below is set to confidence:
    # inferred rather than confirmed, even where the live docs are explicit. permission_control
    # and matcher_patterns are kept aligned with the recognizer (recognize_amp.go), which is
    # still anchored on the legacy-permissions-rules.txt appendix.
    status: supported
    sources:
      - uri: "https://ampcode.com/manual/plugin-api"
        type: documentation
        fetch_method: http
        content_hash: "sha256:3c9915bcfb5f88c14b70b693d7d94284aa9111da3d4929ed24dd779feaf40b72"
        fetched_at: "2026-07-14T01:20:24Z"
      - uri: "https://ampcode.com/manual?internal"
        type: documentation
        fetch_method: http
        content_hash: "sha256:8d8be3f5807ed1c0acc62646c7a422ca964dfab29dcbebf64735826477fc6963"
        fetched_at: "2026-07-14T01:20:24Z"
      - uri: "https://ampcode.com/manual/appendix/legacy-permissions-rules.txt"
        type: documentation
        fetch_method: http
        content_hash: "sha256:e7a21d87492bae8fb92774c1446e063bff0b5490dbd84f947a149192b6961c6c"
        fetched_at: "2026-07-14T00:37:57Z"
    canonical_mappings:
      handler_types:
        status: mapped
        provider_field: "amp.on"
        mechanism: "TypeScript handlers, not shell-command-only: amp.on(event, async (event, ctx) => {...}) handlers are TypeScript functions run in Amp's Bun runtime. A handler can shell out via ctx.$ (Bun shell), classify via amp.ai.ask(), and spawn subagents via amp.getBuiltinAgent()/createAgent(); custom agent-callable tools are added with amp.registerTool({name, description, inputSchema, execute})."
        confidence: inferred
      matcher_patterns:
        status: mapped
        provider_field: "amp.permissions.matches"
        mechanism: "amp.on() event subscriptions carry NO declarative matcher — a handler fires for every event of its type and discriminates in code (e.g. checking event.tool, or regex on the shell command). Declarative pattern matching survives only in the legacy amp.permissions rules (glob '*' and regex '/.../' match conditions), now applied by the internal compatibility plugin."
        confidence: inferred
      decision_control:
        status: mapped
        provider_field: "amp.on('tool.call')"
        mechanism: "A tool.call handler returns a ToolCallResult union: {action: 'allow'}, {action: 'reject-and-continue', message}, {action: 'modify', input}, {action: 'synthesize', result: {output, exitCode?}}, or {action: 'error', message} — richer than the retired send-user-message / exit-code model."
        confidence: inferred
      input_modification:
        status: mapped
        provider_field: "amp.on('tool.call')"
        mechanism: "A tool.call handler returns {action: 'modify', input: Record<string, unknown>} to replace the tool's input arguments before it executes."
        confidence: inferred
      async_execution:
        status: absent
        mechanism: "Plugin event handlers are async TypeScript functions awaited inline in the request/response flow (a tool.call blocks until the handler resolves); no fire-and-forget or background hook execution is documented, and there is no session.end event."
        confidence: inferred
      hook_scopes:
        status: mapped
        provider_field: ".amp/plugins/"
        mechanism: "Three plugin load locations: project (.amp/plugins/*.ts), system / per-machine user (~/.config/amp/plugins/*.ts; %USERPROFILE%\\.config\\amp\\plugins\\*.ts on Windows), and global (configured in workspace settings and applied to every workspace member — a limited experimental release)."
        confidence: inferred
      json_io_protocol:
        status: absent
        mechanism: "Plugins are in-process TypeScript modules; handlers exchange typed event objects and typed return values through the @ampcode/plugin PluginAPI, not a serialized JSON stdin/stdout protocol."
        confidence: inferred
      context_injection:
        status: mapped
        provider_field: "amp.on('agent.start')"
        mechanism: "Several injection points: agent.start returns {message: {content, display?}} to append a message after the user's content (docs: 'Allows adding context messages or modifying the system prompt'); tool.result returns a replacement {status, output} to rewrite a tool result before it reaches the model; agent.end returns {action: 'continue', userMessage} to start a follow-up turn; and ctx.thread.append(...) appends to the active thread."
        confidence: inferred
      permission_control:
        status: mapped
        provider_field: "amp.on('tool.call')"
        mechanism: "Amp no longer prompts before running tools; a tool.call handler makes the decision ({action: 'allow' | 'reject-and-continue' | 'synthesize'}). Legacy amp.permissions / amp.guardedFiles.allowlist / amp.dangerouslyAllowAll(=false) settings are enforced by an internal compatibility plugin that Amp auto-activates when it detects them."
        confidence: inferred
    provider_extensions:
      # The 7 declarative-hooks extensions (settings_json_merge, command_handler_only,
      # hook_events, hook_action_send_user_message, hook_action_redact_tool_input,
      # hook_match_input_contains, hook_config_location) were RETIRED in the 2026-07
      # re-curation — they described the amp.hooks array / tool:pre-execute model and cited
      # the dead "#hooks" anchor. They are replaced by the plugin-model extensions below.
      - id: plugin_ts_files
        name: "TypeScript plugins export a default function"
        summary: "A plugin is a .ts file that exports 'export default function (amp: PluginAPI) {...}' (import type { PluginAPI } from '@ampcode/plugin'); code in the body runs at load. Reload via 'plugins: reload' in the command palette (Ctrl+O); 'plugins: list' shows loaded plugins and their registered events/commands/tools."
        source_ref: "https://ampcode.com/manual?internal"
        graduation_candidate: false
        conversion: not-portable
      - id: plugin_locations
        name: "Three plugin load locations"
        summary: "Project plugins in .amp/plugins/*.ts, system (per-machine) plugins in ~/.config/amp/plugins/*.ts, and experimental global plugins configured in workspace settings and applied to every workspace member."
        source_ref: "https://ampcode.com/manual?internal"
        graduation_candidate: false
        conversion: not-portable
        provider_field: ".amp/plugins/"
      - id: amp_on_events
        name: "amp.on() lifecycle event map"
        summary: "amp.on(name, handler) subscribes to five native events in order session.start then agent.start then (tool.call then tool.result, per tool) then agent.end. tool.call/tool.result/agent.start/agent.end are request events whose handlers return typed results; session.start is fire-and-forget. There is no session.end event."
        source_ref: "https://ampcode.com/manual/plugin-api"
        graduation_candidate: false
        conversion: not-portable
        provider_field: "amp.on"
      - id: tool_call_result_actions
        name: "tool.call ToolCallResult actions"
        summary: "A tool.call handler returns one of: allow, reject-and-continue (with message), modify (new input), synthesize (result output/exitCode without running the tool), or error (halts the thread worker)."
        source_ref: "https://ampcode.com/manual/plugin-api"
        graduation_candidate: true
        conversion: not-portable
        provider_field: "amp.on('tool.call')"
      - id: tool_result_middleware
        name: "tool.result can rewrite a tool result"
        summary: "A tool.result handler fires after a tool finishes and before the result is sent to the model; returning a replacement {status, output/error} rewrites the result, or returning nothing keeps the original."
        source_ref: "https://ampcode.com/manual/plugin-api"
        graduation_candidate: false
        conversion: not-portable
        provider_field: "amp.on('tool.result')"
      - id: agent_lifecycle_injection
        name: "agent.start / agent.end context control"
        summary: "agent.start returns {message: {content, display?}} to add context after the user's content or modify the system prompt; agent.end returns {action: 'continue', userMessage} to auto-start a follow-up turn (guard against loops)."
