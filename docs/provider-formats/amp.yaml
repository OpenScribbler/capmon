        name: "Command palette skill management"
        summary: "The 2026-07 rewrite of this page trimmed skill management to a single 'Viewing Skills' section documenting only 'skill: list' (View installed skills) via the command palette (Ctrl+O in the CLI). The previously documented 'amp skill' CLI verbs ('skill: add', 'skill: remove') and install sources (GitHub shorthand org/repo/path, git URL, local path) are no longer documented on this page. UNCERTAIN whether those CLI paths still exist in the product — skills curation is anchored solely on this source, so the claim is treated as no-longer-documented."
        source_ref: "https://ampcode.com/manual/agent-skills.md"
        graduation_candidate: false
        conversion: not-portable
      - id: building_skills_assistant
        name: "Built-in 'building-skills' skill"
        summary: "Amp ships a built-in 'building-skills' skill that authors new skills tailored to the current codebase via natural-language request (e.g., 'Create a skill for deploying to staging'); user picks 'project-specific' or 'user-wide' scope."
        source_ref: "https://ampcode.com/manual/agent-skills.md"
        graduation_candidate: false
        conversion: not-portable
      - id: auto_invocation
        name: "Automatic model-driven invocation"
        summary: "Model auto-selects skill by matching user request against frontmatter name/description; SKILL.md body loads on demand."
        source_ref: "https://ampcode.com/manual/agent-skills.md"
        graduation_candidate: false
        graduation_notes: "Graduated to auto_invocable canonical key (issue #73)."
        conversion: embedded
    loading_model: "Lazy — name and description (frontmatter) are always visible to the model and loaded at startup; SKILL.md body is loaded on demand when the skill is invoked. MCP tools bundled in a skill (mcp.json) remain hidden until the skill is loaded. Skill precedence order (first wins), per the 2026-07 rewrite of the doc: ~/.config/agents/skills/, ~/.agents/skills/, ~/.config/amp/skills/, .agents/skills/, .claude/skills/, ~/.claude/skills/, then plugins, legacy toolbox directories, and built-in skills."
    notes: >
      Skill names must be unique per scope. Per the documented precedence list, user-wide
      (~/.config/agents/skills/) skills have higher priority than project-specific (.agents/skills/)
      skills — note: the source prose still says "project-specific skills take priority over user-wide" but
      the explicit precedence list contradicts this; the list is treated as authoritative.
      Project skills in .agents/skills/ can be committed to git so the whole team gets them
      automatically. Cross-agent compat paths (.claude/skills/, ~/.claude/skills/) are discovered
      but at lower precedence than amp-native paths.
      The 2026-07 rewrite of this page (fetched_at 2026-07-13) added the ~/.agents/skills/ user-wide
      path, dropped the dedicated "Installing Skills" and "Executable Tools in Skills" sections,
      demoted toolbox directories to "legacy" discovery-only status, and trimmed skill management to
      a single "Viewing Skills" section (skill: list). MCP-server bundling (mcp.json), the
      building-skills built-in skill, bundled passive resources, and lazy frontmatter-first loading
      are all unchanged and still documented.
