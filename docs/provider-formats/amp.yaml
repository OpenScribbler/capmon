        graduation_candidate: false
        conversion: not-portable
    loading_model: "Plugins load at startup from three locations (project .amp/plugins/*.ts, system ~/.config/amp/plugins/*.ts, experimental workspace-global). Each plugin is a TypeScript module whose default-exported function receives a PluginAPI and registers event handlers (amp.on), tools (amp.registerTool), and commands (amp.registerCommand) at load; body code runs immediately, and session.start fires per thread session. Handlers are awaited inline within the agent lifecycle (session.start → agent.start → tool.call → tool.result → agent.end); request-typed events (tool.call, tool.result, agent.start, agent.end) block on their handler's returned result. Edited plugins are re-loaded via 'plugins: reload'. Legacy amp.permissions rules, when present in settings, are applied by an internal compatibility plugin evaluated as an ordered first-match-wins list."
    notes: >
      Re-curated 2026-07 (bead capmon-hen). Amp's declarative hooks model — the amp.hooks
      array with tool:pre-execute / tool:post-execute events and send-user-message /
      redact-tool-input actions — was RETIRED; the "#hooks" anchor no longer exists on
      https://ampcode.com/manual?internal (the /manual/hooks.md page was retired earlier, in
      2026-04). Hooks are now a TypeScript Plugin API (Plugins section of the manual +
      https://ampcode.com/manual/plugin-api). Plugins subscribe to five amp.on() events
      (session.start, agent.start, tool.call, tool.result, agent.end); tool.call handlers can
      allow / reject-and-continue / modify / synthesize a call, tool.result handlers can rewrite
      a result, and agent.start/agent.end can inject context or start a follow-up turn. Compared
      with the old model this flipped four canonical keys: handler_types (now TypeScript, not
      command-only), input_modification (now true via {action:'modify'}), hook_scopes (now true —
      three load locations), and context_injection (now true — agent.start/tool.result/agent.end);
      decision_control and permission_control are re-mapped as richer. Every plugin-based claim is
      set to confidence: inferred because the Plugin API is documented as experimental (the
      "limited experimental release" note on global plugins and the guide's framing). The legacy
      'permissions' system survives via an internal compatibility plugin auto-activated when
      amp.permissions / amp.guardedFiles.allowlist / amp.dangerouslyAllowAll is present; its
      ordered allow/reject/ask/delegate rules (glob + regex match conditions, context restriction,
      external delegation) remain documented at legacy-permissions-rules.txt, which is still the
      recognizer anchor (recognize_amp.go ampHooksLandmarkOptions) for matcher_patterns and
      permission_control.
