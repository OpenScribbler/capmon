    notes: "Amp's stated position is that user-definable custom subagents are 'not yet implemented' (https://ampcode.com/agents-for-the-agent). Built-in subagents (Oracle, Librarian, Painter, Code-Review) ship in the binary and are not user-overridable. The only user-definable agent-shaped surface is '.agents/checks/<name>.md' — code-review-only review subagents — which is too narrow to satisfy the general-purpose agents content type. Per capmon's provider-eligibility rule, narrow code-review-only checks do not count as native agents support."
