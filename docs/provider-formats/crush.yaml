        mechanism: "Go Skill struct field DisableModelInvocation (yaml:\"disable-model-invocation\", optional boolean) in skills.go. ToPromptXML skips skills with this flag set, excluding them from the model's <available_skills> list per the Agent Skills standard."
        confidence: confirmed
      user_invocable:
        supported: true
        provider_field: "user-invocable"
        mechanism: "Go Skill struct field UserInvocable (yaml:\"user-invocable\", optional boolean) in skills.go. When true, the skill is invocable as a command from the commands palette (Ctrl+P); Skill.FormatInvocation() loads its instructions into the conversation context. Global-dir skills appear as user:<name>, project-dir skills as project:<name>."
        confidence: confirmed
    provider_extensions:
      - id: agent_skills_standard
        name: Anthropic Agent Skills standard frontmatter
        summary: Frontmatter follows the Agent Skills open standard (agentskills.io) with name, description, license, compatibility, metadata, disable-model-invocation, and user-invocable fields.
        source_ref: "https://raw.githubusercontent.com/charmbracelet/crush/main/internal/skills/skills.go"
        graduation_candidate: true
        conversion: preserved
      - id: cross_provider_discovery
        name: Cross-provider skill discovery
        summary: Crush discovers skills from .agents/skills/ (cross-provider convention) in addition to .crush/skills/ (native) and ~/.config/crush/skills/ (user global).
        source_ref: "https://raw.githubusercontent.com/charmbracelet/crush/main/internal/skills/skills.go"
        graduation_candidate: true
        conversion: preserved
      - id: name_directory_constraint
        name: Skill name must match directory name
        summary: Crush validates that the skill name from SKILL.md frontmatter matches the directory basename containing the SKILL.md file. Skills failing this check are rejected at load time.
        source_ref: "https://raw.githubusercontent.com/charmbracelet/crush/main/internal/skills/skills.go"
        graduation_candidate: false
        conversion: not-portable
    loading_model: "A skill is a directory containing a SKILL.md file. Crush discovers skills from .crush/skills/<name>/SKILL.md (native project scope), .agents/skills/<name>/SKILL.md (cross-provider project convention), and ~/.config/crush/skills/<name>/SKILL.md plus ~/.agents/skills/<name>/SKILL.md (user global scope). The skills_paths option in crush.json allows configuring additional discovery paths. The SKILL.md YAML frontmatter supplies name and description; the Markdown body contains instructions that guide agent behavior when the skill is active. Skills are deduplicated by name; last path wins."
    notes: "Implements the Agent Skills open standard (https://agentskills.io). Frontmatter keys license, compatibility, and metadata are optional. The disable-model-invocation and user-invocable keys are now explicit fields on the Go Skill struct (added upstream commit 6716ef0, 2026-05-08): DisableModelInvocation skips a skill from the model's <available_skills> XML, and UserInvocable exposes the skill as a Ctrl+P commands-palette command via Skill.FormatInvocation(). The skill directory base name must match the frontmatter name field; mismatches are rejected at load time."

