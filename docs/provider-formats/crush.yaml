provider: crush
docs_url: "https://github.com/charmbracelet/crush"
category: cli
# Provenance note (Q5, plan 2026-04-17 §2e):
# Crush is an independent Charm project. Its lineage traces to the archived
# opencode-ai/opencode, whose original author continued the work at Charm.
# sst/opencode is a separate fork of the same archived ancestor by a different
# team. Crush and sst/opencode are sibling successors, not parent/child.
# Licensed under the Charm License (proprietary).
#
# Upstream Charm documentation for Crush is incomplete — the official README
# and schema cover MCP and config but say little about rules, skills, or
# content conventions. Facts marked `inferred` below are drawn from:
#   1. charmbracelet/crush Go source (internal/skills/skills.go, schema.json,
#      AGENTS.md at project root),
#   2. Community convention (the Anthropic Agent Skills standard at
#      agentskills.io, which Crush's skill loader implements),
#   3. Analogy with the preceding OpenCode format (the archived ancestor and
#      Crush's sibling successor sst/opencode).
# Confirmed facts are backed by direct upstream source references.
last_fetched_at: "2026-07-16T00:33:50Z"
last_changed_at: "2026-07-13T18:19:35Z"
