        mechanism: "Crush documents context files at the project root only; no hierarchical/subdirectory loading documented"
        confidence: inferred
    provider_extensions:
      - id: crush_md_variant
        name: CRUSH.md Crush-specific variant
        summary: Crush additionally recognizes a project-scope CRUSH.md file as a Crush-specific rules variant alongside the cross-provider AGENTS.md convention.
        source_ref: "https://raw.githubusercontent.com/charmbracelet/crush/main/AGENTS.md"
        graduation_candidate: false
        conversion: translated
      - id: multi_provider_context_files
        name: Multi-provider context file recognition
        summary: Crush reads AGENTS.md, CRUSH.md, CLAUDE.md, and GEMINI.md (plus .local variants) as context files, enabling rules written for other providers to be loaded without modification.
        source_ref: "https://raw.githubusercontent.com/charmbracelet/crush/main/AGENTS.md"
        graduation_candidate: false
        conversion: preserved
      - id: context_paths_configurable
        name: Configurable context_paths and initialize_as
        summary: The crush.json options block supports context_paths (an array of additional file paths to load as context) and initialize_as (sets the default rules filename, e.g. AGENTS.md, CRUSH.md, CLAUDE.md). This allows teams to direct Crush at arbitrary rule file locations.
        source_ref: "https://raw.githubusercontent.com/charmbracelet/crush/main/schema.json"
        graduation_candidate: false
        conversion: not-portable
      - id: global_context_paths
        name: User-global context files
        summary: The crush.json options block supports global_context_paths (an array of file or folder paths loaded as cross-project context), defaulting to ~/.config/crush/CRUSH.md and ~/.config/AGENTS.md. A folder entry recursively loads all .md files within it. This provides a user-global rules scope in addition to the project-scope context files.
        source_ref: "https://raw.githubusercontent.com/charmbracelet/crush/main/schema.json"
        graduation_candidate: false
        conversion: not-portable
    loading_model: "Rules are plain Markdown files at the project root, with no YAML frontmatter. Crush reads AGENTS.md as the default cross-provider convention (controlled by the initialize_as option); it additionally recognizes CRUSH.md, CLAUDE.md, GEMINI.md, and their .local variants. The context_paths option in crush.json allows specifying additional project file paths, and the global_context_paths option (default ~/.config/crush/CRUSH.md and ~/.config/AGENTS.md) supplies user-global context files loaded across all projects. Rule content is loaded as context for the agent at session start."
    notes: "Crush now documents user-global context files via the global_context_paths option (default ~/.config/crush/CRUSH.md and ~/.config/AGENTS.md; added upstream commit 6242e4f, 2026-05-27), in addition to project-scope context files. Project-tree hierarchical/subdirectory loading (cwd-relative cascade) is still not documented — inferred unsupported pending upstream clarification; a global_context_paths folder entry recursively loads .md files, but that is a configured global path rather than a cwd-relative hierarchy."

