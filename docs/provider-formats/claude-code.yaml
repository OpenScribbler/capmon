      - id: bundled_skills
        name: Bundled Skills
        summary: "Claude Code ships built-in prompt-based skills (e.g. /doctor, /code-review, /batch, /debug, /loop, /claude-api, /dataviz, /design-sync, /run, /verify, /run-skill-generator, /simplify, /fewer-permission-prompts), marked [Skill] in the commands reference and immune to the shell-execution policy. Disable them via the disableBundledSkills setting; /doctor is exempt (CC v2.1.205+, stays typable when the setting is on) and is hidden instead via the DISABLE_DOCTOR_COMMAND env var or a skillOverrides doctor: off entry."
