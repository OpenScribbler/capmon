      Hooks are defined in JSON settings files and loaded at session start. Component-scoped hooks
      (in skill/agent frontmatter) are registered when the component activates and cleaned up when
      it finishes. Direct edits to hook settings files are normally picked up automatically by a
      file watcher. The /hooks command provides a read-only in-session browser showing all configured
      hooks, their types, sources, and handler details. Identical handlers are deduplicated:
      command hooks by command string, HTTP hooks by URL.
    notes: >
      The canonical hook vocabulary is owned by the ACIF-HOOK spec. Claude Code's native hook event
      names (PreToolUse, PostToolUse, SessionStart, etc.) are Pascal-case. Claude Code's native tool
      names in matchers are the internal tool identifiers (Bash, Edit, Write, Read, Glob, Grep, Agent,
      WebFetch, WebSearch, AskUserQuestion, ExitPlanMode, mcp__<server>__<tool>). The canonical
      format uses snake_case event names and descriptive tool names; installers translate between
      the two.

