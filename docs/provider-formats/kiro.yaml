        graduation_candidate: false
        graduation_notes: "Spec task execution is a Kiro-specific concept with no cross-provider equivalent."
        conversion: not-portable
      - id: kiro_hook_agent_turn_trigger
        name: "Agent turn completion trigger"
        summary: "Hook trigger that fires after each agent turn completes, enabling automated follow-up actions."
        source_ref: "https://kiro.dev/docs/hooks/"
        graduation_candidate: false
        graduation_notes: "Agent turn completion trigger is IDE-specific and not representable as a portable shell hook event."
        conversion: not-portable
      - id: kiro_hook_json_file_format
        name: "JSON hook file format (.kiro/hooks/)"
        summary: "As of the 2026-07-09 rewrite, hooks can be authored directly as JSON files in .kiro/hooks/ at the workspace level, alongside natural-language and form-based UI creation. Each file has a 'version' string and a 'hooks' array; each hook declares name, optional description, trigger, matcher (regex, defaults to always-match), action ({type: command, command} or {type: agent, prompt}), timeout (seconds; 0 disables, ignored for agent actions), and enabled."
        source_ref: "https://kiro.dev/docs/hooks/"
        graduation_candidate: false
        graduation_notes: "The rewrite introduced a documented portable JSON format; its core fields (trigger, matcher, block-via-exit-code, STDOUT-to-context) are now captured by the canonical hooks keys matcher_patterns, decision_control, and context_injection."
        conversion: translated
      - id: kiro_hook_file_operation_triggers
        name: "File operation triggers (save, create, delete)"
        summary: "Hook triggers that fire on file save, file create, and file delete events within the IDE, enabling automated responses to file lifecycle changes."
        source_ref: "https://kiro.dev/docs/hooks/"
        graduation_candidate: false
        graduation_notes: "File operation triggers are common across IDE hook systems but Kiro's are IDE-internal and not portable as structured hook config."
        conversion: not-portable
    loading_model: "Hooks are IDE-managed event listeners defined either as JSON files in .kiro/hooks/ (workspace) or via the Kiro panel (natural-language description or manual form). The documented triggers are: SessionStart (session begins), Stop (agent completes its turn), PreToolUse / PostToolUse (regex match on tool name; PreToolUse can block), PreTaskExec / PostTaskExec (spec task lifecycle; PreTaskExec can block), UserPromptSubmit (can block), and PostFileCreate / PostFileSave / PostFileDelete (regex match on file path). Each hook specifies a trigger, an optional matcher regex, and an action (agent prompt or shell command). Command actions signal via exit codes: 0 = success (STDOUT added to context for SessionStart/UserPromptSubmit), 2 = block execution (PreToolUse/UserPromptSubmit/PreTaskExec only; STDERR returned to the agent), any other = warning shown but execution proceeds. Manual on-demand hooks were removed and replaced by manual steering files."
    notes: "Kiro's hook system is called 'Agent hooks' in documentation to distinguish it from code-level hooks. The 2026-07-09 rewrite added a documented portable JSON file format (.kiro/hooks/, version + hooks[] with name/trigger/matcher/action/timeout/enabled), flipping matcher_patterns, decision_control, and context_injection from unsupported to supported. Block is exit-code-only (no allow/modify), the I/O protocol is exit-code + STDOUT/STDERR text (not JSON messages), and hooks are workspace-scoped only. The former manual on-demand hook trigger was removed in favor of manual steering files. Use cases highlighted include maintaining code consistency, preventing security issues, reducing manual work, standardizing processes, and accelerating development cycles."

