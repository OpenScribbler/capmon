        mechanism: "Kiro handles browser-based OAuth flows automatically for remote MCP servers, using Dynamic Client Registration (DCR) by default; documented under 'OAuth authentication' heading (added 2026-06-10). For providers without DCR, oauth.clientId + oauthScopes (and optional oauth.redirectUri) are supplied per server. Only public PKCE clients (no client secret) are supported; expired tokens trigger automatic browser re-authentication."
