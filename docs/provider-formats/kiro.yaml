        graduation_candidate: true
        graduation_notes: "Per-server tool-level auto-approval is a cross-provider useful pattern — other providers (e.g. Claude Desktop) support similar autoApprove arrays. Worth canonicalizing."
        provider_field: autoApprove
        conversion: embedded
      - id: kiro_mcp_disabled_tools
        name: "disabledTools per-server list"
        summary: "Per-server 'disabledTools' array suppressing specific tools without disabling the entire server."
        source_ref: "https://kiro.dev/docs/mcp/configuration/"
        graduation_candidate: true
        graduation_notes: "Per-server tool suppression is a cross-provider useful pattern for allowlist/blocklist MCP tool management."
        provider_field: disabledTools
        conversion: embedded
      - id: kiro_mcp_disabled_flag
        name: "disabled flag per server entry"
        summary: "Per-server 'disabled: true' flag deactivating a server without removing its configuration. Allows temporarily disabling a server while preserving its definition."
        source_ref: "https://kiro.dev/docs/mcp/configuration/"
