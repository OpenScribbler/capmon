        summary: "Walk between project root and cwd collecting .agents/skills/ dirs; capped by MAX_SCAN_DEPTH=6 and MAX_SKILLS_DIRS_PER_ROOT=2000."
        source_ref: "loader.rs (repo_agents_skill_roots, dirs_between_project_root_and_cwd, MAX_SCAN_DEPTH, MAX_SKILLS_DIRS_PER_ROOT)"
        graduation_candidate: false
        conversion: not-portable
      - id: skill_deduplication
        name: Skill Deduplication
        summary: "Skills with duplicate paths are deduped (highest-priority scope wins) then sorted Repo > User > System > Admin, then by name and path."
        source_ref: "loader.rs (load_skills_from_roots dedup and sort logic)"
        graduation_candidate: false
        conversion: not-portable
    loading_model: >
      Skills are loaded by scanning a priority-ordered list of roots: Repo (project config folder
      skills/ and monorepo .agents/skills/ dirs), User ($HOME/.agents/skills/ and deprecated
      $CODEX_HOME/skills/), System ($CODEX_HOME/skills/.system, embedded/cached), and Admin
      (/etc/codex/skills on Unix). Each root is BFS-scanned up to MAX_SCAN_DEPTH=6 directories
      deep, capped at MAX_SKILLS_DIRS_PER_ROOT=2000 dirs per root. Symlinks are followed for
      Repo, User, and Admin scopes; not for System. A SKILL.md file within any subdirectory
      is parsed: YAML frontmatter (--- delimited) is extracted and deserialized into
      SkillFrontmatter (name, description, metadata.short-description). The name falls back to
      the parent directory name if absent. Description is required (empty triggers MissingField
      error). An optional agents/openai.yaml companion file in the skill directory provides
      interface, dependencies, and policy metadata. After loading all roots, duplicate paths are
      removed (highest-priority scope wins) and skills are sorted by scope then name then path.
      Plugin-injected roots receive User scope and a namespaced name prefix.
    notes: >
      The docs/skills.md source is a redirect stub pointing to the external Codex CLI docs
      at developers.openai.com/codex/skills — it contains no implementation details. The
      substantive implementation sources remain model.rs and loader.rs. The shared_scope
      canonical mapping covers the Admin scope (/etc/codex/skills) — machine-level shared
      scope (all local users), not org/cloud shared scope. The user_invocable key has no
      evidence in the source (no concept of hiding skills from user-facing menus in the Rust
      implementation) — set to supported: false, confidence: confirmed. The openai_yaml_companion_file
      is flagged graduation_candidate: true because other providers (windsurf, amp, cline,
      claude-code) support additional supporting files in the skill directory beyond the
      primary content file.
      2026-07-13 drift review: model.rs and loader.rs drifted through refactors with NO capability
      change. Verified all canonical mappings still hold: name/description frontmatter,
      policy.allow_implicit_invocation (SkillPolicy), SKILL.md (SKILLS_FILENAME), and all four
      scopes (SkillScope::Repo/User/System/Admin, .agents/skills, $CODEX_HOME, /etc/codex/skills,
      .system) are all present. Notable renames: the frontmatter struct SkillFrontmatterMetadata
      is now SkillMetadata; SkillsManager became SkillsService (#28705); plugin/system helper
      functions were reorganized (namespaced_skill_name / plugin_namespace_for_skill_path /
      discover_skills_under_root are gone, replaced by plugin_namespace / namespace_resolver /
      per-root walk logic). The plugin_scope and system_scope extension source_refs still name the
      old helper functions and are stale (capabilities intact) — a maintainer may want to refresh
      those symbol names.

