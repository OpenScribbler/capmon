      - id: partner_ecosystem
        name: Partner ecosystem hooks
        summary: "Cursor partners with ecosystem vendors (MintMCP, Semgrep, Snyk, 1Password, and others) who have built pre-built hook integrations covering security scanning, governance, and secrets management."
        source_ref: "https://cursor.com/docs/hooks"
        graduation_candidate: false
        conversion: not-portable
    loading_model: "Hooks are defined in a hooks.json file — .cursor/hooks.json at the project root (project scope) or ~/.cursor/hooks.json (user scope). The file has a version field and a top-level hooks map that keys each event name to an array of matcher groups / hook entries; the referenced scripts live under .cursor/hooks/ (project) or ~/.cursor/ (user). A four-level scope hierarchy applies in priority order: Enterprise (MDM-managed), Team (cloud-distributed, Enterprise plans), Project, and User. Each matcher group supplies a matcher string, optional failClosed and loop_limit flags, and an array of hook entries specifying either a command (shell) or prompt (LLM) handler type. Command hooks receive event data as JSON on stdin; exit code 0 allows the action, exit code 2 blocks it, and stdout JSON can carry structured decision fields. Prompt hooks use an LLM to evaluate natural language conditions. Hook events span three categories: Agent operations (sessionStart, preToolUse, beforeShellExecution, afterFileEdit, stop, and related), Cursor Tab inline completions (beforeTabFileRead and related), and an app-lifecycle event (workspaceOpen). Cloud agents run command-based project hooks from .cursor/hooks.json (user-level ~/.cursor/hooks.json and Tab/workspaceOpen hooks do not run in cloud agents)."
    notes: "Hook install is JSON-merge: installers merge hook configuration into .cursor/hooks.json (top-level hooks map) rather than dropping a standalone file. The earlier claim that hooks are wired through .cursor/settings.json is stale — the live docs (verified 2026-07-13) define hooks exclusively in hooks.json. Two handler types are documented: command (shell) and prompt (LLM). The prompt handler type is not portable — it depends on Cursor's own LLM evaluation pipeline. Enterprise and Team scopes are not file-portable; they are managed through the Cursor dashboard or MDM systems. Cloud agents (2026-07-13 refetch) execute command-based project hooks from the repo's .cursor/hooks.json; user-level, Tab, and workspaceOpen hooks are excluded in cloud environments. Canonical hook events translate into Cursor's camelCase native names."

  mcp:
    status: supported
    sources:
      - uri: "https://cursor.com/docs/mcp"
        type: documentation
        fetch_method: readability
        content_hash: "sha256:21180b425e2816ac42aad4d84373cb3388d2f000423b91848de64d36c4f651d5"
        fetched_at: "2026-07-13T18:21:27Z"
    canonical_mappings:
      transport_types:
        supported: true
        mechanism: "Cursor documents three MCP transports: stdio for local processes managed by Cursor, sse for Server-Sent Events (local or remote, multi-user), and streamable-http for HTTP-based servers (local or remote, multi-user) with OAuth authentication support."
        confidence: confirmed
      oauth_support:
        supported: true
        mechanism: "Remote servers using the streamable-http transport support OAuth authentication; static client credentials can be used instead of dynamic registration. The documentation explicitly notes OAuth as a streamable-http capability."
        confidence: confirmed
      env_var_expansion:
        supported: true
        mechanism: "Server configuration supports variable interpolation using ${env:NAME} for environment variables, ${userHome} for the user's home directory, ${workspaceFolder} for the workspace root, and ${pathSeparator} / ${/} for the OS path separator — not limited to env blocks alone (documented under 'Config interpolation')."
        confidence: confirmed
      tool_filtering:
        supported: true
        mechanism: "Enterprise admins define an MCP Allowlist (Team Settings > MCP Configuration) where per-server tool allowlists restrict which tools from an approved server may run automatically; command entries approve local stdio servers and URL entries approve remote HTTP/SSE servers (documented under the 'MCP Allowlist' heading, added 2026-07-13)."
        confidence: confirmed
      auto_approve:
        supported: true
        mechanism: "Users can configure permanent permissions through permissions.json files so that specific MCP tools do not require per-invocation approval. MCP also follows the same Run Modes as terminal commands: in Auto-review mode allowlisted MCP tools run immediately and everything else is routed through the classifier (documented under the 'Run Mode' heading — formerly 'Auto-run')."
        confidence: confirmed
      marketplace:
        supported: true
        mechanism: "Cursor ships an in-IDE MCP Marketplace for discovering and installing community MCP servers with one-click installation."
        confidence: confirmed
      resource_referencing:
        supported: true
        mechanism: "MCP resources (structured data sources) are documented as a supported protocol capability alongside tools, prompts, roots, elicitation, and Apps."
        confidence: confirmed
      enterprise_management:
        supported: true
        mechanism: "The 2026-07-13 refetch added an 'Enterprise admin controls' section: enterprise admins configure MCP policy from the Cursor dashboard (Team MCP distribution of shared servers, an MCP Allowlist of approved servers/tools, per-server Network controls, and governance of User MCP extensions). Documented under 'Enterprise admin controls' / 'Team MCP distribution' / 'MCP Allowlist' / 'Network controls' / 'User MCP extensions' headings."
        confidence: confirmed
    provider_extensions:
      - id: mcp_transport_types
        name: Three MCP transport mechanisms
        summary: "Supports stdio (local, single-user), sse (local/remote, multi-user via Server-Sent Events), and streamable-http (local/remote, multi-user via HTTP) transports chosen by the server configuration."
