      - id: mcp_network_controls
        name: Per-server MCP network controls
        summary: "Remote MCP URLs are restricted to the configured URL entry pattern; local command-based MCP servers select a per-server network mode (Allow all, Allowlist of destinations, Deny all, or No sandbox). Admins can also block matching destinations for user-configured MCPs via a User MCP Network Denylist."
        source_ref: "https://cursor.com/docs/mcp"
        graduation_candidate: false
        conversion: not-portable
    loading_model: "MCP servers are configured in .cursor/mcp.json at the project root (project scope) or in ~/.cursor/mcp.json (user-global scope). Each entry under the top-level mcpServers map names a server and supplies a transport (stdio with command and args, sse with url, or streamable-http with url) plus an optional env map for stdio servers. Configuration supports variable interpolation via ${env:NAME}, ${userHome}, ${workspaceFolder}, and ${pathSeparator} / ${/} syntax. On session start, Cursor connects to each configured server and surfaces its tool set to the Agent; the Agent requests approval before invoking tools by default. MCP follows the same Run Modes as terminal commands (in Auto-review mode allowlisted tools run immediately), and permanent per-tool approval can be configured through permissions.json files. Enterprise admins can additionally govern MCP centrally: Team MCP distribution of shared servers, an MCP Allowlist of approved servers/tools, and per-server network controls, all managed from the Cursor dashboard. Remote streamable-http servers with OAuth requirements can use static client credentials rather than dynamic registration."
    notes: "Install path is JSON-merge: installers merge server entries into .cursor/mcp.json rather than replacing the file. OAuth support is confirmed for streamable-http transport. The auto_approve capability is confirmed via permissions.json plus Run Modes (the 'Auto-run' heading was renamed 'Run Mode' in the 2026-07-13 refetch). tool_filtering and enterprise_management flipped to supported: true in the 2026-07-13 refetch, which added an 'Enterprise admin controls' block (Team MCP distribution, MCP Allowlist with per-server tool allowlists, per-server Network controls, and User MCP extensions). Resource referencing is confirmed as a supported protocol capability. Transport names in the config are stdio, sse, and streamable-http. Config interpolation now also documents ${pathSeparator} / ${/}. Global-scope MCP config lives under ~/.cursor/ alongside the user-global rules and skills locations."

