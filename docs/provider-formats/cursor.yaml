    loading_model: "Skills follow the Agent Skills convention: each skill is a directory whose name is the skill identifier, containing a required SKILL.md with YAML frontmatter (name, description, plus optional license, compatibility, metadata, disable-model-invocation) and a Markdown body. Cursor discovers skills in .cursor/skills/<name>/SKILL.md and .agents/skills/<name>/SKILL.md for project scope, and in ~/.agents/skills/<name>/SKILL.md and ~/.cursor/skills/<name>/SKILL.md for user-level scope. In monorepos, colocated skills automatically scope to their parent directory. Skills support nested directory organization for categorization. When a skill is active, its body is injected as instructional context and any supporting files (scripts, references, assets) remain available in the skill directory for on-demand loading. Setting disable-model-invocation: true converts a skill into an explicit slash command."
    notes: "Cursor participates in the cross-provider Agent Skills convention; both .cursor/skills/ (Cursor-native) and .agents/skills/ (cross-provider) locations are recognized at both project and user scope. ~/.cursor/skills/ is now documented alongside ~/.agents/skills/ for user-level scope. The disable-model-invocation flag enables user_invocable mode (explicit slash command) rather than context-aware auto-invocation. A paths frontmatter field scopes a skill to matching file globs ('Scoping a skill to specific files' heading, added 2026-07-13). Nested skill directories are walked recursively — the category folder is organizational and the skill identity comes from the folder containing SKILL.md ('Nested skill directories' heading). Cursor also ships built-in skills (/create-rule, /create-skill, /create-subagent, /migrate-to-skills, /babysit, and others) that appear alongside user-authored skills; these are harness-owned and not file-portable. The built-in /migrate-to-skills command facilitates migration from the deprecated .cursor/commands/ surface."

