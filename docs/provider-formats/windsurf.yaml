    loading_model: >
      Cascade Workflows are discovered by scanning two directories at IDE startup and on
      filesystem change: workspace-scope `.windsurf/workflows/` and global-scope
      `~/.codeium/windsurf/global_workflows/`. Each `.md` file registers a slash command
      whose name is the file basename (minus `.md`). Workflow bodies are plain markdown
      with no required frontmatter. The workflow content is not injected into the system
      prompt; it is loaded only when the user explicitly invokes `/<workflow-name>` in the
      Cascade input, at which point the markdown body is read into the conversation as a
      prompt template.
    notes: >
      Cascade Workflows are manual-only: Cascade never auto-invokes a workflow based on model
      decisions or file-pattern matches — the user must type `/<workflow-name>` in the Cascade
      input. Each workflow file is capped at 12,000 characters; larger bodies fail to load or
      save. Workflow bodies are plain markdown with no required frontmatter. Dual-scope loading:
      workspace files live at `.windsurf/workflows/` (team-shared, committed with the repo) and
      global files at `~/.codeium/windsurf/global_workflows/` (per-user, not committed). The
      filename basename (minus `.md`) is the slash-command identifier.
