        conversion: translated
      - id: config_interpolation
        name: Variable interpolation in mcp_config.json
        summary: "Config fields support `${env:VAR_NAME}` and `${file:/path}` interpolation to inject env vars and file contents without hardcoding secrets."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/mcp.md#config-interpolation"
