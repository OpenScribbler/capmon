      display_name:
        supported: true
        provider_field: "name"
        extension_id: name_format_constraint
        mechanism: "yaml frontmatter key: name (required). Must be lowercase letters, numbers, and hyphens only (e.g., deploy-to-staging, code-review). Used in UI listings and for @-mentions."
        confidence: confirmed
      description:
        supported: true
        provider_field: "description"
        extension_id: auto_invocation
        mechanism: "yaml frontmatter key: description (required). Brief explanation shown to the model to help it decide when to auto-invoke the skill. Key field for automatic invocation matching."
        confidence: confirmed
      user_invocable:
        supported: true
        mechanism: "Explicit @mention by skill name in Cascade input (e.g., @deploy-to-production). Always available regardless of auto-invocation eligibility."
        confidence: confirmed
      auto_invocable:
        supported: true
        mechanism: "Cascade auto-invokes a skill when the user's request semantically matches its description frontmatter field."
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: "Skill directory at .windsurf/skills/<skill-name>/. Committed with the repo; current workspace only. For cross-agent compatibility, also discovered at .agents/skills/<skill-name>/ and (if Claude Code config reading is enabled) .claude/skills/<skill-name>/."
        paths:
          - ".windsurf/skills/<skill-name>/SKILL.md"
          - ".agents/skills/<skill-name>/SKILL.md"
          - ".claude/skills/<skill-name>/SKILL.md"
        confidence: confirmed
      global_scope:
        supported: true
        mechanism: "Skill directory at ~/.codeium/windsurf/skills/<skill-name>/. Available in all workspaces on the user's machine; not committed to version control. Also discovered at ~/.agents/skills/<skill-name>/ and (if Claude Code config reading is enabled) ~/.claude/skills/<skill-name>/."
        paths:
          - "~/.codeium/windsurf/skills/<skill-name>/SKILL.md"
          - "~/.agents/skills/<skill-name>/SKILL.md"
          - "~/.claude/skills/<skill-name>/SKILL.md"
        confidence: confirmed
      shared_scope:
        supported: true
        mechanism: "OS-specific system path deployed by enterprise IT; read-only for end users. macOS: /Library/Application Support/Windsurf/skills/<skill-name>/; Linux/WSL: /etc/windsurf/skills/<skill-name>/; Windows: C:\\ProgramData\\Windsurf\\skills\\<skill-name>\\."
        confidence: confirmed
      canonical_filename:
        supported: true
        mechanism: "Fixed filename SKILL.md required in each skill directory. All scopes (workspace, global, system) use this same convention."
        confidence: confirmed
      skill_bundled_resources:
        supported: true
        mechanism: "Arbitrary additional files alongside SKILL.md (scripts, checklists, templates) in the skill directory; all are loaded when the skill is invoked."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/skills.md#adding-supporting-resources"
        confidence: confirmed
    # Optional extension depth fields (populated by capmon subagent):
    # - required: true | false | null (null = source doesn't say)
    # - value_type: see allow-list in formatdoc_validate.go
    # - examples: [{title?, lang, code, note?}]
    provider_extensions:
      - id: supporting_resource_files
        name: Supporting resource files
        summary: "Arbitrary additional files alongside SKILL.md (scripts, checklists, templates) bundle a multi-step workflow into a single skill directory."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/skills.md#adding-supporting-resources"
        graduation_candidate: false
        graduation_notes: "Graduated to skill_bundled_resources canonical key (issue #74)."
        conversion: not-portable
      - id: name_format_constraint
        name: Skill name format constraint
        summary: "Skill identifiers must be unique per scope and contain only lowercase letters, numbers, and hyphens."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/skills.md#required-frontmatter-fields"
        graduation_candidate: false
        provider_field: "name"
        conversion: embedded
      - id: auto_invocation
        name: Automatic model-driven invocation
        summary: "Cascade auto-invokes a skill when the user's request semantically matches its `description` frontmatter field."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/skills.md#automatic-invocation"
        graduation_candidate: false
        provider_field: "description"
        conversion: not-portable
      - id: ui_creation
        name: UI-based skill creation
        summary: "Skills can be created through the Cascade panel UI (Workspace or Global) without manually authoring files."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/skills.md#using-the-ui-easiest"
        graduation_candidate: false
        conversion: not-portable
    loading_model: >
      Progressive disclosure (agentskills.io standard): only the skill's name and description are
      shown to the model by default. The full SKILL.md content and all supporting resource files
      are loaded only when Cascade decides to invoke the skill (based on description matching) or
      when the user explicitly @mentions it. This keeps the context window lean even with many
      skills defined. Automatic invocation (model decides from description match) is the most
      common path; manual @mention is the fallback for explicit control.
    notes: >
      Windsurf implements the agentskills.io open standard (https://agentskills.io). Skills are
      structurally differentiated from Rules (single .md file, behavioral guidelines, always_on/glob/
      model_decision/manual activation) and Workflows (single .md file, manual-only via slash command).
      The key advantage of Skills over Rules is the supporting resource files bundle: scripts,
      templates, checklists, and config files can all be co-located in the skill directory.
      Cross-agent compatibility: Windsurf discovers skills in .agents/skills/ and ~/.agents/skills/
      for interoperability with other agents. If Claude Code config reading is enabled, .claude/skills/
      and ~/.claude/skills/ are also scanned. Enterprise system-level paths: macOS
      /Library/Application Support/Windsurf/skills/, Linux/WSL /etc/windsurf/skills/,
      Windows C:\ProgramData\Windsurf\skills\.

  rules:
    status: supported
    sources:
      - uri: "https://docs.windsurf.com/windsurf/cascade/memories.md"
        type: documentation
        fetch_method: http
        content_hash: "sha256:fc773e8df8957c2c576b5fd6f0367f40dd6a96c764a1cb8b09c36c990931119d"
        fetched_at: "2026-05-06T13:00:00Z"
      - uri: "https://docs.windsurf.com/windsurf/cascade/agents-md.md"
        type: documentation
        fetch_method: http
        content_hash: "sha256:b39cca40533944da6f48b8d8c540161e0cc490a3468e7cd53dcfbd86a9dc5a68"
        fetched_at: "2026-05-06T13:00:00Z"
    canonical_mappings:
      activation_mode:
        supported: true
        mechanism: "activation_modes extension: always (unconditional), conditional (glob patterns), model (AI decides), manual (explicit toggle)"
        confidence: confirmed
      file_imports:
        supported: false
        mechanism: "No @-import or file inclusion syntax documented for Windsurf rule files"
        confidence: confirmed
      cross_provider_recognition:
        supported: true
        mechanism: "agents_md_auto_scoping: Windsurf reads both AGENTS.md and agents.md (case-insensitive) files from other providers and applies them with workspace-aware scoping"
        confidence: confirmed
      auto_memory:
        supported: true
        mechanism: "auto_generated_memories: Windsurf AI generates persistent memories stored in ~/.codeium/windsurf/memories/ as rule-like files"
        confidence: confirmed
      hierarchical_loading:
        supported: true
        mechanism: "rules_hierarchical_discovery: Windsurf discovers .windsurf/rules/ directories in the current workspace, all sub-directories, and parent directories up to the git root; rules from all levels are merged and deduplicated"
        confidence: confirmed
    provider_extensions:
      - id: activation_modes
        name: Four activation modes via trigger frontmatter
        summary: "Rules select one of four activation modes (always_on, model_decision, glob, or manual) via frontmatter."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/memories.md#activation-modes"
        graduation_candidate: true
        provider_field: "trigger"
        conversion: translated
      - id: agents_md_auto_scoping
        name: "AGENTS.md and agents.md: location-based auto-scoping without frontmatter"
        summary: "Both AGENTS.md and agents.md (case-insensitive) are recognized; root-level files are always-on while subdirectory files become auto-glob rules scoped to that subtree."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/agents-md.md"
        graduation_candidate: true
        conversion: not-portable
      - id: three_scopes_plus_system
        name: Global, workspace, and system rule scopes
        summary: "Rules load from three user scopes plus an enterprise system scope, with per-scope character limits and OS-specific managed paths."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/memories.md#rules"
        graduation_candidate: false
        conversion: not-portable
      - id: auto_generated_memories
        name: Auto-generated memories distinct from rules
        summary: "Cascade auto-generates workspace-scoped memories during conversations, stored separately from user-authored Rules and not committed to git."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/memories.md#memories"
        graduation_candidate: false
        conversion: not-portable
      - id: rules_hierarchical_discovery
        name: Multi-level hierarchical rules discovery
        summary: "Windsurf searches for .windsurf/rules/ directories in the current workspace, all subdirectories, and parent directories up to the git root; rules from multiple locations are merged and deduplicated, displayed with shortest relative paths."
        source_ref: "https://docs.windsurf.com/windsurf/cascade/memories.md#rules-discovery"
        graduation_candidate: false
        conversion: not-portable
    loading_model: >
      Mode-dependent. `always_on` rules are injected into the system prompt on every message.
      `model_decision` rules expose only their description in the system prompt; the full content
      is loaded on demand when Cascade judges the description relevant. `glob` rules are loaded
      only when Cascade reads or edits files matching the glob pattern. `manual` rules are not
      loaded until explicitly @-mentioned. AGENTS.md (and agents.md) files follow the same engine:
      root-level files are always loaded; subdirectory files are loaded only when working inside
      their directory subtree. Character limits (12,000 per workspace rule, 6,000 for global) bound
      the maximum context cost per rule. Rules are discovered hierarchically: from the current
      workspace, all subdirectories, and parent directories up to the git root.
    notes: >
      Windsurf Rules and AGENTS.md feed the same internal Rules engine, just with different
      activation mode inference. Rules use explicit frontmatter (`trigger:` field); AGENTS.md
      derives activation from file location (root = always-on, subdirectory = glob). Both are
      single-file formats (not directory bundles), which distinguishes them from Skills. Windsurf
      recognizes both `AGENTS.md` and `agents.md` (case-insensitive). Cross-agent interoperability:
      Windsurf also discovers AGENTS.md files created for other agents. The docs note that for
      reliably reusable knowledge, Rules or AGENTS.md are preferred over auto-generated Memories,
      since they are version-controlled and team-shareable. Rules discovery now includes
      subdirectories of the workspace and parent directories up to the git root, enabling
      monorepo and multi-level project structures. Example community rule templates are maintained
      at https://windsurf.com/editor/directory.

