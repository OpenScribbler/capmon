        confidence: confirmed
      json_io_protocol:
        supported: true
        mechanism: "Hooks receive a JSON object via stdin (taskId, hookName, clineVersion, timestamp, workspaceRoots, userId, model, plus hook-specific fields) and return JSON to stdout with cancel (bool), contextModification (string), and errorMessage (string); debug output goes to stderr"
        confidence: confirmed
      context_injection:
        supported: true
        mechanism: "context_modification_output: Cline hooks can inject additional context into the agent's session via hook output"
        confidence: confirmed
      permission_control:
        supported: false
        mechanism: "Cline hooks can cancel tool invocations (decision_control) but cannot grant/deny tool availability"
        confidence: inferred
    provider_extensions:
      - id: eight_hook_types
        name: Eight Named Hook Types
        summary: "Eight lifecycle hook types: TaskStart, TaskResume, TaskCancel, TaskComplete, PreToolUse, PostToolUse, UserPromptSubmit, PreCompact."
        source_ref: "https://docs.cline.bot/customization/hooks#hook-types"
        graduation_candidate: true
        conversion: translated
      - id: context_modification_output
        name: contextModification Output Field for Injecting Conversation Context
        summary: "Hook stdout JSON `contextModification` (string) injects text into the active conversation as runtime context."
        source_ref: "https://docs.cline.bot/customization/hooks#context-modification"
        graduation_candidate: true
        provider_field: "contextModification"
        conversion: embedded
      - id: global_and_project_hooks
        name: Global and Project Hook Scopes with Additive Execution
        summary: "Global (~/Documents/Cline/Hooks) and project (.clinerules/hooks) hooks both run for the same event; global first, then workspace."
        source_ref: "https://docs.cline.bot/customization/hooks#hook-locations"
        graduation_candidate: true
        conversion: not-portable
      - id: platform_specific_file_format
        name: Platform-Specific Hook File Format
        summary: "Hook filenames are platform-sensitive: Windows uses <HookName>.ps1, macOS/Linux uses extensionless <HookName>; mismatches are silently skipped."
        source_ref: "https://docs.cline.bot/customization/hooks#quick-start-your-first-hook"
        graduation_candidate: false
        conversion: not-portable
      - id: pre_tool_use_cancellation
        name: PreToolUse Can Cancel Tool Execution Before It Happens
        summary: "PreToolUse hooks block tool execution by returning `cancel: true` with an `errorMessage`; PostToolUse can stop the task but not undo the call."
        source_ref: "https://docs.cline.bot/customization/hooks#pretooluse"
        graduation_candidate: true
        provider_field: "cancel"
        conversion: embedded
      - id: model_info_in_hook_input
        name: Active Model Provider and Slug in Hook Input
        summary: "Hook input JSON includes a `model` object with provider and slug, enabling model-aware logic in hook scripts."
        source_ref: "https://docs.cline.bot/customization/hooks#input-structure"
        graduation_candidate: true
        provider_field: "model"
        conversion: not-portable
    loading_model: >
      Hooks are executable scripts (bash/shell on macOS/Linux, PowerShell on Windows) invoked
      by Cline at fixed lifecycle points. They receive a JSON object via stdin containing
      taskId, hookName, clineVersion, timestamp (string ms since epoch), workspaceRoots
      (array), userId, model (provider + slug), and a hook-specific field (e.g., preToolUse,
      taskStart). They return JSON to stdout with cancel (bool), contextModification (string),
      and errorMessage (string). Debug output must go to stderr. Hooks are discovered by
      filename matching the hook type name in the hooks directory.
    notes: >
      CLI support: hooks can be enabled per-task via cline "..." -s hooks_enabled=true or
      globally via cline config set hooks-enabled=true. The timestamp field is a string
      (milliseconds since epoch), not a number — this is a migration note for older scripts.
      workspaceRoots replaces the old singular workspacePath field.

      ⚠ DRIFT FLAG (2026-07-13, issue #5): The dedicated hooks doc
      (docs.cline.bot/customization/hooks) is now a 2-line stub reading "See details under
      SDK Hooks page / See details under SDK Plugins" and the content moved into the Cline
      SDK plugin system (docs.cline.bot/customization/plugins, /sdk/plugins,
      /sdk/guides/writing-plugins). The NEW model replaces the filesystem-script model
      (extensionless/.ps1 files named after the hook type in .clinerules/hooks/ or
      ~/Documents/Cline/Hooks, JSON via stdin/stdout with cancel/contextModification/
      errorMessage, eight named hook types) with TypeScript plugin lifecycle handlers
      (beforeRun/afterRun/beforeModel/afterModel/beforeTool/afterTool/onEvent), a richer
      hook-stage list (session_start, run_start, tool_call_before, tool_call_after, run_end,
      error, …), and hook policies (mode blocking|async, timeoutMs, retries, failureMode
      fail_open|fail_closed, maxConcurrency, queueLimit). This implies real canonical-key
      changes NOT yet applied here: async_execution false→true, decision_control/
      input_modification/context_injection now via plugin hook stages, json_io_protocol
      (stdin/stdout JSON) likely no longer the mechanism, and eight_hook_types /
      platform_specific_file_format obsolete. AMBIGUITY held for maintainer: the plugins doc
      warns "This feature currently only applies to Cline SDK, CLI, and Kanban. Not
      applicable on VSCode and JetBrains Extension for now" — so the OLD filesystem hook
      model may STILL be the VSCode/JetBrains mechanism, i.e. the two models may coexist by
      surface. Full re-curation deferred: requires re-pointing hooks sources to the plugin
      docs, refetching cache, and a maintainer decision on the dual-model split. The
      canonical_mappings above still describe the OLD model pending that decision.

  mcp:
    status: supported
    sources:
      # 2026-07-13 (issue #5): both prior MCP pages (configuring-mcp-servers and
      # mcp-transport-mechanisms) now 301-redirect to the consolidated mcp-overview page.
      - uri: "https://docs.cline.bot/mcp/mcp-overview"
        type: documentation
        fetch_method: http
        content_hash: "sha256:5b4032a7dc0b154784b318976d56b3b5e88e152b39a2209c246b0f945a08a5b0"
        fetched_at: "2026-07-13T18:30:00Z"
    canonical_mappings:
      transport_types:
        supported: true
        mechanism: "Cline supports STDIO (local process) plus remote transports selected by the config `type` field: `streamableHttp` (recommended) and `sse` (legacy; the default when `type` is omitted) — documented under 'Transport types' and the 'Remote server (Streamable HTTP)' configuration example"
        confidence: confirmed
      oauth_support:
        supported: false
        mechanism: "Cline MCP does not document OAuth 2.0 authentication for remote servers"
        confidence: inferred
      env_var_expansion:
        supported: false
        mechanism: "Cline MCP configuration does not document environment variable expansion syntax"
        confidence: inferred
      tool_filtering:
        supported: true
        mechanism: "autoApprove (per-server tool list): the `autoApprove` array in a server's config entry names the MCP tools allowed to run without per-invocation confirmation — documented in the 'Configuration examples' JSON and 'Security basics' (Limit autoApprove to safe tools). NOTE: this field was renamed from `alwaysAllow` to `autoApprove` in the 2026-07 MCP docs consolidation."
        confidence: confirmed
      auto_approve:
        supported: true
        mechanism: "autoApprove (execution gating): the per-server `autoApprove` array suppresses per-invocation approval prompts for the listed MCP tools — documented under 'Configuration examples' / 'Security basics'"
        confidence: confirmed
      marketplace:
        supported: false
        mechanism: "The 2026-07 MCP docs consolidation into mcp-overview removed the in-IDE MCP Marketplace section; no marketplace / 'Finding MCP Servers' discovery experience is documented in the current MCP docs or the docs.cline.bot/llms.txt sitemap (verified 2026-07-13). Server addition is now manual config, the `cline mcp` CLI wizard, or the Remote Servers tab."
        confidence: inferred
      resource_referencing:
        supported: false
        mechanism: "Cline does not document @-mention or equivalent access to MCP resources"
        confidence: inferred
      enterprise_management:
        supported: true
        mechanism: "Cline Enterprise now documents org-level MCP management: 'MCP Server Controls' covers MCP server allowlisting and remote-MCP-server management (docs.cline.bot/enterprise-solutions/.../control-other-cline-features/mcp-server-controls) — verified 2026-07-13. NOTE: this evidence lives on the enterprise docs tree, not the tracked mcp-overview source."
        confidence: inferred
    # 2026-07-13 (issue #5): the mcp_marketplace, ai_assisted_server_setup, and
    # global_mcp_mode extensions were removed — those sections no longer appear in the
    # consolidated MCP docs or the docs.cline.bot/llms.txt sitemap (verified 2026-07-13).
    # Whether the underlying UI features still exist in-product is unverified; flagged for
    # maintainer.
    provider_extensions:
      - id: auto_approve_tools
        name: autoApprove List for Auto-Approving Specific MCP Tools
        summary: "Per-server `autoApprove` array of tool names that execute without user confirmation; server-scoped, tool-name-specific. Renamed from the former `alwaysAllow` field."
        source_ref: "https://docs.cline.bot/mcp/mcp-overview#configuration-examples"
        graduation_candidate: true
        provider_field: "autoApprove"
        conversion: translated
      - id: streamable_http_transport
        name: Streamable HTTP Transport for Remote MCP Servers (SSE Legacy)
        summary: "Remote MCP servers over HTTP/HTTPS configured via `url` + optional `headers`; the `type` field selects `streamableHttp` (recommended) or `sse` (legacy). Omitting `type` defaults to legacy `sse`."
        source_ref: "https://docs.cline.bot/mcp/mcp-overview#transport-types"
        graduation_candidate: true
        provider_field: "type"
        conversion: translated
      - id: stdio_vs_remote_deployment
        name: "STDIO vs Remote: Per-User vs Centralized Deployment Model"
        summary: "STDIO runs a local per-user process (lower latency, simpler local setup); remote HTTP/SSE enables a centralized hosted endpoint serving multiple concurrent clients."
        source_ref: "https://docs.cline.bot/mcp/mcp-overview#transport-types"
        graduation_candidate: true
        conversion: not-portable
    loading_model: >
      MCP servers are declared under an `mcpServers` object. The CLI stores this in
      ~/.cline/mcp.json; the IDE extension edits its MCP settings JSON via MCP Servers >
      Configure (or adds hosted endpoints through the Remote Servers tab). STDIO servers are
      spawned as child processes (command + args + env). Remote servers are reached over
      HTTP/HTTPS with the transport chosen by the `type` field: `streamableHttp`
      (recommended) or `sse` (legacy; the default when `type` is omitted). Both transports
      support a per-server `autoApprove` tool list and a `disabled` flag. Cline auto-detects
      available tools from each connected server and surfaces them in chat. Per-server
      enable/disable and restart controls plus configurable request timeouts are available
      in MCP settings; the `cline mcp` CLI wizard offers the same management actions.
    notes: "CLI config file is ~/.cline/mcp.json; servers live under the `mcpServers` object. STDIO servers use command/args/env keys; remote servers use type/url/headers keys. Set `\"type\": \"streamableHttp\"` explicitly for the recommended transport — omitting `type` falls back to legacy `sse`. The per-server tool auto-approve field was renamed alwaysAllow → autoApprove in the 2026-07 docs consolidation. The `disabled` field deactivates a server without deleting it. The two prior MCP pages (configuring-mcp-servers, mcp-transport-mechanisms) now redirect to mcp-overview."

