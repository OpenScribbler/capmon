        source_ref: "https://docs.cline.bot/core-workflows/using-commands#deep-planning"
        graduation_candidate: true
        conversion: not-portable
    loading_model: >
      Cline discovers user-authored workflows as plain markdown files in two locations:
      .clinerules/workflows/ (project scope) and ~/Documents/Cline/Workflows/ (global scope).
      Each file's basename becomes the invocation trigger — the user types /<filename>.md in
      the chat input (extension included) to run the workflow. Workflow bodies are plain
      markdown instructions with no frontmatter schema; Cline injects the body as a prompt
      template when invoked. Workflows can combine natural language steps, XML tool syntax
      (<execute_command>, <read_file>, <ask_followup_question>), CLI tool invocations, and
      MCP tool calls. Workflows are not pre-loaded into context — they execute on demand.
      Built-in slash commands (/newtask, /smol, /newrule, /deep-planning, /explain-changes
      in VS Code, /reportbug) coexist with user workflows and are also accessible via the /
      command picker.
    notes: >
      Global workflows path is ~/Documents/Cline/Workflows on macOS/Linux and maps to
      %USERPROFILE%\\Documents\\Cline\\Workflows on Windows because Cline resolves the OS
      Documents folder. Workflow files are plain markdown — no frontmatter schema is defined
      and none is required. Invocation includes the .md extension (e.g., /deploy.md, not
      /deploy). Project workflows take precedence over global workflows on name collision.

      ⚠ DRIFT FLAG (2026-07-13, issue #5): The dedicated Workflows documentation page was
      removed — customization/workflows.md redirects to cline-rules.md,
      features/slash-commands/workflows.md returns 404, and no workflows page remains in the
      llms.txt sitemap (verified 2026-07-13). The surviving commands doc (using-commands) now
      documents built-in slash commands plus 'Skills via Slash Commands' as the reusable
      user-triggered mechanism, but no longer describes user-authored Workflow markdown files.
      Consequence held for maintainer: the four workflow-based provider_extensions
      (filename_as_command_name, two_scope_loading, plain_markdown_body,
      xml_tool_syntax_in_workflows) now cite a removed page and their supported: mechanism has
      no live doc evidence. It is UNVERIFIED whether the Workflows feature was removed from the
      product or merely undocumented (superseded by slash-invocable skills). Left in place
      pending a maintainer decision; /explain-changes was also dropped from the slash-command
      table.

  agents:
    status: unsupported
    sources: []
    canonical_mappings: {}
    provider_extensions: []
    notes: "Cline ships read-only research subagents inside the harness but exposes no user-definable agent file format — there is no on-disk way to author custom agents with their own system prompts, tool restrictions, or scopes. Per capmon's provider-eligibility rule, harness-owned subagents do not count as native support for the agents content type. See docs/providers/cline/skills-agents.md for the full caveat."
