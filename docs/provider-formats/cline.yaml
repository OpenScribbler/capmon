        fetched_at: "2026-07-14T01:27:39Z"
    canonical_mappings:
      handler_types:
        supported: false
        mechanism: "Neither surface documents the canonical shell/HTTP/LLM-prompt/agent handler-type selection: filesystem hooks (VS Code/JetBrains) execute shell or PowerShell scripts only; plugin hooks (SDK/CLI/Kanban) are in-process TypeScript AgentPlugin handlers"
