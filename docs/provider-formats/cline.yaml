    provider_extensions:
      # ── Filesystem-script model (VS Code / JetBrains) ────────────────────
      - id: eight_hook_types
        name: Eight Named Hook Types (Filesystem Model, VS Code/JetBrains)
        summary: "Filesystem-script model exposes eight named hook types — TaskStart, TaskResume, TaskCancel, TaskComplete, PreToolUse, PostToolUse, UserPromptSubmit, PreCompact — whose data types are imported in hook-factory.ts."
        source_ref: "https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/hooks/hook-factory.ts"
        graduation_candidate: true
        conversion: translated
      - id: context_modification_output
        name: contextModification Output Field for Injecting Conversation Context (Filesystem Model)
        summary: "Filesystem hook stdout JSON `contextModification` (string) injects text into the active conversation as runtime context on VS Code/JetBrains; validated in hook-factory.ts."
        source_ref: "https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/hooks/hook-factory.ts"
        graduation_candidate: true
        provider_field: "contextModification"
        conversion: embedded
      - id: global_and_project_hooks
        name: Global and Project Hook Scopes with Additive Execution (Filesystem Model)
        summary: "Global (~/Documents/Cline/Hooks) and project (.clinerules/hooks) filesystem hooks both run for the same event; directories resolved in disk.ts (hooksDir, ensureHooksDirectoryExists)."
        source_ref: "https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/storage/disk.ts"
        graduation_candidate: true
        conversion: not-portable
      - id: platform_specific_file_format
        name: Platform-Specific Hook File Format (Filesystem Model)
        summary: "Filesystem hook filenames are platform-sensitive: Windows uses <HookName>.ps1, macOS/Linux uses extensionless <HookName>; mismatches are silently skipped. Filesystem model only."
        source_ref: "https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/storage/disk.ts"
        graduation_candidate: false
        conversion: not-portable
      - id: pre_tool_use_cancellation
        name: PreToolUse Can Cancel Tool Execution Before It Happens (Filesystem Model)
        summary: "Filesystem PreToolUse hooks block tool execution by returning `cancel: true` with an `errorMessage`; PostToolUse can stop the task but not undo the call. Output contract validated in hook-factory.ts."
        source_ref: "https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/hooks/hook-factory.ts"
        graduation_candidate: true
        provider_field: "cancel"
        conversion: embedded
      - id: model_info_in_hook_input
        name: Active Model Provider and Slug in Hook Input (Filesystem Model)
        summary: "Filesystem hook input JSON includes a `model` object with provider and slug, enabling model-aware logic in hook scripts on VS Code/JetBrains."
        source_ref: "https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/hooks/hook-factory.ts"
        graduation_candidate: true
        provider_field: "model"
        conversion: not-portable
      # ── TypeScript AgentPlugin model (SDK / CLI / Kanban only) ───────────
      - id: plugin_lifecycle_hooks
        name: Plugin Lifecycle Hook Handlers (SDK/CLI/Kanban)
        summary: "AgentPlugin `hooks` object exposes beforeRun/afterRun/beforeModel/afterModel/beforeTool/afterTool/onEvent handlers, driven by a richer hook-stage list (session_start, run_start, tool_call_before, tool_call_after, run_end, error, …)."
        source_ref: "https://docs.cline.bot/sdk/plugins.md#hook-stages"
        graduation_candidate: true
        conversion: not-portable
      - id: plugin_hook_policies
        name: Plugin Hook Policies (SDK/CLI/Kanban)
        summary: "Per-hook policies control execution: mode blocking|async, timeoutMs, retries, retryDelayMs, failureMode fail_open|fail_closed, maxConcurrency, queueLimit. Applies only to the plugin model."
        source_ref: "https://docs.cline.bot/sdk/plugins.md#hook-policies"
        graduation_candidate: true
        conversion: not-portable
    loading_model: >
      Cline ships two hook models simultaneously, split by surface.

      (1) Filesystem-script model — LIVE on the VS Code and JetBrains extensions. Hooks are
      executable scripts (bash/shell on macOS/Linux, PowerShell on Windows) invoked at fixed
      lifecycle points. They receive a JSON object via stdin (taskId, hookName, clineVersion,
      timestamp as string ms since epoch, workspaceRoots array, userId, model provider+slug,
      plus a hook-specific field such as preToolUse or taskStart) and return JSON to stdout
      with cancel (bool), contextModification (string), and errorMessage (string); debug goes
      to stderr. Hooks are discovered by filename matching the hook type name in the hooks
      directory (.clinerules/hooks or ~/Documents/Cline/Hooks). A 30s execution timeout
      applies (HOOK_EXECUTION_TIMEOUT_MS in hook-factory.ts). Verified in extension source
      (apps/vscode/src/core/hooks/hook-factory.ts, apps/vscode/src/core/storage/disk.ts).

      (2) TypeScript AgentPlugin model — SDK / CLI / Kanban ONLY (the plugins doc's Warning
      excludes VS Code / JetBrains). Plugins export an AgentPlugin whose `hooks` object
      implements beforeRun/afterRun/beforeModel/afterModel/beforeTool/afterTool/onEvent, run
      against a richer hook-stage pipeline (session_start, run_start, tool_call_before,
      tool_call_after, run_end, error, …), and are governed by hook policies (mode
      blocking|async, timeoutMs, retries, retryDelayMs, failureMode fail_open|fail_closed,
      maxConcurrency, queueLimit). Plugins install via `cline plugin install` and load from
      .cline/plugins (project) or ~/.cline/plugins (global).
    notes: >
      Dual-model note (2026-07-14, issue #5 resolved): Cline supports two hook models split by
      surface, and capability claims above are provider-level (supported: true when ANY surface
      supports the capability; the mechanism prose names the surface split). The dedicated hooks
      doc (docs.cline.bot/customization/hooks) is a 2-line stub redirecting to SDK Plugins; the
      filesystem-script model it used to document is no longer on that page but remains LIVE on
      the VS Code / JetBrains extensions — confirmed against extension source (hook-factory.ts
      imports all eight hook data types; disk.ts resolves the .clinerules/hooks and
      ~/Documents/Cline/Hooks paths). The TypeScript AgentPlugin model (customization/plugins,
      sdk/plugins) applies only to SDK / CLI / Kanban per that page's own Warning. async_execution
      is therefore true (plugin mode: async), while json_io_protocol stays true as the VS Code /
      JetBrains filesystem mechanism. Plugin-model claims carry confidence: inferred (docs-only);
      filesystem-model claims stay confirmed where source-verified in hook-factory.ts.

      Filesystem CLI/config detail: hooks can be enabled per-task via cline "..." -s
      hooks_enabled=true or globally via cline config set hooks-enabled=true. The timestamp field
      is a string (ms since epoch), not a number. workspaceRoots replaces the old singular
      workspacePath field.

  mcp:
    status: supported
    sources:
      # 2026-07-13 (issue #5): both prior MCP pages (configuring-mcp-servers and
      # mcp-transport-mechanisms) now 301-redirect to the consolidated mcp-overview page.
      - uri: "https://docs.cline.bot/mcp/mcp-overview"
        type: documentation
        fetch_method: http
        content_hash: "sha256:e96de3f1379d982c44d0798c87b21b77c26d8ed828f1c3da5bce0461c4a662e3"
        fetched_at: "2026-07-14T01:27:39Z"
    canonical_mappings:
      transport_types:
        supported: true
        mechanism: "Cline supports STDIO (local process) plus remote transports selected by the config `type` field: `streamableHttp` (recommended) and `sse` (legacy; the default when `type` is omitted) — documented under 'Transport types' and the 'Remote server (Streamable HTTP)' configuration example"
        confidence: confirmed
      oauth_support:
        supported: false
        mechanism: "Cline MCP does not document OAuth 2.0 authentication for remote servers"
        confidence: inferred
      env_var_expansion:
        supported: false
        mechanism: "Cline MCP configuration does not document environment variable expansion syntax"
        confidence: inferred
      tool_filtering:
        supported: true
        mechanism: "autoApprove (per-server tool list): the `autoApprove` array in a server's config entry names the MCP tools allowed to run without per-invocation confirmation — documented in the 'Configuration examples' JSON and 'Security basics' (Limit autoApprove to safe tools). NOTE: this field was renamed from `alwaysAllow` to `autoApprove` in the 2026-07 MCP docs consolidation."
        confidence: confirmed
      auto_approve:
        supported: true
        mechanism: "autoApprove (execution gating): the per-server `autoApprove` array suppresses per-invocation approval prompts for the listed MCP tools — documented under 'Configuration examples' / 'Security basics'"
        confidence: confirmed
      marketplace:
        supported: false
        mechanism: "The 2026-07 MCP docs consolidation into mcp-overview removed the in-IDE MCP Marketplace section; no marketplace / 'Finding MCP Servers' discovery experience is documented in the current MCP docs or the docs.cline.bot/llms.txt sitemap (verified 2026-07-13). Server addition is now manual config, the `cline mcp` CLI wizard, or the Remote Servers tab."
        confidence: inferred
      resource_referencing:
        supported: false
        mechanism: "Cline does not document @-mention or equivalent access to MCP resources"
        confidence: inferred
      enterprise_management:
        supported: true
        mechanism: "Cline Enterprise now documents org-level MCP management: 'MCP Server Controls' covers MCP server allowlisting and remote-MCP-server management (docs.cline.bot/enterprise-solutions/.../control-other-cline-features/mcp-server-controls) — verified 2026-07-13. NOTE: this evidence lives on the enterprise docs tree, not the tracked mcp-overview source."
        confidence: inferred
    # 2026-07-13 (issue #5): the mcp_marketplace, ai_assisted_server_setup, and
    # global_mcp_mode extensions were removed — those sections no longer appear in the
    # consolidated MCP docs or the docs.cline.bot/llms.txt sitemap (verified 2026-07-13).
    # Whether the underlying UI features still exist in-product is unverified; flagged for
    # maintainer.
    provider_extensions:
      - id: auto_approve_tools
        name: autoApprove List for Auto-Approving Specific MCP Tools
        summary: "Per-server `autoApprove` array of tool names that execute without user confirmation; server-scoped, tool-name-specific. Renamed from the former `alwaysAllow` field."
        source_ref: "https://docs.cline.bot/mcp/mcp-overview#configuration-examples"
        graduation_candidate: true
        provider_field: "autoApprove"
        conversion: translated
      - id: streamable_http_transport
        name: Streamable HTTP Transport for Remote MCP Servers (SSE Legacy)
        summary: "Remote MCP servers over HTTP/HTTPS configured via `url` + optional `headers`; the `type` field selects `streamableHttp` (recommended) or `sse` (legacy). Omitting `type` defaults to legacy `sse`."
        source_ref: "https://docs.cline.bot/mcp/mcp-overview#transport-types"
        graduation_candidate: true
        provider_field: "type"
        conversion: translated
      - id: stdio_vs_remote_deployment
        name: "STDIO vs Remote: Per-User vs Centralized Deployment Model"
        summary: "STDIO runs a local per-user process (lower latency, simpler local setup); remote HTTP/SSE enables a centralized hosted endpoint serving multiple concurrent clients."
        source_ref: "https://docs.cline.bot/mcp/mcp-overview#transport-types"
        graduation_candidate: true
        conversion: not-portable
    loading_model: >
      MCP servers are declared under an `mcpServers` object. The CLI stores this in
      ~/.cline/mcp.json; the IDE extension edits its MCP settings JSON via MCP Servers >
      Configure (or adds hosted endpoints through the Remote Servers tab). STDIO servers are
      spawned as child processes (command + args + env). Remote servers are reached over
      HTTP/HTTPS with the transport chosen by the `type` field: `streamableHttp`
      (recommended) or `sse` (legacy; the default when `type` is omitted). Both transports
      support a per-server `autoApprove` tool list and a `disabled` flag. Cline auto-detects
      available tools from each connected server and surfaces them in chat. Per-server
      enable/disable and restart controls plus configurable request timeouts are available
      in MCP settings; the `cline mcp` CLI wizard offers the same management actions.
    notes: "CLI config file is ~/.cline/mcp.json; servers live under the `mcpServers` object. STDIO servers use command/args/env keys; remote servers use type/url/headers keys. Set `\"type\": \"streamableHttp\"` explicitly for the recommended transport — omitting `type` falls back to legacy `sse`. The per-server tool auto-approve field was renamed alwaysAllow → autoApprove in the 2026-07 docs consolidation. The `disabled` field deactivates a server without deleting it. The two prior MCP pages (configuring-mcp-servers, mcp-transport-mechanisms) now redirect to mcp-overview."

