        supported: true
        mechanism: "Filesystem PreToolUse hooks return modified context/input before tool execution via contextModification on VS Code/JetBrains (hook-factory.ts); the plugin before_agent_start / tool_call_before stages inject or modify prompt and messages on SDK/CLI/Kanban (sdk/plugins)"
        confidence: confirmed
      async_execution:
        supported: true
        mechanism: "Plugin hook policies (mode: async) run hooks off the critical path on SDK/CLI/Kanban (sdk/plugins hook policies table); filesystem-script hooks on VS Code/JetBrains remain synchronous with a 30s HOOK_EXECUTION_TIMEOUT_MS (hook-factory.ts)"
        confidence: inferred
      hook_scopes:
        supported: true
        mechanism: "Both surfaces support global + project scope: filesystem hooks in .clinerules/hooks (project) and ~/Documents/Cline/Hooks (global) per disk.ts; plugins in .cline/plugins (project) and ~/.cline/plugins (global) per customization/plugins"
        confidence: confirmed
      json_io_protocol:
        supported: true
        mechanism: "The filesystem-script model (VS Code/JetBrains) receives a JSON object via stdin and returns JSON to stdout with cancel (bool), contextModification (string), and errorMessage (string), debug to stderr — verified in hook-factory.ts. This is NOT the mechanism on the plugin model (SDK/CLI/Kanban), which uses in-process TypeScript AgentPlugin handlers rather than stdin/stdout JSON"
        confidence: confirmed
      context_injection:
        supported: true
        mechanism: "Filesystem hooks inject context via the contextModification stdout field on VS Code/JetBrains (hook-factory.ts); the plugin before_agent_start hook stage injects context or modifies the prompt on SDK/CLI/Kanban (sdk/plugins)"
        confidence: confirmed
      permission_control:
        supported: false
        mechanism: "Neither surface grants/denies tool availability: hooks can only block/cancel a specific tool call (decision_control). The plugin approval-policy concept governs blocking a call, not tool-availability permissioning"
