        conversion: not-portable
    loading_model: >
      Cline discovers user-authored workflows as plain markdown files in two locations:
      .clinerules/workflows/ (project scope) and ~/Documents/Cline/Workflows/ (global scope).
      Each file's basename becomes the invocation trigger — the user types /<filename>.md in
      the chat input (extension included) to run the workflow. Workflow bodies are plain
      markdown instructions with no frontmatter schema; Cline injects the body as a prompt
      template when invoked. Workflows can combine natural language steps, XML tool syntax
      (<execute_command>, <read_file>, <ask_followup_question>), CLI tool invocations, and
      MCP tool calls. Workflows are not pre-loaded into context — they execute on demand.
      Built-in slash commands (/newtask, /smol, /newrule, /deep-planning, /explain-changes
      in VS Code, /reportbug) coexist with user workflows and are also accessible via the /
      command picker.
    notes: >
      Global workflows path is ~/Documents/Cline/Workflows on macOS/Linux and maps to
      %USERPROFILE%\\Documents\\Cline\\Workflows on Windows because Cline resolves the OS
      Documents folder. Workflow files are plain markdown — no frontmatter schema is defined
      and none is required. Invocation includes the .md extension (e.g., /deploy.md, not
      /deploy). Project workflows take precedence over global workflows on name collision.

      Workflow re-anchor (2026-07-14, issue #5 resolved): The dedicated Workflows documentation
      page was removed — customization/workflows.md redirects to cline-rules.md,
      features/slash-commands/workflows.md returns 404, and no workflows page remains in the
      llms.txt sitemap. The user-authored Workflow feature is NOT gone from the product: it is
      verified live in extension source. The four workflow provider_extensions
      (filename_as_command_name, two_scope_loading, plain_markdown_body,
      xml_tool_syntax_in_workflows) have been re-anchored from the dead docs page to the live
      source files (workflows.ts refreshes global + workspace workflow toggles against
      GlobalFileNames.workflows = .clinerules/workflows and ensureWorkflowsDirectoryExists →
      ~/Documents/Cline/Workflows; both resolved in disk.ts). Their confidence is now inferred
      (source-verified but no docs page). /explain-changes was dropped from the slash-command
      table in 2026-07.

