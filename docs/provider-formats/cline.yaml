        graduation_candidate: false
        graduation_notes: "Graduated to skill_bundled_resources canonical key (issue #74)."
        conversion: not-portable
      - id: description_based_auto_invocation
        name: Description-Based Auto-Invocation via use_skill Tool
        summary: "Cline auto-invokes skills by matching the user message against the description field; enabled skills can also be triggered explicitly via slash command."
        source_ref: "https://docs.cline.bot/customization/skills.md#how-skills-work"
        graduation_candidate: false
        graduation_notes: "Graduated to auto_invocable canonical key (issue #73)."
        provider_field: "description"
        conversion: not-portable
      - id: slash_command_skill_invocation
        name: Explicit Skill Invocation via Slash Command
        summary: "Any enabled skill can be triggered directly from chat by typing /<skill-name> (e.g. /aws-deploy), forcing its SKILL.md to load instead of waiting for description-based auto-matching."
        source_ref: "https://docs.cline.bot/customization/skills.md#triggering-skills-with-slash-commands"
        graduation_candidate: false
        graduation_notes: "Graduated to user_invocable canonical key (drift review 2026-07-13)."
        conversion: not-portable
      - id: skill_toggle
        name: Per-Skill Enable/Disable Toggle
        summary: "UI toggle to enable or disable each skill without deleting its directory."
        source_ref: "https://docs.cline.bot/customization/skills.md#toggling-skills"
        graduation_candidate: false
        conversion: not-portable
      - id: global_precedence_over_project
        name: Global Skill Takes Precedence Over Project Skill
        summary: "On name collision, the global skill wins over the project skill — the inverse of typical scope-override behavior."
        source_ref: "https://docs.cline.bot/customization/skills.md#where-skills-live"
        graduation_candidate: false
        conversion: not-portable
    loading_model: >
      Three-tier progressive loading: (1) Metadata — name and description from YAML
      frontmatter loaded at startup (~100 tokens per skill, always active); (2) Instructions
      — SKILL.md body loaded on demand when the use_skill tool is triggered (under 5k tokens
      recommended); (3) Resources — bundled files in docs/, templates/, scripts/ subdirectories
      accessed via read_file or script execution as needed (effectively unlimited, only output
      enters context). Cline reads SKILL.md sequentially, so important information should be
      front-loaded.
    notes: "Skills is an experimental feature as of 2026-04. Must be enabled in Settings → Features → Enable Skills. The format doc predating this feature listed Skills as Not supported. Windows global path is C:\\Users\\USERNAME\\.cline\\skills\\."

  rules:
    status: supported
    sources:
      - uri: "https://docs.cline.bot/customization/cline-rules"
        type: documentation
        fetch_method: readability
        content_hash: "sha256:b6074899464576127d8de21fe761adf8dfd2f60dccdb8c518037d2c28e07d15f"
        fetched_at: "2026-07-13T18:30:00Z"
    canonical_mappings:
      activation_mode:
        supported: true
        mechanism: "conditional_rules_paths: Cline supports path-conditional rules alongside always-on rules; conditions use glob patterns"
        confidence: confirmed
      file_imports:
        supported: false
        mechanism: "No file import/include syntax documented for Cline rule files"
        confidence: inferred
      cross_provider_recognition:
        supported: true
        mechanism: "multi_source_rule_detection: Cline auto-detects rules from .clinerules/, .cursorrules, .windsurfrules, and AGENTS.md (including ~/.agents/AGENTS.md) — documented under 'Supported Rule Types'. CLAUDE.md is no longer listed in the supported rule-type table (dropped in favor of the AGENTS.md standard)."
        confidence: confirmed
      auto_memory:
        supported: false
        mechanism: "Cline does not have an AI-generated auto-memory system distinct from user-authored rules"
        confidence: confirmed
      hierarchical_loading:
        supported: false
        mechanism: "Cline rules are project-scoped or global; no per-subdirectory loading hierarchy documented"
        confidence: inferred
    provider_extensions:
      - id: multi_source_rule_detection
        name: Multi-Source Rule Detection
        summary: "Cline auto-loads rule files from .cursorrules, .windsurfrules, and AGENTS.md alongside its own .clinerules/ directory."
        source_ref: "https://docs.cline.bot/customization/cline-rules#supported-rule-types"
        graduation_candidate: false
        conversion: not-portable
      - id: rule_toggle
        name: Per-Rule Enable/Disable Toggle
        summary: "UI toggle in the Rules panel to enable or disable each rule file without deleting it."
        source_ref: "https://docs.cline.bot/customization/cline-rules#toggling-rules"
        graduation_candidate: false
        conversion: not-portable
      - id: conditional_rules_paths
        name: Conditional Rules via YAML Frontmatter paths
        summary: "Gates rule activation to files matching a glob array; empty array disables, missing frontmatter is always-on."
        source_ref: "https://docs.cline.bot/customization/cline-rules#conditional-rules"
        graduation_candidate: true
        provider_field: "paths"
        conversion: embedded
      - id: newrule_slash_command
        name: /newrule Slash Command for Interactive Rule Creation
        summary: "Built-in /newrule command guides the user through creating a .clinerules file interactively."
        source_ref: "https://docs.cline.bot/customization/cline-rules#creating-rules"
        graduation_candidate: false
        conversion: not-portable
    loading_model: >
      All .md and .txt files inside .clinerules/ are processed and combined into a unified
      rule set at task start. Numeric prefixes (e.g., 01-coding.md) are optional and used
      for organization only. When both workspace (.clinerules/) and global rules exist, Cline
      combines them with workspace rules taking precedence on conflict. Conditional rules with
      YAML frontmatter are evaluated against current context and loaded only when a path
      pattern matches. Rules consume context tokens on every request — Cline recommends
      keeping rules concise and linking to external docs rather than embedding large
      style guides.
    notes: "Global rules directory is ~/Documents/Cline/Rules on macOS/Linux and Documents\\Cline\\Rules on Windows. Linux/WSL may also use ~/Cline/Rules. Workspace rules (.clinerules/) take precedence over global rules when they conflict."

  hooks:
    status: supported
    sources:
      - uri: "https://docs.cline.bot/customization/hooks"
        type: documentation
        fetch_method: http
        content_hash: "sha256:259407a07abc54281f6819965dc81f4f5c7ee17a28b311cc6458ec3d67ebae7c"
        fetched_at: "2026-07-13T18:30:00Z"
    canonical_mappings:
