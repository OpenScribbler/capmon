      matcher_patterns:
        supported: false
        mechanism: "Neither surface documents per-tool pattern matching: filesystem PreToolUse and plugin tool_call_before both fire for every tool call regardless of tool identity"
        confidence: inferred
      decision_control:
        supported: true
        mechanism: "Filesystem PreToolUse hooks cancel (block) a tool invocation by returning cancel:true on VS Code/JetBrains (hook-factory.ts); the plugin tool_call_before hook stage blocks tool calls on SDK/CLI/Kanban (sdk/plugins). No allow or modify sub-capabilities on either surface"
