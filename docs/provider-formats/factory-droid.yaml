        source_ref: "https://docs.factory.ai/cli/configuration/mcp"
        graduation_candidate: false
        conversion: not-portable
      - id: mcp_config_files
        name: Dedicated MCP Configuration Files
        summary: "MCP configurations are stored in dedicated files: ~/.factory/mcp.json (user-level, takes priority) and .factory/mcp.json (project-level, committed to repo). User config wins when both define the same server. OAuth tokens always store globally in the system keyring."
        source_ref: "https://docs.factory.ai/cli/configuration/mcp"
        graduation_candidate: false
        conversion: not-portable
      - id: mcp_cli_commands
        name: MCP CLI Management Commands
        summary: "Servers are managed via droid mcp add <name> <url> --type http [--header 'KEY: VALUE'...] for HTTP servers and droid mcp add <name> '<command>' [--env KEY=VALUE...] for stdio servers; removed via droid mcp remove <name>."
        source_ref: "https://docs.factory.ai/cli/configuration/mcp"
        graduation_candidate: false
        conversion: not-portable
      - id: enterprise_mcp_policy
        name: Enterprise MCP Policy & Autonomy Overrides
        summary: "Org-managed mcpPolicy (enabled + allowlist of remote-hostname / stdio-command matchers) centrally restricts which MCP servers may connect; mcpAutonomyUrlOverrides map URL glob patterns to autonomy risk levels (low/medium/high) governing how much confirmation a server's tools require. Both are MDM-delivered and cannot be overridden or weakened by user/project/folder settings."
        source_ref: "https://docs.factory.ai/cli/configuration/mcp"
        graduation_candidate: true
        provider_field: "mcpPolicy"
        conversion: not-portable
      - id: mcp_variable_expansion
        name: mcp.json Variable Expansion
        summary: "${VAR} and ${VAR:-default} references in mcp.json are expanded against the shell environment at load time (in memory only; the file is never rewritten), supported in stdio command/args/env and http url/headers — keeping secrets out of version control."
        source_ref: "https://docs.factory.ai/cli/configuration/mcp"
        graduation_candidate: true
        conversion: translated
      - id: mcp_call_timeout
        name: Per-Server MCP Call Timeout
        summary: "timeoutMs per server in mcp.json overrides the global mcp.callTimeoutMs (settings.json) for long-running MCP tool calls; resolution order is per-server timeoutMs → global callTimeoutMs → built-in default."
        source_ref: "https://docs.factory.ai/cli/configuration/mcp"
        graduation_candidate: false
        conversion: not-portable
    loading_model: ""
    notes: "MCP configuration uses dedicated mcp.json files (not settings.json) across three scopes: ~/.factory/mcp.json (user, highest priority), .factory/mcp.json in any ancestor dir (folder), and .factory/mcp.json in project root. OAuth tokens store globally in the system keyring. Updates from the 2026-07-13 refetch: a third transport `sse` (legacy HTTP+SSE) joins http and stdio; env_var_expansion now has explicit ${VAR}/${VAR:-default} 'Variable expansion' documentation (previously only --env flags); tool_filtering adds enabledTools allowlist alongside disabledTools; enterprise_management flipped false→true with the new 'Enterprise MCP policy' (mcpPolicy allowlist) and 'MCP autonomy URL overrides' (mcpAutonomyUrlOverrides) org-managed sections. Per-server timeoutMs and richer OAuth overrides (DCR/CIMD, clientMetadataUrl, tokenEndpointAuthMethod, callbackPort) are also newly documented. Custom droids can scope MCP access via an mcpServers frontmatter field (see agents/per_agent_mcp). UNCERTAIN: mcpAutonomyUrlOverrides classifies per-URL autonomy risk (a low level lets tools auto-run) but is an admin autonomy floor rather than a user-facing per-server auto-approve toggle, so auto_approve is left unsupported. Popular HTTP servers include Sentry, Hugging Face, Socket, Notion, Linear, Stripe, PayPal, Figma, Canva, Vercel, Netlify; popular stdio servers include Airtable, ClickUp, HubSpot."

