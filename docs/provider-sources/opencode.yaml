# OpenCode / Crush — Provider Source Manifest
# Good sources: both repos have root-level JSON Schema. OpenCode is archived, Crush is the active successor.
#
# ⚠ IDENTITY / SOURCE DIVERGENCE (flagged 2026-07-14): There are TWO distinct
# projects named "opencode". The header/repo/successor below describe the
# ORIGINAL opencode-ai/opencode — confirmed archived read-only on GitHub
# (archived=true, last push 2025-09-18), whose team moved to Charm and built the
# active successor charmbracelet/crush. That lineage is accurate and is what the
# locked status (archived) + successor (crush) refer to. HOWEVER the paired
# format doc docs/provider-formats/opencode.yaml has been re-curated to track a
# SEPARATE, active same-named project — sst/opencode (opencode.ai, dev branch,
# TypeScript) — which is neither archived nor succeeded by crush. The content_types
# sources below still point at the legacy opencode-ai/opencode Go tree, so the
# manifest and its format doc now describe different projects. Reconciling this
# fully (either re-onboard the manifest to sst/opencode as active, or re-point the
# format doc back to the archived opencode-ai/crush lineage) needs a human call;
# status and successor slug are intentionally left unchanged pending that decision.

schema_version: "1"
last_verified: "2026-03-27"

slug: opencode
display_name: OpenCode
vendor: opencode-ai # archived; team subsequently built the successor Crush at Charm
status: archived
fetch_tier: gh-api
repo: opencode-ai/opencode
repo_branch: main

successor:
  slug: crush
  display_name: Crush
  repo: charmbracelet/crush
  repo_branch: main
  status: active
  # Crush has auto-updated schema.json via CI workflow (.github/workflows/schema-update.yml)
  # Schema also hosted at https://charm.land/crush.json

change_detection:
  method: github-releases
  endpoint: https://api.github.com/repos/charmbracelet/crush/releases/latest
  baseline: "v0.53.0" # Crush version. OpenCode final: v0.0.55
  # Track the successor for active changes. OpenCode is frozen.

changelog:
  - url: https://github.com/charmbracelet/crush/releases
    label: Crush GitHub Releases

config_schema:
  url: https://raw.githubusercontent.com/charmbracelet/crush/main/schema.json
  format: json-schema
  draft: "2020-12"
  # Config file: crush.json (no leading dot). OpenCode used .opencode.json.
  # Also available at: https://charm.land/crush.json

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # OpenCode supports: rules (via contextPaths config), agents (4 built-in, not
  #   user-definable), commands, mcp
  # Not supported: hooks (no hook system), skills (no native format; coverable
  #   via cross-provider convention)
  # Note: OpenCode has no native skill format — the cross-provider SKILL.md
  #   convention applies. 'agents' are 4 built-in types (coder/summarizer/task/title), not
  #   user-definable. Crush fork adds slightly different MCP config format.
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://raw.githubusercontent.com/opencode-ai/opencode/main/internal/llm/prompt/prompt.go
        type: source-code
        format: go
        extracts: [file_locations, hierarchy, discovery_rules]

      - url: https://raw.githubusercontent.com/charmbracelet/crush/main/internal/config/config.go
        type: source-code
        format: go
        extracts: [file_locations, hierarchy]
    # No dedicated rules system. Uses contextPaths config — list of files auto-loaded into prompt.
    # OpenCode defaults: .github/copilot-instructions.md, .cursorrules, CLAUDE.md, opencode.md, etc.
    # Crush expands to add: GEMINI.md, crush.md, AGENTS.md.

  hooks:
    supported: false
    # No hook system in either OpenCode or Crush.

  mcp:
    sources:
      - url: https://raw.githubusercontent.com/charmbracelet/crush/main/schema.json
        type: schema
        format: json-schema
        json_path: "$.properties.mcp"
        extracts: [server_config_fields, transport_types]

      - url: https://raw.githubusercontent.com/opencode-ai/opencode/main/internal/llm/agent/mcp-tools.go
        type: source-code
        format: go
        extracts: [server_config_fields]
    # OpenCode: command, args[], env[] (string array), type (stdio/sse), url, headers.
    # Crush adds: http type, disabled, disabled_tools[], timeout, env changed to map[string]string.

  skills:
    supported: true
    convention: cross-provider-skill-md
    # OpenCode has no native skill documentation to monitor. Installers place
    # skills using the cross-provider Agent Skills convention (SKILL.md with
    # YAML frontmatter) at .opencode/skills/ (project) and ~/.config/opencode/skills/
    # (user), plus the cross-provider .agents/skills/ location.

  agents:
    sources:
      - url: https://raw.githubusercontent.com/opencode-ai/opencode/main/internal/llm/agent/agent.go
        type: source-code
        format: go
        extracts: [config_fields]
    # 4 built-in agents (not user-definable): coder, summarizer, task, title.
    # Configured via config.Agent struct (model, maxTokens, reasoningEffort).

  commands:
    sources:
      - url: https://raw.githubusercontent.com/opencode-ai/opencode/main/internal/tui/components/dialog/custom_commands.go
        type: source-code
        format: go
        extracts: [file_format, file_locations, features]
    # Markdown files in $XDG_CONFIG_HOME/opencode/commands/ (user:) or .opencode/commands/ (project:).
    # Supports named arguments ($ISSUE_NUMBER, $AUTHOR_NAME).
