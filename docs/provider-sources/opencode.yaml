# opencode — Provider Source Manifest
# The active opencode: anomalyco/opencode (opencode.ai), by Anomaly — the
# company formerly known as SST. The repo was sst/opencode until the 2026 org
# rename; old sst raw URLs still serve 200 directly (no redirect).
#
# ⚠ NAME COLLISION (resolved 2026-07-14, capmon-ctj): a different, unrelated
# project also carried this name — opencode-ai/opencode, archived read-only
# 2025-09-18, whose team moved to Charm and built charmbracelet/crush. This
# manifest originally described that dead project and was re-onboarded to the
# active anomalyco/opencode. The opencode-ai → crush lineage history lives on
# docs/provider-sources/crush.yaml.

schema_version: "1"
last_verified: "2026-07-14"

slug: opencode
display_name: opencode # brand is lowercase (opencode.ai)
vendor: Anomaly # formerly SST; GitHub org renamed sst → anomalyco
status: active
fetch_tier: gh-api
repo: anomalyco/opencode
repo_branch: dev

change_detection:
  method: github-releases
  endpoint: https://api.github.com/repos/anomalyco/opencode/releases/latest
  baseline: "v1.17.20" # released 2026-07-13

changelog:
  - url: https://github.com/anomalyco/opencode/releases
    label: GitHub releases

config_schema:
  url: https://opencode.ai/config.json
  format: json-schema
  draft: "2020-12"
  # Config file: opencode.json / opencode.jsonc (project root or ~/.config/opencode/).

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # opencode supports: rules (AGENTS.md + instructions array), agents
  #   (markdown + frontmatter, user-definable), commands, mcp
  # Not supported: hooks (no lifecycle hook system)
  # skills: no native format — the cross-provider SKILL.md convention applies.
  # Docs pages serve raw-markdown mirrors at <page>.md (no llms.txt index).
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://opencode.ai/docs/rules.md
        type: docs
        format: markdown
        extracts: [file_locations, hierarchy, discovery_rules]
    # AGENTS.md walked up from cwd (CLAUDE.md fallback at each level), global
    # at ~/.config/opencode/AGENTS.md; the instructions array in opencode.json
    # adds files, glob patterns, or remote URLs.

  hooks:
    supported: false
    # No user-definable lifecycle hooks — no hook events, no hook config schema.

  mcp:
    sources:
      - url: https://opencode.ai/docs/mcp-servers.md
        type: docs
        format: markdown
        extracts: [server_config_fields, transport_types, config_examples]
    # local (stdio via command array) and remote (HTTP/SSE) under the mcp key
    # in opencode.json; OAuth 2.0 with Dynamic Client Registration.

  skills:
    supported: true
    convention: cross-provider-skill-md
    # No native skill implementation or docs to monitor. Installers use the
    # cross-provider Agent Skills convention: .opencode/skill/<name>/SKILL.md
    # (project) and ~/.config/opencode/skills/<name>/SKILL.md (user).

  agents:
    sources:
      - url: https://opencode.ai/docs/agents.md
        type: docs
        format: markdown
        extracts: [file_format, config_fields, features]

      - url: https://raw.githubusercontent.com/anomalyco/opencode/dev/packages/opencode/src/config/agent.ts
        type: source-code
        format: typescript
        extracts: [config_fields]
    # Markdown + YAML frontmatter in .opencode/agents/ (project) and
    # ~/.config/opencode/agents/ (global). The schema is exported as
    # ConfigAgentV1 from packages/core/src/v1/config/agent.ts; the monitored
    # file above is the thin loader that imports it.

  commands:
    sources:
      - url: https://opencode.ai/docs/commands.md
        type: docs
        format: markdown
        extracts: [file_format, file_locations, features]
    # Markdown + frontmatter in .opencode/commands/ (project) and
    # ~/.config/opencode/commands/ (user); $ARGUMENTS plus positional $1/$2/$3.
