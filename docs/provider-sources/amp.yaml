# Amp — Provider Source Manifest
# Mixed sources: GitHub example/guide repos + minimal llms.txt stub. Docs are thin.

schema_version: "1"
last_verified: "2026-04-16"

slug: amp
display_name: Amp
vendor: Sourcegraph
status: active
fetch_tier: gh-api
repo: sourcegraph/amp-examples-and-guides
repo_branch: main

change_detection:
  method: source-hash
  endpoint: https://api.github.com/repos/sourcegraph/amp-examples-and-guides/commits
  # method: source-hash — per-source baselines in docs/provider-formats/amp.yaml

changelog:
  - url: https://ampcode.com/llms.txt
    label: llms.txt (stub — only 2 URLs)

# Provider-specific URL conventions. See _template.yaml for field docs.
docs_conventions:
  # ampcode.com/manual is a thin public surface; the full manual (including
  # the hooks section) is reachable only via ?internal. Skill use only —
  # not auto-applied at fetch time.
  query_param_required: "?internal"
  # Anything that looks like /manual/<topic>/index.md or /manual/<topic>.md
  # 302-redirects to /auth/sign-in for unauthenticated callers. The heal
  # validator already rejects any redirect; this list lets the diagnostic
  # surface "auth gate" instead of a generic "redirected" cell.
  auth_gated_paths:
    - "/auth/sign-in"
    - "/login"
  # Known-dead paths: the hooks.md page was retired in early 2026, and the
  # declarative-hooks model it documented is now gone entirely — Amp replaced
  # it with a TypeScript Plugin API (see the hooks content type below). The
  # former inline "#hooks" anchor on /manual?internal no longer exists (no
  # "Hooks" heading remains); the live surfaces are the Plugins section
  # (#plugins, #plugin-locations, #writing-plugins) and the /manual/plugin-api
  # reference page. Variant generator must not propose replacements for these
  # paths (e.g. /manual/hooks/index.md still 302s to /auth/sign-in, the bug
  # pattern that triggered the original bead).
  retired_paths:
    - "/manual/hooks.md"

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # Amp supports: rules, skills, mcp, hooks
  # Not supported: agents (no agent file format), commands (no custom command system)
  # Amp uses AGENT.md (rules), .amp/settings.json (mcp/hooks). Skills follow Agent Skills open standard.
  # Hooks are config-based (amp.hooks JSON array), not file-based — managed via JSON merge.
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/AGENT.md
        type: example
        format: markdown
        extracts: [file_format]

      - url: https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/guides/agent-file/AGENT.md
        type: docs
        format: markdown
        extracts: [file_format, features]

      - url: https://ampcode.com/manual
        type: docs
        format: html
        fetch_method: chromedp
        selector:
          primary: "#AGENTS\\.md, #AGENTS\\.md ~ p, #AGENTS\\.md ~ ul, #AGENTS\\.md ~ ol, #AGENTS\\.md ~ table, #AGENTS\\.md ~ h4, #AGENTS\\.md ~ details"
          expected_contains: "AGENTS.md"
        extracts: [file_format, file_locations, features, glob_support, migration]
    # Format: AGENT.md (plain markdown). Amp's equivalent of CLAUDE.md/.cursorrules.

  hooks:
    sources:
      - url: https://ampcode.com/manual/plugin-api
        type: docs
        format: html
        extracts: [plugin_api_reference, event_map, tool_call_result, register_tool, register_command]

      - url: https://ampcode.com/manual?internal
        type: docs
        format: html
        extracts: [plugin_locations, event_lifecycle, ui_and_ai_helpers, permissions_compat]

      - url: https://ampcode.com/manual/appendix/legacy-permissions-rules.txt
        type: docs
        format: markdown
        extracts: [permissions_schema, match_conditions]
    # Amp's declarative hooks model (amp.hooks array, tool:pre-execute / tool:post-execute) was
    # RETIRED in 2026-07 and replaced by a TypeScript Plugin API. Plugins are .ts files in
    # .amp/plugins/ (+ ~/.config/amp/plugins/, and an experimental workspace-global location) that
    # export a default function receiving a PluginAPI; amp.on() subscribes to session.start,
    # agent.start, tool.call, tool.result, and agent.end. Handlers are TypeScript functions
    # (not shell-command-only) and tool.call handlers can allow / reject-and-continue / modify /
    # synthesize a call. The old ampcode.com/manual?internal#hooks anchor is DEAD; the Plugins
    # section (#plugins, #plugin-locations, #writing-plugins, #permissions) plus the /manual/plugin-api
    # reference page are the canonical surfaces. Legacy amp.permissions rules now run via an internal
    # compatibility plugin (documented under #permissions) and stay documented at
    # legacy-permissions-rules.txt — which remains the recognizer anchor (recognize_amp.go
    # ampHooksLandmarkOptions).

  mcp:
    sources:
      - url: https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/guides/mcp/amp-mcp-setup-guide.md
        type: docs
        format: markdown
        extracts: [config_examples, setup_examples]

      - url: https://ampcode.com/manual/mcp.md
        type: docs
        format: markdown
        extracts: [config_schema, features]

      - url: https://ampcode.com/manual/appendix/mcp-registry-allowlist.md
        type: docs
        format: markdown
        extracts: [allowlist_schema, registry_config]

  skills:
    sources:
      - url: https://ampcode.com/manual/agent-skills.md
        type: docs
        format: markdown
        extracts: [file_format, frontmatter_fields, file_locations, discovery_rules]
    # Format: SKILL.md with YAML frontmatter (name + description required). Follows Agent Skills open standard.

  agents:
    supported: false
    # No dedicated agent file format beyond AGENT.md.

  commands:
    supported: false

  # Additional repos worth monitoring:
  # - sourcegraph/amp-contrib: community tools, slash commands, skills
  # - sourcegraph/amp-sdk-demo: SDK usage examples
