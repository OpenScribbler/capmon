# Cline — Provider Source Manifest
# Docs served via Mintlify; raw markdown via docs.cline.bot/page.md pattern.
# llms.txt: https://docs.cline.bot/llms.txt

schema_version: "1"
last_verified: "2026-07-14"

slug: cline
display_name: Cline
vendor: Cline (saoudrizwan)
status: active
fetch_tier: llms-txt
repo: cline/cline
repo_branch: main

change_detection:
  method: github-releases
  endpoint: https://api.github.com/repos/cline/cline/releases/latest
  baseline: "v3.76.0"

changelog:
  - url: https://raw.githubusercontent.com/cline/cline/main/CHANGELOG.md
    label: Changelog

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # Cline supports: rules, hooks, mcp, skills (cross-provider SKILL.md convention
  #   at .cline/skills/, .clinerules/skills/, .claude/skills/, ~/.cline/skills/),
  #   commands (Workflows at .clinerules/workflows/ + ~/Documents/Cline/Workflows)
  # Not supported: agents (no agent file format)
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://docs.cline.bot/customization/cline-rules.md
        type: docs
        format: markdown
        extracts: [file_format, file_locations, hierarchy, features]
    # Format: .clinerules/ directory with .md and .txt files (concatenated).
    # Global: ~/Documents/Cline/Rules/. Numeric prefixes for ordering.
    # Cross-tool compat: also reads .cursorrules, .windsurfrules, AGENTS.md.

  hooks:
    # 2026-07-14 (issue #5, resolved): Cline ships TWO hook models split by surface.
    # (A) Plugin model (SDK / CLI / Kanban only) — documented on the live plugin pages;
    #     customization/hooks.md is now a stub redirecting there.
    # (B) Filesystem-script model (VS Code / JetBrains) — LIVE but no longer documented;
    #     tracked via extension source (hook-factory.ts imports the 8 hook data types,
    #     disk.ts resolves the .clinerules/hooks + ~/Documents/Cline/Hooks paths).
    # Filesystem model: 8 hook types (TaskStart, TaskResume, TaskCancel, TaskComplete,
    #   PreToolUse, PostToolUse, UserPromptSubmit, PreCompact); JSON via stdin → JSON to
    #   stdout ({cancel, contextModification?, errorMessage?}); shell/PowerShell; 30s timeout.
    # Plugin model: AgentPlugin lifecycle handlers (beforeRun/afterRun/beforeModel/
    #   afterModel/beforeTool/afterTool/onEvent), hook stages, hook policies (mode
    #   blocking|async, timeoutMs, retries, failureMode fail_open|fail_closed, …).
    sources:
      - url: https://docs.cline.bot/sdk/plugins.md
        type: docs
        format: markdown
        extracts: [event_names, hook_config_fields, event_io_schemas, config_examples, features]

      - url: https://docs.cline.bot/customization/plugins.md
        type: docs
        format: markdown
        extracts: [file_locations, config_examples, features]

      - url: https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/hooks/hook-factory.ts
        type: source-code
        format: typescript
        extracts: [event_names, event_io_schemas, hook_config_fields]

      - url: https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/storage/disk.ts
        type: source-code
        format: typescript
        extracts: [file_locations]

  mcp:
    sources:
      # 2026-07-13 (issue #5): adding-and-configuring-servers.md and
      # mcp-transport-mechanisms.md both now redirect to the consolidated
      # mcp-overview.md.
      - url: https://docs.cline.bot/mcp/mcp-overview.md
        type: docs
        format: markdown
        extracts: [server_config_fields, config_examples, transport_types]
    # CLI settings file: ~/.cline/mcp.json (mcpServers object).
    # Transports: stdio + remote, chosen by the `type` field: streamableHttp
    # (recommended) or sse (legacy default when type omitted).
    # Fields: autoApprove[] (renamed from alwaysAllow), disabled, timeout.

  skills:
    sources:
      - url: https://docs.cline.bot/customization/skills.md
        type: docs
        format: markdown
        extracts: [file_format, frontmatter_fields, file_locations, features]

      - url: https://raw.githubusercontent.com/cline/cline/main/.agents/skills/create-pull-request/SKILL.md
        type: example
        format: markdown
        extracts: [file_format, frontmatter_fields]
    # Format: .agents/skills/*/SKILL.md. No formal schema — follows cross-tool SKILL.md convention.

  agents:
    supported: false

  commands:
    sources:
      # 2026-07-13 (issue #5): the dedicated Workflows doc was removed
      # (features/slash-commands/workflows.md now 404s; customization/workflows.md
      # redirects to cline-rules.md). The surviving commands doc is using-commands,
      # which documents built-in slash commands + skills-via-slash-command. Whether
      # the user-authored Workflows feature still exists is UNVERIFIED — flagged.
      - url: https://docs.cline.bot/core-workflows/using-commands.md
        type: docs
        format: markdown
        extracts: [file_format, file_locations, features]

      # 2026-07-14 (issue #5): user-authored Workflows doc removed but the feature is
      # live in the extension — track via source. workflows.ts refreshes global +
      # workspace workflow toggles against .clinerules/workflows and ~/Documents/Cline/
      # Workflows (paths resolved in disk.ts, already tracked under hooks).
      - url: https://raw.githubusercontent.com/cline/cline/main/apps/vscode/src/core/context/instructions/user-instructions/workflows.ts
        type: source-code
        format: typescript
        extracts: [file_locations, file_format]
