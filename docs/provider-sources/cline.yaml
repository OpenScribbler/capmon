# Cline — Provider Source Manifest
# Docs served via Mintlify; raw markdown via docs.cline.bot/page.md pattern.
# llms.txt: https://docs.cline.bot/llms.txt

schema_version: "1"
last_verified: "2026-04-09"

slug: cline
display_name: Cline
vendor: Cline (saoudrizwan)
status: active
fetch_tier: llms-txt
repo: cline/cline
repo_branch: main

change_detection:
  method: github-releases
  endpoint: https://api.github.com/repos/cline/cline/releases/latest
  baseline: "v3.76.0"

changelog:
  - url: https://raw.githubusercontent.com/cline/cline/main/CHANGELOG.md
    label: Changelog

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # Cline supports: rules, hooks, mcp, skills (cross-provider SKILL.md convention
  #   at .cline/skills/, .clinerules/skills/, .claude/skills/, ~/.cline/skills/),
  #   commands (Workflows at .clinerules/workflows/ + ~/Documents/Cline/Workflows)
  # Not supported: agents (no agent file format)
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://docs.cline.bot/customization/cline-rules.md
        type: docs
        format: markdown
        extracts: [file_format, file_locations, hierarchy, features]
    # Format: .clinerules/ directory with .md and .txt files (concatenated).
    # Global: ~/Documents/Cline/Rules/. Numeric prefixes for ordering.
    # Cross-tool compat: also reads .cursorrules, .windsurfrules, AGENTS.md.

  hooks:
    sources:
      - url: https://docs.cline.bot/customization/hooks.md
        type: docs
        format: markdown
        extracts: [event_names, hook_config_fields, event_io_schemas, config_examples, features]
    # ⚠ 2026-07-13 (issue #5): customization/hooks.md is now a stub redirecting to
    # the SDK plugin docs (/customization/plugins, /sdk/plugins). Hooks moved from
    # the filesystem-script model below to TypeScript plugin lifecycle handlers
    # (beforeTool/afterTool/…, hook stages, hook policies with mode blocking|async).
    # Re-point pending maintainer decision (the plugins Warning says the new model
    # doesn't yet apply to VSCode/JetBrains, so the old model may persist there).
    # OLD (filesystem) model, may still apply to VSCode/JetBrains:
    # 9 events: TaskStart, TaskResume, TaskCancel, TaskComplete, PreToolUse,
    #           PostToolUse, UserPromptSubmit, Notification, PreCompact
    # Hook I/O: JSON via stdin → JSON to stdout ({cancel, contextModification?, errorMessage?}).
    # Shell scripts (bash/PowerShell). 30s timeout. 50KB max context modification.
    # Stored in .clinerules/hooks/ (project) or ~/Documents/Cline/Hooks/ (global).

  mcp:
    sources:
      # 2026-07-13 (issue #5): adding-and-configuring-servers.md and
      # mcp-transport-mechanisms.md both now redirect to the consolidated
      # mcp-overview.md.
      - url: https://docs.cline.bot/mcp/mcp-overview.md
        type: docs
        format: markdown
        extracts: [server_config_fields, config_examples, transport_types]
    # CLI settings file: ~/.cline/mcp.json (mcpServers object).
    # Transports: stdio + remote, chosen by the `type` field: streamableHttp
    # (recommended) or sse (legacy default when type omitted).
    # Fields: autoApprove[] (renamed from alwaysAllow), disabled, timeout.

  skills:
    sources:
      - url: https://docs.cline.bot/customization/skills.md
        type: docs
        format: markdown
        extracts: [file_format, frontmatter_fields, file_locations, features]

      - url: https://raw.githubusercontent.com/cline/cline/main/.agents/skills/create-pull-request/SKILL.md
        type: example
        format: markdown
        extracts: [file_format, frontmatter_fields]
    # Format: .agents/skills/*/SKILL.md. No formal schema — follows cross-tool SKILL.md convention.

  agents:
    supported: false

  commands:
    sources:
      # 2026-07-13 (issue #5): the dedicated Workflows doc was removed
      # (features/slash-commands/workflows.md now 404s; customization/workflows.md
      # redirects to cline-rules.md). The surviving commands doc is using-commands,
      # which documents built-in slash commands + skills-via-slash-command. Whether
      # the user-authored Workflows feature still exists is UNVERIFIED — flagged.
      - url: https://docs.cline.bot/core-workflows/using-commands.md
        type: docs
        format: markdown
        extracts: [file_format, file_locations, features]
