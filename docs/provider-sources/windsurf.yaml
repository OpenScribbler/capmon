# Windsurf — Provider Source Manifest
# Docs-only: no public repo. Good llms.txt index with raw markdown URLs via Mintlify.
# Rebrand (2026-07): Windsurf is now "Devin Desktop" by Cognition. Docs moved
# 1:1 from docs.windsurf.com/windsurf/cascade/* to docs.devin.ai/desktop/cascade/*
# (old URLs 301 across domains, which capmon's fetch validity rejects — hence the
# direct devin.ai URLs below). Slug stays `windsurf`; rename tracked separately.

schema_version: "1"
last_verified: "2026-07-13"

slug: windsurf
display_name: Windsurf
vendor: Cognition
status: active
fetch_tier: llms-txt
# No useful public repo (codeiumdev/windsurf is an empty POC).

change_detection:
  method: source-hash
  endpoint: https://docs.windsurf.com/llms.txt
  # method: source-hash — per-source baselines in docs/provider-formats/windsurf.yaml
  # Note: this endpoint still serves 200 directly on windsurf.com (no redirect),
  # while the rest of the domain redirects to devin.ai. If it starts redirecting,
  # switch to https://docs.devin.ai/llms.txt (verified live, 200).

content_types:

  # ── Support summary ───────────────────────────────────────────────────
  # Windsurf supports: rules (.windsurfrules + AGENTS.md), skills, hooks, mcp,
  #   commands (Cascade Workflows — .windsurf/workflows/ + global_workflows/)
  # Not supported: user-definable agent harness (AGENTS.md is rules delivery,
  #   not an agent format — tracked under rules.cross_provider_recognition).
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://docs.devin.ai/desktop/cascade/memories.md
        type: docs
        format: markdown
        extracts: [file_format, file_locations, features]

      - url: https://docs.devin.ai/desktop/cascade/agents-md.md
        type: docs
        format: markdown
        extracts: [file_format, features]
    # Format: .devin/rules/*.md preferred, .windsurf/rules/*.md legacy fallback
    # (legacy .windsurfrules still read) + Cascade memories system. Also reads AGENTS.md.

  hooks:
    sources:
      - url: https://docs.devin.ai/desktop/cascade/hooks.md
        type: docs
        format: markdown
        extracts: [event_names, hook_config_fields, config_examples]
    # Uses per-tool-category split events: pre_run_command/post_run_command,
    # pre_mcp_tool_use/post_mcp_tool_use, pre_read_code/post_read_code,
    # session_start, session_end.

  mcp:
    sources:
      - url: https://docs.devin.ai/desktop/cascade/mcp.md
        type: docs
        format: markdown
        extracts: [server_config_fields, transport_types, config_examples]

  skills:
    sources:
      - url: https://docs.devin.ai/desktop/cascade/skills.md
        type: docs
        format: markdown
        extracts: [file_format, features]

  agents:
    supported: false
    # Windsurf has no installable-agent harness. AGENTS.md support is a rules
    # delivery mechanism that piggybacks on the Rules engine — tracked under
    # content_types.rules (see agents-md.md source there), not as a separate
    # agents content type.

  commands:
    sources:
      - url: https://docs.devin.ai/desktop/cascade/workflows.md
        type: docs
        format: markdown
        extracts: [file_format, file_locations, features]
    # Format: plain Markdown files under .windsurf/workflows/ (project) and
    # ~/.codeium/windsurf/global_workflows/ (global). Filename drives slash-
    # command identifier; 12,000-character per-file cap; manual invocation only.
