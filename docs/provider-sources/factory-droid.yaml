# Factory Droid — Provider Source Manifest
# Good official docs at docs.factory.ai with llms.txt index. Public GitHub repo.

schema_version: "1"
last_verified: "2026-03-30"

slug: factory-droid
display_name: Factory Droid
vendor: Factory AI
status: active
fetch_tier: gh-api
repo: Factory-AI/factory
repo_branch: main

change_detection:
  method: github-releases
  endpoint: https://api.github.com/repos/Factory-AI/factory/releases/latest
  baseline: "" # Not pinned to a specific version

changelog:
  - url: https://docs.factory.ai/llms.txt
    label: llms.txt index (lists all doc pages)

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # Factory Droid supports: rules, skills, agents, commands, mcp, hooks
  # Not supported: (none)
  # Hook schema matches Claude Code's format.
  # ─────────────────────────────────────────────────────────────────────

  # docs.factory.ai is server-rendered now (2026-07-13): a plain HTTP GET returns
  # the full page content, not an empty JS shell. All docs.factory.ai sources
  # therefore use fetch_method: readability (Mozilla Readability over the HTTP
  # response) and format: markdown — the same plain-HTTP Mintlify path Cline and
  # other Mintlify providers use, so chromedp is no longer required.
  # llms.txt is a plain text manifest, so it stays on the http path.

  rules:
    sources:
      # URL moved 2026-07-13: the AGENTS.md doc relocated from
      # /cli/configuration (now the Sandbox page) to /cli/configuration/agents-md.
      - url: https://docs.factory.ai/cli/configuration/agents-md
        type: docs
        format: markdown
        fetch_method: readability
        extracts: [file_format, file_locations]
    # Format: AGENTS.md in project root (plain Markdown, no frontmatter)
    # Cross-provider convention shared with Cursor, Windsurf, etc.

  hooks:
    sources:
      - url: https://docs.factory.ai/cli/configuration/hooks-guide
        type: docs
        format: markdown
        fetch_method: readability
        extracts: [event_names, hook_config_fields, matcher_format, exit_codes]
      - url: https://docs.factory.ai/reference/hooks-reference
        type: docs
        format: markdown
        fetch_method: readability
        extracts: [event_names, event_io_schemas, hook_decisions, exit_codes]
    # Events: PreToolUse, PostToolUse, UserPromptSubmit, Stop, SessionStart,
    #         SessionEnd, PreCompact, SubagentStart, SubagentStop
    # Hook types: command
    # Same JSON schema as Claude Code (event → matcher groups → hook entries)

  mcp:
    sources:
      - url: https://docs.factory.ai/cli/configuration/mcp
        type: docs
        format: markdown
        fetch_method: readability
        extracts: [server_config_fields, transport_types, oauth_support, tool_filtering, marketplace]
    # Mintlify docs, server-rendered — plain HTTP + readability (no chromedp).
    # Transports: stdio, http
    # Config file: .factory/mcp.json (project) and ~/.factory/mcp.json (user)
    # URL switched 2026-04-28 from llms.txt index (4 generic landmarks: "Factory
    # Documentation", "Docs", "OpenAPI Specs", "Optional") to the real MCP docs
    # page (10 H2s, 8 H3s) — llms.txt is a navigation manifest, not a docs page.

  skills:
    sources:
      - url: https://docs.factory.ai/cli/configuration/skills
        type: docs
        format: markdown
        fetch_method: readability
        extracts: [file_format, frontmatter_fields, file_locations]
    # Format: .factory/skills/<name>/SKILL.md (Markdown + YAML frontmatter)

  agents:
    sources:
      - url: https://docs.factory.ai/cli/configuration/custom-droids
        type: docs
        format: markdown
        fetch_method: readability
        extracts: [file_format, config_fields, file_locations]
    # Format: .factory/droids/<name>.md (Markdown + YAML frontmatter)
    # Called "Custom Droids" — specialized subagents with model/tool restrictions

  commands:
    sources:
      - url: https://docs.factory.ai/cli/configuration/custom-slash-commands
        type: docs
        format: markdown
        fetch_method: readability
        extracts: [file_format, file_locations, config_fields]
    # Format: .factory/commands/<name>.md (Markdown or shebang script)
