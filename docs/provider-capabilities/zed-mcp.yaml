    - canonical_key: oauth_support
      supported: true
      mechanism: When a remote MCP server is configured with a url but no Authorization header, Zed prompts the user to authenticate using the standard MCP OAuth flow; since upstream commit 12e1e244 (2026-07-03) the flow is also initiated when the server answers post-initialize requests with 401 Unauthorized carrying a WWW-Authenticate challenge (ContextServer::auth_challenge)
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: resource_referencing
      supported: false
      mechanism: explicitly out of scope — the 'Supported Features' heading states Zed currently supports MCP's Tools and Prompts features only (Discovery, Sampling, Elicitation listed as welcome contributions); no resource referencing
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: tool_filtering
      supported: true
      mechanism: 'Per-profile per-server tool enable/disable maps are supported via context_servers.<name>.tools in agent profile config; enable_all_context_servers: false allows disabling all servers except those explicitly listed in the profile'
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: transport_types
      supported: true
      mechanism: Zed supports both stdio (local command + args + env) and HTTP/HTTPS (remote URL + headers) transports. Stdio servers use the command/args/env shape; remote servers use url + optional headers. Both use the same MCP protocol initialization.
      source_field: ""
      source_value: ""
      confidence: confirmed
