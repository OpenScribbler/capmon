schema_version: "1"
slug: cline
display_name: ""
last_verified: ""
content_types:
  commands:
    supported: true
    capabilities:
      builtin_commands:
        supported: true
        mechanism: 5 built-in slash commands documented as individual headings (/newtask, /smol, /newrule, /deep-planning, /reportbug); hardcoded, not user-modifiable
        confidence: inferred
  hooks:
    supported: true
    capabilities:
      async_execution:
        supported: true
        mechanism: 'plugin hook policies (mode: async) run hooks off the critical path on SDK/CLI/Kanban; filesystem-script hooks on VS Code/JetBrains remain synchronous with a 30s timeout'
        confidence: inferred
      context_injection:
        supported: true
        mechanism: filesystem hooks inject context via the contextModification stdout field on VS Code/JetBrains; the plugin before_agent_start hook stage injects context or modifies the prompt on SDK/CLI/Kanban
        confidence: confirmed
      decision_control:
        supported: true
        mechanism: 'filesystem PreToolUse hooks block a tool invocation by returning cancel: true on VS Code/JetBrains; the plugin tool_call_before hook stage blocks tool calls on SDK/CLI/Kanban'
        confidence: confirmed
      handler_types:
        supported: false
        mechanism: 'neither surface documents handler-type selection: filesystem hooks (VS Code/JetBrains) execute shell or PowerShell scripts only; plugin hooks (SDK/CLI/Kanban) are TypeScript lifecycle handlers only'
        confidence: inferred
      hook_scopes:
        supported: true
        mechanism: 'both surfaces support global + project scope: filesystem hooks in .clinerules/hooks (project) and ~/Documents/Cline/Hooks (global); plugins in .cline/plugins (project) and ~/.cline/plugins (global)'
        confidence: confirmed
      input_modification:
        supported: true
        mechanism: filesystem PreToolUse hooks return modified context/input before tool execution via contextModification on VS Code/JetBrains; the plugin before_agent_start / tool_call_before stages modify input on SDK/CLI/Kanban
        confidence: confirmed
      json_io_protocol:
        supported: true
        mechanism: the filesystem-script model (VS Code/JetBrains) receives JSON via stdin and returns JSON to stdout with cancel, contextModification, and errorMessage fields; NOT the plugin mechanism (in-process TypeScript)
        confidence: confirmed
      matcher_patterns:
        supported: false
        mechanism: 'neither surface documents per-tool pattern matching: filesystem PreToolUse and plugin tool_call_before both fire for every tool call regardless of tool identity'
        confidence: inferred
      permission_control:
        supported: false
        mechanism: 'neither surface grants/denies tool availability: hooks can only block/cancel a specific tool call (decision_control); the plugin approval-policy concept governs blocking a call, not tool-availability permissioning'
        confidence: inferred
  mcp:
    supported: true
    capabilities:
      transport_types:
        supported: true
        mechanism: transport types documented under 'Transport types' heading (STDIO + remote streamableHttp/sse) on the consolidated mcp-overview page
        confidence: inferred
  rules:
    supported: true
    capabilities:
      activation_mode:
        supported: true
        capabilities:
          always:
            supported: true
            mechanism: rules without conditionals load for every request (documented under 'Conditional Rules' / 'How It Works')
            confidence: inferred
          glob:
            supported: true
            mechanism: '''paths'' Conditional uses glob-based path matching to scope rule activation (documented under ''The paths Conditional'' / ''Writing Conditional Rules'')'
            confidence: inferred
      hierarchical_loading:
        supported: true
        mechanism: 'two-tier scope: Project rules (.clinerules/ in workspace) + Global rules (~/.cline/rules/ user-wide) — documented under ''Where Rules Live'' / ''Global Rules Directory'''
        confidence: inferred
  skills:
    supported: true
    capabilities:
      canonical_filename:
        supported: true
        mechanism: SKILL.md
        confidence: confirmed
      global_scope:
        supported: true
        mechanism: Skills stored in ~/.cline/skills/<name>/SKILL.md
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: Skills stored in .cline/skills/<name>/SKILL.md (recommended), .clinerules/skills/<name>/SKILL.md, or .claude/skills/<name>/SKILL.md
        confidence: confirmed
provider_exclusive:
  skills.bundled_files:
    supported: true
    mechanism: documented under 'Bundling Supporting Files' heading
    confidence: inferred
  skills.creation_workflow:
    supported: true
    mechanism: documented under 'Creating a Skill' heading
    confidence: inferred
  skills.description_guidance:
    supported: true
    mechanism: documented under 'Writing Effective Descriptions' heading
    confidence: inferred
  skills.directory_structure:
    supported: true
    mechanism: documented under 'Skill Structure' heading
    confidence: inferred
  skills.file_references:
    supported: true
    mechanism: documented under 'Referencing Bundled Files' heading
    confidence: inferred
  skills.frontmatter:
    supported: true
    mechanism: frontmatter format documented under 'Writing Your SKILL.md' heading
    confidence: inferred
  skills.naming_conventions:
    supported: true
    mechanism: documented under 'Naming Conventions' heading
    confidence: inferred
  skills.toggling:
    supported: true
    mechanism: per-skill enable/disable documented under 'Toggling Skills' heading
    confidence: inferred
