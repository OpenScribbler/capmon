schema_version: "1"
slug: cline
display_name: ""
last_verified: ""
content_types:
  commands:
    supported: true
    capabilities:
      builtin_commands:
        supported: true
        mechanism: 5 built-in slash commands documented as individual headings (/newtask, /smol, /newrule, /deep-planning, /reportbug); hardcoded, not user-modifiable
        confidence: inferred
  hooks:
    supported: true
    capabilities:
      context_injection:
        supported: true
        mechanism: context injection documented under 'Context Modification' heading
        confidence: inferred
      handler_types:
        supported: true
        mechanism: hook handler types documented under 'Hook Types' heading
        confidence: inferred
      hook_scopes:
        supported: true
        mechanism: hook scopes documented under 'Hook Locations' heading (project + global)
        confidence: inferred
      json_io_protocol:
        supported: true
        mechanism: JSON I/O protocol documented under 'Input Structure' / 'Output Structure' headings
        confidence: inferred
  mcp:
    supported: true
    capabilities:
      transport_types:
        supported: true
        mechanism: transport types documented under 'Transport types' heading (STDIO + remote streamableHttp/sse) on the consolidated mcp-overview page
        confidence: inferred
  rules:
    supported: true
    capabilities:
      activation_mode:
        supported: true
        capabilities:
          always:
            supported: true
            mechanism: rules without conditionals load for every request (documented under 'Conditional Rules' / 'How It Works')
            confidence: inferred
          glob:
            supported: true
            mechanism: '''paths'' Conditional uses glob-based path matching to scope rule activation (documented under ''The paths Conditional'' / ''Writing Conditional Rules'')'
            confidence: inferred
      hierarchical_loading:
        supported: true
        mechanism: 'two-tier scope: Project rules (.clinerules/ in workspace) + Global rules (~/.cline/rules/ user-wide) — documented under ''Where Rules Live'' / ''Global Rules Directory'''
        confidence: inferred
  skills:
    supported: true
    capabilities:
      canonical_filename:
        supported: true
        mechanism: SKILL.md
        confidence: confirmed
      global_scope:
        supported: true
        mechanism: Skills stored in ~/.cline/skills/<name>/SKILL.md
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: Skills stored in .cline/skills/<name>/SKILL.md (recommended), .clinerules/skills/<name>/SKILL.md, or .claude/skills/<name>/SKILL.md
        confidence: confirmed
