schema_version: "1"
slug: factory-droid
display_name: ""
last_verified: ""
content_types:
  agents:
    supported: true
    capabilities:
      definition_format:
        supported: true
        mechanism: single-file .md droids with system prompt, model preference, and tooling policy documented under 'Configuration' heading
        confidence: inferred
      per_agent_mcp:
        supported: true
        mechanism: per-droid MCP scoping via the mcpServers frontmatter field documented under 'Selecting MCP servers' heading
        confidence: inferred
      tool_restrictions:
        supported: true
        mechanism: categorical tool policy using named categories (read-only, edit, execute, web, mcp) documented under 'Tool categories → concrete tools' heading
        confidence: inferred
  commands:
    supported: true
    capabilities:
      argument_substitution:
        supported: true
        mechanism: $ARGUMENTS substitution in Markdown commands plus positional shell args ($1, $2, ...) in Executable commands documented under '2 · Markdown commands' / '3 · Executable commands' / '5 · Usage patterns' headings
        confidence: inferred
  hooks:
    supported: true
    capabilities:
      decision_control:
        supported: true
        mechanism: 'hook_exit_code_behavior: Factory Droid hooks use exit codes to signal block (non-zero) or allow (zero) decisions on the triggering action; documented under per-event ''Decision Control'' headings'
        confidence: inferred
  mcp:
    supported: true
    capabilities:
      enterprise_management:
        supported: true
        mechanism: org-managed mcpPolicy allowlist and mcpAutonomyUrlOverrides documented under 'Enterprise MCP policy' heading
        confidence: inferred
      env_var_expansion:
        supported: true
        mechanism: ${VAR} and ${VAR:-default} expansion in mcp.json documented under 'Variable expansion' heading
        confidence: inferred
      marketplace:
        supported: true
        mechanism: '40+ pre-configured MCP servers (Linear, GitHub, Stripe, etc.) documented under ''Quick Start: Add from Registry'' heading'
        confidence: inferred
      oauth_support:
        supported: true
        mechanism: OS-keyring OAuth-token storage for HTTP/SSE MCP servers documented under 'OAuth Tokens' heading
        confidence: inferred
      tool_filtering:
        supported: true
        mechanism: per-server tool filtering via enabledTools/disabledTools fields documented under 'Configuration Schema' / 'Per-tool filtering' headings
        confidence: inferred
      transport_types:
        supported: true
        mechanism: http, sse, and stdio transports documented under 'Adding HTTP Servers', 'Adding SSE Servers', and 'Adding Stdio Servers' headings
        confidence: inferred
  skills:
    supported: true
    capabilities:
      canonical_filename:
        supported: true
        mechanism: SKILL.md (skill.mdx also accepted)
        confidence: confirmed
      global_scope:
        supported: true
        mechanism: ~/.factory/skills/<skill-name>/SKILL.md
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: <repo>/.factory/skills/<skill-name>/SKILL.md or .agent/skills/<skill-name>/SKILL.md
        confidence: confirmed
provider_exclusive:
  skills.creation_workflow:
    supported: true
    mechanism: documented under 'Quickstart' heading
    confidence: inferred
  skills.directory_structure:
    supported: true
    mechanism: documented under 'Where skills live' heading
    confidence: inferred
  skills.frontmatter:
    supported: true
    mechanism: documented under 'Frontmatter reference' heading
    confidence: inferred
  skills.invocation:
    supported: true
    mechanism: documented under 'Control who invokes a skill' heading
    confidence: inferred
