schema_version: "1"
slug: cursor
display_name: ""
last_verified: ""
content_types:
  agents:
    supported: true
    capabilities:
      agent_scopes:
        supported: true
        capabilities:
          project:
            supported: true
            mechanism: .cursor/agents/ project scope, taking precedence over user scope (documented under 'File locations' heading)
            confidence: inferred
          user:
            supported: true
            mechanism: ~/.cursor/agents/ user-global scope (documented under 'File locations' heading)
            confidence: inferred
      definition_format:
        supported: true
        mechanism: Markdown files with YAML frontmatter (name, description, model, readonly, is_background) followed by a prompt body, documented under 'File format' heading
        confidence: inferred
      invocation_patterns:
        supported: true
        capabilities:
          automatic_delegation:
            supported: true
            mechanism: Cursor's Agent proactively delegates tasks to subagents based on description, complexity, and available tools (documented under 'Automatic delegation' heading)
            confidence: inferred
          explicit:
            supported: true
            mechanism: /<name> syntax or natural-language mentions invoke a specific subagent (documented under 'Explicit invocation' heading)
            confidence: inferred
      model_selection:
        supported: true
        mechanism: model frontmatter field accepts 'inherit', 'fast', or a specific model id; admin policies and Max Mode requirements may override (documented under 'Model configuration' heading)
        confidence: inferred
      subagent_spawning:
        supported: true
        mechanism: Since Cursor 2.5, subagents can launch child subagents to create a tree of coordinated work; nested launches require Task tool access and can be restricted by hooks or tool policies (FAQ heading 'Can subagents launch other subagents?')
        confidence: inferred
      tool_restrictions:
        supported: true
        mechanism: readonly frontmatter flag restricts the subagent to read-only tools (documented in 'Configuration fields')
        confidence: inferred
  hooks:
    supported: true
    capabilities:
      hook_scopes:
        supported: true
        mechanism: project + user-global hook scopes documented under 'Project Hooks (Version Control)' / 'Configuration' headings
        confidence: inferred
      json_io_protocol:
        supported: true
        mechanism: JSON I/O protocol documented under 'Common schema' / 'Input (all hooks)' headings (event data on stdin, structured decision JSON on stdout)
        confidence: inferred
      matcher_patterns:
        supported: true
        mechanism: matcher patterns documented under 'Matcher Configuration' heading
        confidence: inferred
  mcp:
    supported: true
    capabilities:
      auto_approve:
        supported: true
        mechanism: auto-approval / auto-run mode for trusted tools documented under 'Auto-run' heading
        confidence: inferred
      env_var_expansion:
        supported: true
        mechanism: ${env:NAME}, ${userHome}, ${workspaceFolder}, ${pathSeparator} variable interpolation documented under 'Config interpolation' / 'Combining with config interpolation' headings
        confidence: inferred
      marketplace:
        supported: true
        mechanism: one-click MCP server installation from a curated catalog documented under 'One-click installation' heading
        confidence: inferred
      oauth_support:
        supported: true
        mechanism: OAuth 2.0 (with Client ID/Secret + scopes) documented under 'Static OAuth for remote servers' / 'Authentication' headings
        confidence: inferred
      tool_filtering:
        supported: true
        mechanism: per-server enable/disable toggle and per-tool approval documented under 'Tool approval' / 'Using MCP in chat' headings
        confidence: inferred
      transport_types:
        supported: true
        mechanism: stdio transport documented under 'STDIO server configuration' heading; SSE and Streamable HTTP variants covered in body text and configuration tables
        confidence: inferred
  rules:
    supported: true
    capabilities:
      activation_mode:
        supported: true
        capabilities:
          always:
            supported: true
            mechanism: '''Always'' Rule Type — rule included in every prompt (documented under ''Activation and enforcement'')'
            confidence: inferred
          glob:
            supported: true
            mechanism: '''Auto Attached'' Rule Type — frontmatter glob patterns activate when matching files in context (documented under ''Activation and enforcement'')'
            confidence: inferred
          manual:
            supported: true
            mechanism: '''Apply Manually'' Rule Type — activated via @-mention in chat (documented under ''Activation and enforcement'')'
            confidence: inferred
          model_decision:
            supported: true
            mechanism: '''Agent Requested'' Rule Type — agent decides based on rule description (documented under ''Activation and enforcement'')'
            confidence: inferred
      cross_provider_recognition:
        supported: true
        capabilities:
          agents_md:
            supported: true
            mechanism: AGENTS.md fallback with nested directory support (documented under 'AGENTS.md' / 'Nested AGENTS.md support' headings)
            confidence: inferred
      file_imports:
        supported: true
        mechanism: rules can reference / import other rules (documented under 'Importing Rules' heading)
        confidence: inferred
      hierarchical_loading:
        supported: true
        mechanism: 'three-tier scope: Project rules (.cursor/rules) + Team Rules (org-wide) + User Rules (documented under ''Project rules'' / ''Team Rules'' / ''User Rules'')'
        confidence: inferred
  skills:
    supported: true
    capabilities:
      canonical_filename:
        supported: true
        mechanism: SKILL.md is the canonical skill filename, documented under 'SKILL.md file format' heading
        confidence: inferred
      disable_model_invocation:
        supported: true
        mechanism: disable-model-invocation frontmatter toggle documented under 'Disabling automatic invocation' heading
        confidence: inferred
      global_scope:
        supported: true
        mechanism: Skills stored in ~/.agents/skills/<name>/SKILL.md per the cross-provider Agent Skills convention
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: Skills stored in .cursor/skills/<name>/SKILL.md (cursor-native) or .agents/skills/<name>/SKILL.md (cross-provider Agent Skills convention)
        confidence: confirmed
