schema_version: "1"
slug: amp
display_name: ""
last_verified: ""
content_types:
  hooks:
    supported: true
    capabilities:
      async_execution:
        supported: false
        mechanism: plugin event handlers are async TypeScript functions awaited inline in the request/response flow (a tool.call blocks until the handler resolves); no fire-and-forget or background hook execution is documented
        confidence: inferred
      context_injection:
        supported: true
        mechanism: 'agent.start handlers return {message: {content, display?}} to append context after the user''s message; tool.result handlers rewrite tool results; agent.end can continue the loop (Plugin API, experimental)'
        confidence: inferred
      decision_control:
        supported: true
        mechanism: 'a tool.call handler returns {action: allow | reject-and-continue | modify | synthesize | error} deciding each tool invocation (Plugin API, experimental)'
        confidence: inferred
      handler_types:
        supported: true
        mechanism: TypeScript handlers via amp.on(event, handler) run in Amp's Bun runtime; handlers can shell out (ctx.$), call amp.ai.ask, or register tools/commands (Plugin API, experimental)
        confidence: inferred
      hook_scopes:
        supported: true
        mechanism: three plugin load locations — project .amp/plugins/*.ts, user ~/.config/amp/plugins/*.ts, and a workspace-configured global location (Plugin API, experimental)
        confidence: inferred
      input_modification:
        supported: true
        mechanism: 'a tool.call handler returns {action: modify, input} to replace the tool''s input arguments before it executes (Plugin API, experimental)'
        confidence: inferred
      json_io_protocol:
        supported: false
        mechanism: plugins are in-process TypeScript modules exchanging typed event objects and return values through the @ampcode/plugin PluginAPI, not a serialized JSON stdin/stdout protocol
        confidence: inferred
      matcher_patterns:
        supported: true
        mechanism: amp.on() subscriptions carry no declarative matcher (handlers discriminate in code); declarative glob/regex matching survives in legacy amp.permissions rules enforced via the internal compat plugin
        confidence: inferred
      permission_control:
        supported: true
        mechanism: a tool.call handler decides each invocation; legacy amp.permissions / amp.guardedFiles.allowlist rules are enforced via an internal compat plugin (Plugin API, experimental)
        confidence: inferred
  mcp:
    supported: true
    capabilities:
      enterprise_management:
        supported: true
        mechanism: workspace-admin-enforced MCP registry with allowlist documented under 'MCP Registry Allowlist' heading (modelcontextprotocol.io schema; unreachable registry blocks all servers)
        confidence: inferred
      oauth_support:
        supported: true
        mechanism: OAuth 2.0 authentication for remote MCP servers documented under 'OAuth for Remote MCP Servers' heading
        confidence: inferred
      tool_filtering:
        supported: true
        mechanism: per-tool enable/disable documented under '3. Configure Tool Access' heading (VS Code UI exposes individual tool toggles within each configured server)
        confidence: inferred
  rules:
    supported: true
    capabilities:
      activation_mode:
        supported: true
        capabilities:
          always:
            supported: true
            mechanism: AGENTS.md files are always_on within their scope (cwd, parent dirs, subtrees) — documented under 'AGENTS.md' / 'Writing AGENTS.md Files'
            confidence: inferred
          glob:
            supported: true
            mechanism: '@-mentioned files use ''globs'' frontmatter for selective activation (documented under ''Granular Guidance''); globs implicitly prefixed with **/ unless ../ or ./'
            confidence: inferred
      cross_provider_recognition:
        supported: true
        capabilities:
          agents_md:
            supported: true
            mechanism: native AGENTS.md format; 'Migrating to AGENTS.md' documents one-time mv+symlink from CLAUDE.md and .cursorrules
            confidence: inferred
      file_imports:
        supported: true
        mechanism: '@-mention syntax includes other files as context — supports relative, absolute, and ~/ paths (documented under ''Granular Guidance'')'
        confidence: inferred
      hierarchical_loading:
        supported: true
        mechanism: 'three-tier scope: AGENTS.md in cwd + parent dirs + subtrees + personal global at $HOME/.config/amp/AGENTS.md (documented under ''Writing AGENTS.md Files''); subtree loading is unique to amp'
        confidence: inferred
  skills:
    supported: true
    capabilities:
      canonical_filename:
        supported: true
        mechanism: SKILL.md
        confidence: confirmed
      global_scope:
        supported: true
        mechanism: skill directory placed under ~/.config/agents/skills/<name>/, ~/.agents/skills/<name>/, ~/.config/amp/skills/<name>/, or ~/.claude/skills/<name>/
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: skill directory placed under .agents/skills/<name>/ or .claude/skills/<name>/ within the project root
        confidence: confirmed
provider_exclusive:
  skills.creation_workflow:
    supported: true
    mechanism: documented under 'Creating Skills' heading
    confidence: inferred
  skills.mcp_integration:
    supported: true
    mechanism: documented under 'MCP Servers in Skills' heading
    confidence: inferred
