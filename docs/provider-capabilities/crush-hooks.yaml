provider: crush
content_type: hooks
format: ""
proposed_mappings:
    - canonical_key: async_execution
      supported: false
      mechanism: Matching hooks run in parallel with each other, but the tool call waits for all of them to finish (or time out) before proceeding — there is no fire-and-forget mode. A hook exceeding its timeout is treated as a non-blocking 'no opinion' error and the call proceeds.
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: context_injection
      supported: true
      mechanism: The output envelope's context field accepts a string or an array of strings, appended to what the model sees for the current turn. Across multiple hooks, context values concatenate in config order and empty entries are dropped.
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: decision_control
      supported: true
      mechanism: Exit code 2 blocks the tool call (stderr is the deny reason); exit 49 halts the whole turn; other non-zero codes are non-blocking errors and the call proceeds. On exit 0 stdout is parsed as a JSON envelope whose decision field is allow, deny, or null — 'allow' is affirmative pre-approval, null/omitted is no opinion. Across hooks the precedence is deny > allow > null, composed in config order.
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: handler_types
      supported: false
      mechanism: 'Crush hooks are shell commands only (the command field in HookConfig) — no HTTP, LLM-prompt, or agent handler types. Commands run through Crush''s embedded POSIX shell (mvdan.cc/sh): inline commands and shebang-less scripts execute in-process, while #!-shebang scripts dispatch to the named interpreter via os/exec, so a hook script can be written in any language — but the handler is always a shell command.'
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: hook_scopes
      supported: true
      mechanism: Hooks are configured in crush.json (or .crush.json) at both the user-global (~/.config/crush/crush.json) and project level, with project-level hooks taking precedence. Global-config commands must use an absolute path or an inline command; relative paths resolve against the working directory.
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: input_modification
      supported: true
      mechanism: 'The exit-0 JSON envelope may carry updated_input: a shallow-merge patch against tool_input (included keys overwrite, omitted keys are preserved, nested objects replaced wholesale). Patches from multiple hooks merge sequentially in config order and are ignored if the final decision is deny or halt. Implemented as UpdatedInput in internal/hooks/hooks.go.'
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: json_io_protocol
      supported: true
      mechanism: Stdin delivers a JSON payload (event, session_id, cwd, plus tool_name and tool_input for PreToolUse). On exit 0 stdout is parsed as a JSON output envelope (version, decision, halt, reason, context, updated_input). Simple hooks may skip JSON and use CRUSH_* environment variables plus exit codes instead.
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: matcher_patterns
      supported: true
      mechanism: 'HookConfig has a matcher field: a regex pattern tested against the tool name. An empty matcher matches all tools.'
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: permission_control
      supported: true
      mechanism: 'Hook results are applied before permission checks: an aggregated deny blocks the tool call before any prompt; an aggregated allow is affirmative pre-approval that skips the prompt; silence (no decision) falls through to the normal permission flow.'
      source_field: ""
      source_value: ""
      confidence: confirmed
