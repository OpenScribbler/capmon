provider: crush
content_type: skills
format: ""
proposed_mappings:
    - canonical_key: canonical_filename
      supported: true
      mechanism: SKILL.md (required, fixed name per the Agent Skills standard)
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: custom_filename
      supported: false
      mechanism: filename is fixed as SKILL.md per the Agent Skills standard
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: description
      supported: true
      mechanism: 'yaml frontmatter key: description (required); documents what the skill does and when Crush should invoke it'
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: disable_model_invocation
      supported: true
      mechanism: Go Skill struct field DisableModelInvocation (yaml:"disable-model-invocation", optional boolean) in skills.go. ToPromptXML skips skills with this flag set, excluding them from the model's <available_skills> list per the Agent Skills standard.
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: display_name
      supported: true
      mechanism: 'yaml frontmatter key: name (required); follows the Anthropic Agent Skills standard. Validated: must be alphanumeric with hyphens, max 64 chars.'
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: global_scope
      supported: true
      mechanism: ~/.config/crush/skills/<name>/SKILL.md (XDG-compliant native path) and ~/.agents/skills/<name>/SKILL.md (cross-provider convention)
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: project_scope
      supported: true
      mechanism: .crush/skills/<name>/SKILL.md (native) and .agents/skills/<name>/SKILL.md (cross-provider convention)
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: shared_scope
      supported: false
      mechanism: ""
      source_field: ""
      source_value: ""
      confidence: inferred
    - canonical_key: user_invocable
      supported: true
      mechanism: Go Skill struct field UserInvocable (yaml:"user-invocable", optional boolean) in skills.go. When true, the skill is invocable as a command from the commands palette (Ctrl+P); Skill.FormatInvocation() loads its instructions into the conversation context. Global-dir skills appear as user:<name>, project-dir skills as project:<name>.
      source_field: ""
      source_value: ""
      confidence: confirmed
