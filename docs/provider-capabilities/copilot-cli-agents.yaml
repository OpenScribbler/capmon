provider: copilot-cli
content_type: agents
format: ""
proposed_mappings:
    - canonical_key: agent_scopes
      supported: true
      mechanism: project scope (.github/agents/ or .claude/agents/), personal (~/.copilot/agents/), plugin (agents/); personal takes precedence over project
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: definition_format
      supported: true
      mechanism: .agent.md files with YAML frontmatter (description required; optional name, target, tools, model, disable-model-invocation, user-invocable, mcp-servers, metadata) documented under 'YAML frontmatter properties'; up to 30,000 chars of Markdown instructions as agent system prompt. The legacy `infer` property is now marked retired (superseded by disable-model-invocation/user-invocable).
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: invocation_patterns
      supported: true
      mechanism: /agent slash command, natural language instruction, auto-inference (suppressible with disable-model-invocation), or --agent flag; 4 patterns
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: model_selection
      supported: true
      mechanism: model field in frontmatter overrides default model for that agent
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: per_agent_mcp
      supported: true
      mechanism: mcp-servers object in agent frontmatter adds MCP servers/tools for the agent (documented under 'MCP server configuration details'); the config spec marks mcp-servers as used by the github.com cloud agent and Copilot CLI but NOT by VS Code / IDE agents. Env-var/secret expansion in these configs supports $VAR, ${VAR}, ${VAR:-default} (Claude Code syntax) plus ${{ secrets.X }} / ${{ vars.X }} (Actions syntax).
      source_field: ""
      source_value: ""
      confidence: inferred
    - canonical_key: subagent_spawning
      supported: true
      mechanism: agents run as subagents with isolated context windows; Git-SHA-based versioning ensures consistency across PR interactions
      source_field: ""
      source_value: ""
      confidence: confirmed
    - canonical_key: tool_restrictions
      supported: true
      mechanism: tools field with cross-provider alias system (execute/shell/Bash, read/Read, edit/Edit, etc.); ["*"] grants all tools; unrecognized names silently ignored
      source_field: ""
      source_value: ""
      confidence: confirmed
