schema_version: "1"
slug: kiro
display_name: ""
last_verified: ""
content_types:
  agents:
    supported: true
    capabilities:
      agent_scopes:
        supported: true
        capabilities:
          project:
            supported: true
            mechanism: project-scoped agents stored under .kiro/agents/ documented under 'Local agents (project-specific)' heading; local (project) agent takes precedence over global on name collision (with a warning), per 'Agent precedence'
            confidence: inferred
          user:
            supported: true
            mechanism: user-scoped agents stored under ~/.kiro/agents/ documented under 'Global agents (user-wide)' heading; global agent is the fallback when no local agent of the same name exists, per 'Agent precedence'
            confidence: inferred
      definition_format:
        supported: true
        mechanism: JSON config with Name/Description/Prompt fields (Inline prompt or File URI prompt) documented under 'Name field' / 'Description field' / 'Prompt field' headings
        confidence: inferred
      model_selection:
        supported: true
        mechanism: per-agent model override documented under 'Model field' heading in the configuration reference
        confidence: inferred
      per_agent_mcp:
        supported: true
        mechanism: per-agent MCP server scoping documented under 'McpServers field' heading; supports OAuth configuration per server
        confidence: inferred
      tool_restrictions:
        supported: true
        mechanism: per-agent tool allowlist with exact matches, wildcard patterns, and MCP tool patterns documented under 'Tools field' / 'AllowedTools field' / 'ToolsSettings field' headings
        confidence: inferred
  hooks:
    supported: true
    capabilities:
      context_injection:
        supported: true
        mechanism: exit code 0 adds hook command STDOUT to the agent context for SessionStart and UserPromptSubmit events; documented under the 'Exit code behavior' heading
        confidence: inferred
      decision_control:
        supported: true
        mechanism: exit code 2 blocks execution for PreToolUse / UserPromptSubmit / PreTaskExec (block only, no allow/modify); documented under the 'Exit code behavior' heading
        confidence: inferred
      matcher_patterns:
        supported: true
        mechanism: per-hook 'matcher' regex field filters by tool name or file path; the 'Trigger reference' table 'Matcher matches' column documents Tool name (regex) for PreToolUse/PostToolUse and File path (regex) for file events
        confidence: inferred
  mcp:
    supported: true
    capabilities:
      env_var_expansion:
        supported: true
        mechanism: environment variable expansion (${VAR} syntax) documented under 'Environment variables' heading with security warning against inline secrets
        confidence: inferred
      oauth_support:
        supported: true
        mechanism: browser-based OAuth flows with Dynamic Client Registration; oauth.clientId / oauth.redirectUri / oauthScopes config fields and automatic token re-authentication documented under 'OAuth authentication' heading
        confidence: inferred
      transport_types:
        supported: true
        mechanism: transport types (stdio for local, HTTPS/HTTP for remote) documented under 'Local server' / 'Remote server' configuration sub-headings
        confidence: inferred
  rules:
    supported: true
    capabilities:
      activation_mode:
        supported: true
        capabilities:
          always:
            supported: true
            mechanism: steering loaded on every prompt by default (documented under 'Always included' inclusion mode)
            confidence: inferred
          glob:
            supported: true
            mechanism: 'glob-based path matching via inclusion: fileMatch with a fileMatchPattern glob field (single pattern or array) activates steering files (documented under ''Conditional inclusion'' inclusion mode)'
            confidence: inferred
          manual:
            supported: true
            mechanism: user explicitly references the file to activate (documented under 'Manual inclusion' inclusion mode)
            confidence: inferred
          model_decision:
            supported: true
            mechanism: agent decides based on context (documented under 'Auto inclusion' inclusion mode)
            confidence: inferred
      cross_provider_recognition:
        supported: true
        capabilities:
          agents_md:
            supported: true
            mechanism: Agents.md fallback for cross-tool compatibility (documented under 'Agents.md' heading)
            confidence: inferred
      file_imports:
        supported: true
        mechanism: "steering files can reference other files via '#[[file:<relative>]]' syntax (documented under 'File references' heading)"
        confidence: inferred
      hierarchical_loading:
        supported: true
        mechanism: 'three-tier scope: workspace + global + team steering (documented under ''Workspace steering'' / ''Global steering'' / ''Team steering'')'
        confidence: inferred
  skills:
    supported: true
    capabilities:
      canonical_filename:
        supported: true
        mechanism: POWER.md (fixed, all caps)
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: Self-contained directory installed via Kiro Powers panel (UI installation, no fixed filesystem path)
        confidence: confirmed
provider_exclusive:
  skills.directory_structure:
    supported: true
    mechanism: documented under 'Directory structure' heading
    confidence: inferred
  skills.frontmatter:
    supported: true
    mechanism: 'documented under ''Frontmatter: When to activate'' heading'
    confidence: inferred
  skills.mcp_integration:
    supported: true
    mechanism: documented under 'Adding MCP servers' heading
    confidence: inferred
  skills.onboarding_instructions:
    supported: true
    mechanism: documented under 'Onboarding instructions' heading
    confidence: inferred
  skills.sharing:
    supported: true
    mechanism: documented under 'Sharing your power' heading
    confidence: inferred
  skills.steering_instructions:
    supported: true
    mechanism: documented under 'Steering instructions' heading
    confidence: inferred
  skills.testing:
    supported: true
    mechanism: documented under 'Testing locally' heading
    confidence: inferred
