name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout capmon
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod

      - name: gofmt check
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "gofmt needed on:"; echo "$UNFORMATTED"; exit 1
          fi

      - name: Legacy-name gate
        # The working tree must not mention the old downstream project name.
        # The pattern is split so this workflow file does not match itself.
        run: |
          if grep -ri 'syl''lago' --exclude-dir=.git .; then
            echo "legacy project name found in working tree (see matches above)"
            exit 1
          fi

      - name: Build (CGO on, all extractors)
        run: go build ./...

      - name: Build (CGO off, nocgo stubs)
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
